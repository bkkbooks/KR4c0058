body:
  text: 孟東野詩集巻九唐孟郊撰詠物宇文秀才齋中海栁詠玉縷青葳㽔結為芳樹姿忽驚明月鈎鈎出珊瑚枝灼灼不死花䝉䝉長生絲飲栢況一作泛仙味詠蘭擬一作凝古詞霜風清颼颼與君長相思搖栁一作採栁弱弱本易驚看看勢難定因風似醉舞盡日不能正時邀詠花女笑輟春粧鏡曉鶴曉鶴彈古舌婆羅門叫音應吹天上律不使塵中尋虚空夢皆㫁歆唏安能禁如開孤月口似説明星心既非人間韻枉作人間禽不如相将去碧落窠巢深和薔薇花歌仙機札札一作軋軋織鳯凰花開七十有二行天霞落地攅紅光風枝嫋嫋時一颺飛散葩馥遶空王忽驚錦浪洗新色又似宫娃逞粧飾終當一使移花一作老根還比蒲桃天上植邀人賞薔薇蜀色庶可比楚叢亦應無醉紅不自力狂􅃩如索扶麗蘂惜未掃宛枝長更紆何人是花侯詩老強相呼和宣州錢判官使院㕔前石楠樹太朴既一剖衆材爭萬殊懿兹南海華來與北壤俱生長如自惜雪霜無凋渝籠籠抱靈秀簇簇抽芳膚寒日吐再艶頳子流細珠鴛鴦花數重翡翠葉四鋪雨洗新粧色一枝如一姝聳異敷庭際傾妍來坐隅散彩飾机案餘輝盈盤盂髙意一作立因一作自造化常情逐榮枯主公方寸中陶植在須臾養此奉君子賞覿日為娯始覺石楠詠價傾賦兩一作西都棠頌庶可比桂詞難以踰因謝丘墟木空採一作操落泥塗時來聞佳姿道去卧枯株爭芳無由縁受氣如鬱紆抽肝在郢匠歎息何踟蹰酬鄭毗躑躅詠不似人手致豈關地勢偏孤光褭餘翠獨影舞多妍迸火燒閑地紅星墮青天忽驚物表物嘉客為留連品松追悲謝靈運不得殊常封縱然孔與顔亦莫及此松此松天格髙聳異千萬重孤拏巨靈手擘裂少室峯擘裂風雨獰抓拏指爪􅀈道入難抱心學生易墮蹤時時數㸃仙嫋嫋一線龍霏微嵐浪際遊戲顥興濃品松徒髙髙雌鳴一作鴻詎噰噰賞異尚可貴賞潛誰能容名華非典實翦棄徒纎茸刻削大雅文所以不敢慵荅李員外小榼味一拳芙蓉水傾玉何泠泠仙清風已髙詩味今更馨試啜月入骨再銜愁盡醒荷君道古誠使我善飛一作振翎井上枸杞架深鎖銀泉甃髙葉架雲空不與凡木並自将仙葢同影疎千㸃月聲細萬條風迸子鄰溝外飄香客位中花杯承此飲椿嵗小無窮蜘蛛諷一作詠萬類皆有性各各稟天和蠶身與汝身汝身何太訛蠶身不為己汝身不為他蠶絲為衣裳汝絲為網羅濟物㡬無功害物日已多百蟲雖切恨其将奈爾何蚊五月中夜息饑蚊尚營營但将膏血求豈覺性命輕顧已寧自愧飲人以偷生願為天下㡡一使夜景清燭蛾燈前雙舞蛾厭生何太切想爾飛來心惡明不惡滅天若百尺髙應去掩明月和錢侍郎甘露𤣥天何以言瑞露青松繁忽見垂書跡還驚涌澧源春枝晨嫋嫋香味曉翻翻子禮忽來獻臣心固易敦清風惜不動薄霧肯䝉昬嘉晝色更晶仁慈久乃存一方難獨占天下恐爭論側聽飛中使重榮華一作萃徳門從公樂萬壽餘慶及兒孫雜題和令狐侍郎郭郎中題項羽廟碧草凌古廟清塵鎖秋窻當時獨宰割猛志誰能降鼓氣雷作敵劒光電為雙新悲徒自起舊恨一作懐舊空浮江讀張碧集天寳太白殁六義已消歇大哉國風本喪而王澤竭先生今復生斯文信難缺下筆證興亡陳詞備風骨髙秋數奏琴澄潭一輪月誰作採詩官忍之不揮發聽琴䬃䬃微雨收飜飜橡一作桐葉鳴月沈亂峯西寥落二四星前溪忽調琴隔林寒琤琤聞彈正弄聲不敢枕上聽迴燭整頭簪潄泉立中庭定步履一作屐齒深貌禪目㝠㝠微風吹衣襟亦認宫徵聲學道三十年未免憂死生聞彈一夜中㑹盡天地情聞夜啼贈劉正元寄泣須寄黄河泉此中怨聲流徹一作方到天愁人獨有夜燈見一紙鄉書淚滴穿喜雨朝見一片雲暮成千里雨淒清濕髙枝散漫沾荒土終南山下作見此原野秀始知造化偏山村不假隂流水自一作日雨田家家梯碧峯門門鎖青煙因思蛻骨人化作飛桂仙觀種樹種樹皆待春春至難久留君看朝夕花誰免别離愁心意已零落種之仍未休胡為好竒者無事自買憂春後雨昨夜一霎雨天意蘇羣物何物最先知虚庭草爭出荅友人贈炭青山白屋有仁人贈炭價重雙烏銀驅却坐上千重寒燒出爐中一片春吹霞弄日光不定暖得曲身成直身爛柯石仙界一日内人間千嵗一作載窮雙碁未徧局萬物皆為空樵客返歸路斧柯爛從風唯餘石橋在猶自凌丹虹一作猶有靈丹紅尋言上人萬里莓苔地不見驅馳蹤唯開文字窻時冩日月容竹韻漫蕭屑草花徒纎一作䝉茸披霜入衆木獨自識青松噴玉布去塵咫尺步山笑康樂巖天開紫石屏泉縷一作鏤明月簾仙凝刻削跡靈綻雲霞纎恱聞若有待瞥見終無厭俗玩詎能近道嬉方可淹踏著不死機欲歸多浮嫌古醉今忽醒今求古仍潛古今相共失語黙兩難恬贈君噴玉布一濯髙嶄嶄姑蔑城勁越既成土強呉亦為墟皇風一已被兹邑信平居撫俗觀舊跡行春布新書興亡意何在綿歎空躊蹰崢嶸嶺疏鑿順髙下結構横煙霞坐嘯郡齋肅玩竒石路斜古樹浮緑氣髙門結朱華始見崢嶸狀仰止逾可嘉尋裴處士涉水更登陸所尚皆清真寒草不藏徑靈峯知有人悠哉鍊金客獨與煙霞親曽是欲輕舉誰言空隠淪逺心寄白月一作日華髮迴青春對此欽勝事胡為勞我身子慶詩王家事已竒孟氏慶無涯獻子還生子羲之又有之鳯兮且莫歎鯉也㑹聞詩小小豫章甲纎纎玉樹姿人來唯仰乳母抱未知慈我欲揀其養放麛者是誰憩淮上觀公法堂動覺日月短静知時嵗長自悲道路人暫宿空閑堂孤燭讓清晝紗巾斂輝光髙僧積素行事外無剛強我有巖下桂願為爐中香不惜青翠姿為君一作師揚芬芳淮水色不汚汴流徒渾黄且将琉璃意淨綴一作啜芙蓉章一作漿明日還獨行羇愁來舊腸江邑春霖奉贈陳侍御江上花木凍雨中零落春應由放忠直在此成漂淪嘉艷皆損汚好音難殷勤天涯多逺限雪涕盈芳辰坐哭青草上卧吟幽水濵興言念風俗得意唯波鱗枕蓆病流濕簷楹苦飛津始知呉楚水不及京洛塵風浦蕩歸棹泥陂陷征輪兩途日無遂相贈唯沾巾溧陽秋霽晚雨曉猶在蕭寥激前階星星滿衰鬢耿耿入秋懐舊識半零落前心驟相乖飽泉亦空醉惕宦肅如齋上客處華池下寮宅枯崖叩髙占生物齟齬難回諧列仙文大霞霏晨暉元氣無常形𤣥轡飛霄外八景乗髙清手把玉皇袂攜我晨中生𤣥庭一作挺自嘉㑹金書拆華名賢女密所妍相期洛水軿右方諸青童君歘駕空青虛徘徊西華館瓊輪暨晨抄虎騎逐煙散惠風振丹旌明燭朗八煥解襟墉房内神鈴鳴璀璨栖景若林柯九絃空中彈遺我積世憂釋此千載歎怡眄無極已終夜復待旦右清虚真人駕我八景輿歘然入玉清龍羣拂霄上虎旗攝朱兵逍遥三絃際萬流無暫停哀此去留㑹刼盡天地傾當尋無中景不死亦不生體彼自然道寂觀合大冥南嶽挺直幹玉英曜穎精有任靡期事無心自虚靈嘉㑹絳河内相與樂朱英右金母飛空歌丹霞煥上清八風鼓太和迴我神霄輦遂造嶺玉阿咄嗟天地外九圍皆我家上採白日精下飲黄月華靈觀空無中鵬路無間邪顧見魏賢安濁氣傷汝和勤研𤣥中思道成更相過右安度明夏日謁智逺禪師吾師當幾祖説法云無空禪心三界外宴坐天地中院静鬼神去身與草木同因知䕶王國滿鉢盛毒龍斗藪塵埃衣謁師見真宗何必千萬刼瞬息去樊籠盛夏火為日一堂十月風不得為弟子名姓掛儒宫訪嵩陽道士不遇先生五岳遊文焰藏金鼎日下鶴過時人間空落影常言一粒藥不墮生死境何當列禦宼去問仙人請聽藍溪僧為元居士說維摩經古樹少枝葉真僧亦相依山木自曲直道人無是非手持維摩偈心向居士歸空景忽開霽雪花猶在衣洗然水溪晝寒物生光輝借車借車載家具家具少於車借者莫彈指貧窮何足嗟百年徒校一作役走萬事盡隨花喜符郎詩有天縱念符不由級屹得文章階白玉抽一作描一毫緑珉已難排偷筆作文章乞墨潛磨揩海鯨始生尾試擺蓬壺渦幸當禁止之勿使恣狂懐自悲無子嗟喜妬雙喈喈憑周況先輩於朝賢乞茶道意勿乏味心緒病無悰䝉茗玉花盡越甌荷葉空錦水有鮮色蜀山饒芳叢雲根纔翦緑印縫已霏紅曽向貴人得最将詩叟同幸為乞寄來救此病一作窮劣躬上昭成閣不得於從姪僧悟空院嘆嗟欲上千級閣問天三四言未盡數十登心目風浪翻手手把驚魄脚脚踏墜魂却流至舊手傍掣猶欲奔老病但自悲古蠧木萬痕老力安可誇秋海萍一根孤瘦何所歸晝眼如黄昬常恐失好步入彼市井門結僧為親情䇿竹為子孫此誠徒切切此意空存存一寸地上語髙天何由聞魏博田興尚書聽㛐命不立非夫人詩君子躭古禮如饞魚吞鈎時聞敬㛐言掣心東北流魏博田尚書與禮相綢繆善詞聞天下一日一再周讀經垂老抱佛脚教妻讀黄經經黄名小品一紙千明星曽讀大般若細感􅆄蠁聽當時把齋中方寸抱萬靈忽復入長安蹴踏日月寧老方却歸來收拾可丁丁拂拭塵机案開函就孤亭儒書難借索僧籖饒芳馨驛驛不開手鏗鏗聞異鈴得善如焚香去惡如脫腥安得顔子耳曽未如此聽聽之何有言徳敎貴有形何言中國外有國如海萍海萍國敎異天聲各泠泠安排未定時心火競熒熒将如庶㡬者聲盡形元冥謝李輈再到等閑拜日晚夫妻猶相瘡況是賢人寃何必哭飛揚昨夜夢得劒為君藏中腸㑹将當風烹血染布衣裳勞君又扣門詞句失尋常我不忍出㕔血字濕土牆血字耿不滅我心懼惶惶㑹有鏗鏘夫見之目生光生光非等閑君其且安詳忽不貧喜盧仝書船歸洛貧孟忽不貧請問孟何如盧仝歸洛船崔嵬但載書江潮清翻翻淮潮碧徐徐夜信為朝信朝信良巻舒江淮君子水相送仁有餘我去官色衫肩經入君廬喃喃肩經郎言語傾琪琚琪琚鏗好詞鳥鵲躍庭除書船平安歸喜報鄉里閭我願拾遺柴巢經於空虛下免塵土侵上為一作與雲霞居日月更相鎖道義分明儲不願空岧嶤但願實工夫實空二理微分别一作明相起予經書荒蕪多為君勉勉鋤勉勉不敢專傳之方在諸孟東野詩集巻九
