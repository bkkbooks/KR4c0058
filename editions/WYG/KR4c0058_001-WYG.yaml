body:
  text: 孟東野詩集巻一唐孟郊撰樂府上列女操梧桐相待老鴛鴦㑹雙死貞婦貴狥夫捨生亦如此波瀾誓不起妾心井中水灞上輕薄行長安無緩步況值天景暮相逢灞滻間親戚不相顧自嘆方拙身忽隨輕薄倫常恐失所避化為車轍塵此中生白髮疾走亦未歇長安羇旅行十日一理髮每梳飛旅塵三旬九過飲每食唯舊貧萬物皆及時獨余不覺春失名誰肯訪得意爭相親直木有恬翼靜流無躁鱗始知喧競場莫處君子身野䇿藤竹輕山蔬薇蕨新潛歌歸去來事外風景眞長安道朔風激秦樹賤子風中泣家家朱門開得見不可入長安十二衢投樹鳥亦急髙閣何人家笙篁正喧吸送逺吟河水昬復晨河邊相送頻離杯有泪飲別栁無枝春一笑忽然歛萬愁俄已新東波與西日不惜逺行人古薄命妾不惜十指絃為君千萬彈常恐新聲至坐使一作使我故聲一作曲殘棄置今日悲即是昨日歡將新變故易恃故為新難青山有蘼蕪淚葉長不乾空令後代人採掇幽思攅一作思幽蘭古離別松山雲繚繞萍路水分離雲去有歸日水分無合時春芳役雙眼春色柔四支楊栁織別愁千條萬條絲古樂府雜怨三首憶人莫至悲至悲空自衰寄人莫剪衣剪衣未必歸朝為雙蒂花暮為四散飛花落却遶樹遊子不顧期夭桃花清晨遊女紅粉新夭桃花薄暮遊女紅粉故樹有百年花人無一定顔花送人老盡人悲花自閒貧女鏡不明寒花日少容暗蛩有虛織短線無長縫浪水不可照狂夫不可從浪水多散影狂夫多異蹤持此一生薄空成萬一作百恨濃靜女吟艷女皆妬色靜女獨檢蹤任禮恥任糚嫁徳不嫁容君子易求聘小人難自從此志誰與諒琴絃幽韻重歸信吟淚墨灑為書將寄萬里親書去魂亦去兀然空一身山老吟不行山下地唯種山上田腰斧斫旅松手瓢汲家泉詎知文字力莫記日月遷蟠木為我身始得全天年遊子吟慈母手中線遊子身上衣臨行密密縫意恐遲遲歸誰言寸草心報得三春暉小隱吟我飲不在醉我歡長寂然酌溪四五盞聽彈兩三絃鍊性靜棲白洗情深寄𤣥一作塞淵號怒路傍子貪敗不貪全苦寒吟天色寒青蒼北風叫枯桑厚氷無裂文短日有冷光敲石不得火壯隂正奪陽調苦竟何言凍吟成此章猛將吟擬膾樓蘭肉一作玉蓄怒時未揚秋鼙無退聲夜劍不隱光虎隊手驅出豹篇心巻藏古今皆有言猛將出北方傷哉行衆毒蔓貞松一枚難久榮豈知黄庭客仙骨生不成春色捨芳蕙秋風遶枯莖彈琴不成曲始覺知音傾館月改舊照吊賔冩餘情還舟空江上波浪送銘旌古怨試妾與君淚兩處滴池水看取芙蓉花今年為誰死湘絃怨昧者理芳草蒿蘭同一鋤狂一作盲飈怒一作怨秋林曲直同一枯嘉木忌深蠧哲人悲巧誣靈均入迴流靳尚為良謨我願分衆泉清濁各異渠我願分衆巢梟鸞相逺居此志諒難保此情竟何如湘絃少知音孤響空踟蹰楚竹吟酬盧䖍端公見和湘絃怨握中有新聲楚竹人未聞識音者謂誰清一作靜夜吹贈君昔為瀟湘引曽動瀟湘雲一叫鳳改聽再驚鶴失羣江花匪秋落山日當晝曛衆濁響雜沓孤清思氛氲欲知怨有一作者形願向明月分一掬靈均淚千年湘水文逺愁曲飃䬙何所從遺塜行未逢東西不見人哭一作泣向青青松此地有時盡此哀無處容聲飜太白雲淚洗藍田峯水渉七八曲山一作石登千萬重願邀𤣥夜月一作靈出視白日蹤貧女詞寄從叔先輩簡蠶一作貧女非不勤今年獨無春二月氷雪深死盡萬木身時令自逆行造化豈不仁仰企碧霞仙髙控滄海雲永別勞苦場飃䬙遊無垠邊城吟西城近日一作水天俗稟氣候偏行子獨自渇主人仍賣泉燒烽碧雲外牧馬青坡巔何處鶻突夢一作作夢歸歸思寄仰一作酒眠新平歌送許問邊栁三四尺暮春一作莫奏離別歌早迴儒士駕暮飲土番河誰識匣一作篋中寶楚雲章句多殺氣不在邊殺氣不在邊凜然中國秋道險不在山平地有摧輈河南又起兵清濁俱鎖流豈唯私客艱擁滯官行舟況余隔晨昬去家成阻脩忽然兩鬢雪固是一日愁獨寢夜難曉起視星漢浮凉風蕩天地日夕聲颼飀萬物無少色兆人皆老憂長䇿苟未立丈夫誠可羞靈響復何事劒鳴思戮讎結愛心心復心心結愛務在深一度欲離一作言別千迴結衣襟結妾獨守志結君早歸意始知結衣裳不如結心腸坐結行亦結結盡百年月絃歌行驅儺擊鼓吹長笛瘦鬼染面惟齒白暗中崒崒拽茅鞭倮足朱褌行戚戚相顧笑聲衝庭燎桃弧射矢時獨叫覆巢行荒城古木枝多枯飛禽嗷嗷朝哺雛枝傾巢覆雛墜地烏鳶下啄更相呼陽和發生均孕育鳥獸有情知不足枝危巢小風雨多未容長成已先覆靈枝珍木滿上林鳳巢阿閣重且深爾今所託非本地烏鳶何得同一作知爾心出門行二首長河悠悠去無極百齡同此可歎息秋風白露沾人衣壯心凋落奪顔色少年出門將訴誰川無梁兮路無岐一聞陌上苦寒奏使我佇立驚且悲君今得意厭梁肉豈復念我貧賤時海風蕭蕭天雨霜窮愁獨坐夜何長驅車舊憶太行險始知遊子悲故鄉美人相思隔天闕長望雲端不可越手持瑯玕欲有贈愛而不見心斷絶南山峩峩白石爛碧海之波浩漫漫參辰出没不相待我欲横天無羽翰湘妃怨一作湘靈祠南巡竟不返二妃怨一作悲逾積萬里喪蛾眉瀟湘水空碧冥冥荒山下古廟收貞魄喬木深青春清光滿一作肅瑶席搴芳徒有薦靈意殊脉脉玉佩不可親徘徊烟波夕巫山曲巴江上峽重復重陽臺碧峭十二峯荆王獵時逢暮雨夜臥髙邱夢神女輕紅流烟濕艷姿行雲飛去明星稀目極魂斷望不見猿啼三聲淚滴衣巫山髙見盡數萬里不聞三聲猿但飛蕭蕭雨中有亭亭魂千載楚襄恨遺文宋玉言至今晴明天一作青冥裏雲結深閨門楚怨秋入楚江水獨照汨羅魂手把緑荷泣意愁珠淚飜九門不可入一犬吠千門塘下行塘邊日欲斜年少早還家徒將白羽扇調妾木蘭花不是城頭樹那棲來去鴉臨池曲池中春蒲葉如帶紫菱成角蓮子大羅裙蟬鬢寄迎風雙雙伯勞飛向東車遥遥路喜到江盡江上又通舟舟車兩無阻何處不得遊丈夫四方志女子安可留郎自別日言無令生逺愁旅鴈忽叫月斷猿寒啼秋此夕夢君夢君在百城樓寄淚無因波寄恨無因輈願為馭者手與郎迴馬頭征婦怨二首良人昨日去明月又不圓別時各有淚零落青樓前君淚濡羅巾妾淚滿路塵羅巾長在手今得隨妾身路塵如得風得上君車輪漁陽千里道近如中門限中門踰有時漁陽長在眼生在緑一作絲羅下不識漁陽道良人自戍來夜夜夢中到空城雀一雀入官倉所食寧損幾秪慮往覆頻官倉終害爾魚網不在天鳥羅不張水飲啄要自然可以空城裏閑怨妾恨比斑竹下盤煩寃根有筍未出土中已含淚痕羽林行朔雪寒斷指朔風勁裂氷胡中射鵰者此日猶不能翩翩羽林兒錦臂飛蒼鷹揮鞭快白馬走出黄河凌古意河邊織女星河畔牽牛郎未得渡清淺相對遙相望古別離欲別牽郎衣郎今到何處不恨歸來遲莫向臨卭去遊俠行壯士性剛決火中見石裂殺人不迴頭輕生如蹔別豈知眼有淚肯白頭上髮平生無恩酬劒閑一百月黄雀吟黄雀舞承塵倚恃主人仁主人忽不仁買彈彈爾身何不逺飛去蓬蒿正繁新蒿粒無人爭食之足為珍莫覷飜車粟覷飜罪有因黄雀不知言贈之徒慇懃有所思桔橰烽火晝不滅客路迢迢信難越古鎭刀攅萬片霜寒江浪起千堆雪此時西去定如何空使南心逺凄切求仙曲仙敎生為門仙宗靜為根持心若妄求服食安足論鏟惑有靈藥餌眞成本源自當出塵網馭鳳登崑崙嬋娟篇花嬋娟泛春泉竹嬋娟籠曉烟妓嬋娟不長妍月嬋娟眞可憐夜半姮娥朝太乙人間本自無靈匹漢宫承寵不多時飛燕婕妤相妬嫉南浦篇南浦桃花亞水紅水邊栁絮由春風鳥鳴喈喈煙濛濛自從逺送對悲翁此翁已與少年別唯憶深山深谷中清東曲櫻桃花參差香雨紅霏霏含笑競攀折美人濕羅衣采采清東曲明眸艷珪玉青巾艑上郎上下看不足南陽公一作宫首詞編入新樂録孟東野詩集巻一
