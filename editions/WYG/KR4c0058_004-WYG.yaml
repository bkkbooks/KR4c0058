body:
  text: 孟東野詩集巻四唐孟郊撰詠懷下秋懷十五首孤骨夜難卧吟蟲相唧唧老泣無涕洟秋露為滴瀝去壯暫如翦來衰紛似織觸緒無新心叢悲有餘憶詎忍逐南帆江山踐往昔秋月顔色氷去聲老客志氣單冷露滴夢破峭風梳骨寒席上印病文腸中轉愁盤疑懷無所憑虛聴多無端梧桐枯崢嶸聲響如哀彈一尺月透戸仡栗如劒飛老骨坐亦驚病力所尚微蟲苦貪一作含剪色鳥危巢焚輝孀娥理故絲一作煩緒孤哭一作坐抽餘噫浮年不可追衰步多夕歸秋至老更貧破屋無門扉一片月落牀四壁風入衣疎夢不復逺弱心良易歸商葩將去一作老緑繚繞爭餘輝野步踏事少病謀向物違幽幽草根蟲生意與我微竹風相戛語幽閨暗中聞鬼神滿衰聴恍惚難自分商葉隨乾雨秋衣卧單雲病骨可剸物酸呻亦成文瘦攅如此枯壯落隨西曛裊裊一線命徒言繫絪緼老骨懼秋月秋月刀劒稜纎輝不可干冷魂坐自凝羇雌巢空鏡仙飈蕩浮氷驚步恐自翻病大不敢凌單牀寤皎皎瘦卧心兢兢洗河不見水透濁為清澄詩壯昔空説詩衰今何憑老病多異慮朝夕非一心商蟲哭衰運繁響不可尋秋草瘦如髪貞芳綴疎金晚鮮詎幾時馳景還易隂弱習徒自恥暮知欲何任露才一見讒潛智早已深防深不防露此意古所箴嵗暮景氣乾秋風兵甲聲織織勞無衣喓喓徒自鳴商聲聳中夜蹇支廢前行青髪如秋園一翦不復生少年如餓花瞥見不復明君子山岳定小人絲毫爭多爭多無壽天道戒其盈冷露多瘁索枯風饒吹噓秋深月清苦蟲老聲麤疎頳珠枝纍纍芳金蔓舒舒草木亦趨時寒榮似春餘自悲一作悲彼零落生與我心何如老人朝夕異生死每日中坐隨一啜安卧與萬景空視短不到門聴澀詎逐風還如刻削形免有纎悉聰浪浪謝初始皎皎幸歸終孤隔文章友親密蒿萊翁嵗緑閔以黄秋節迸已一作又窮四時既相迫萬慮自然叢南逸浩淼際北貧磽确中曩懷沈遙江衰思結秋嵩鋤食難滿腹葉衣多醜躬塵縷不自整古吟將誰通幽竹嘯鬼神楚鐵生虬龍志士多異感運鬱由邪衷常思書破衣至死敎初童習樂莫習聲習聲多頑聾明明胷中言願寫為髙崇幽苦日日甚老力步步微常恐暫下牀至門不復歸饑者重一食寒者重一衣泛廣豈無涘恣行亦有隨一作隨時語中失次第身外生瘡痍桂蠧既潛朽一作汚桂花損貞姿詈言一失香千古聞臭詞將死始前悔前悔不可追哀哉輕薄行終日與駟馳一作欲􅀈馳流運閃欲盡枯折皆相號棘枝風哭酸桐葉霜顔髙老蟲乾鐵鳴驚獸孤玉咆商氣洗一作滿聲瘦晚隂驅景勞集耳不可遏噎神不可逃蹇行散餘鬱幽坐誰與曹抽壯無一線剪懷盈千刀清詩既名眺一作詩清既名郊金菊亦姓陶収拾昔所棄咨嗟今比毛幽幽嵗晏言零落不可操霜氣入病骨老人身生氷衰毛暗相刺冷痛不可勝鷕鷕伸至明强强擾所憑瘦坐形欲折晚饑心將崩勸藥左右愚言語如見憎聳耳噎神開一作聳嚥神氣開始知功用一作者能日中視餘瘡暗鏁一作隙聞繩一作細蠅彼齅一何酷此味半㸃凝潛毒爾無厭餘生我堪矜凍飛幸不逺冬令反心懲出沒各有時寒熱苦一作莫相凌仰謝調運翁請命願有徴黄河倒上天衆水有却來人心不及水一直去不迴一直亦有巧不肯至蓬萊一直不知疲唯聞至省臺忍古不失古失古志易摧失古劒亦折失古琴亦哀夫子失古淚當時落漼漼詩老失古心至今寒皚皚古骨無濁肉古衣如蘚苔勸君勉忍古忍古銷塵埃詈言一作署劒不見血殺人何紛紛聲如窮家犬吠竇何誾誾詈痛幽鬼哭詈侵黄金貧言詞豈用多憔悴在一聞古詈舌不死至今云書云今人詠古書善惡直自分秦火不爇舌秦火空爇文所以詈更生至今横絪緼靖安寄居寄静不寄華愛兹嵽嵲居渇飲濁清泉饑食無名䟽敗菜一作葉不敢火補衣亦寫書古云儉成徳今乃實起予戅叟戅不足賢人賢有餘役生皆促促心竟誰舒舒萬馬踏風衢衆塵隨奔車髙賔盡不見大道夜方虛卧有洞庭夢坐無長安儲英髦空駭耳煙火獨微如厚意恐傷性薄田憶親鋤承一作忙世不出力冬竹肯抽葅外物莫相誘約心誓從初碧芳既似水日日詠歸歟雪忽然太行雪昨夜飛入來崚嶒墮庭中嚴白何皚皚奴婢曉開戸四肢凍徘徊咽言詞不成告訴情狀摧官給未入門家人盡以灰意勸莫笑雪笑雪貧為災將暖此殘疾典賣爭致杯敎令再舉手誇曜餘生才强起吐巧詞委曲多新裁為爾作非夫忍恥轟暍雷書之與君子庶免生嫌猜春愁春物與愁客遇時各有違故花辭新枝新淚落故衣日暮兩寂寞飄然亦同歸懊惱惡詩皆得官好詩空抱山抱山冷殑殑終日悲顔顔好詩更相嫉劒㦸生牙關前賢死已久猶在咀嚼間以我殘抄身清峭養髙閒求閒未得閒衆誚瞋虤虤遊適上遊城南韓氏莊初疑瀟湘水鏁在朱門中時見水底月動摇池上風一作有時池底山動摇池上風清氣潤竹木白光連虛空浪簇霄漢羽岸芳金碧叢何言數畝間環泛路不窮願逐一作常慕神仙侣飄然一作從兹汗漫通與二三友秋宵㑹話清上人院何處山不幽此中情又别一僧敲一磬七子吟秋月激石泉韻清寄枝風嘯咽冷然諸境静頓覺浮累滅扣寂兼探眞通宵詎能輟夜集好鳥無雜棲華堂有嘉攜琴樽互傾奏歌賦相和諧但嘉魚水合莫令雲雨乖一為鵾雞彈再鼓壯士懷初景待誰曉新春逐一作還君來願言良友㑹髙駕不知迴招文士飲曹劉不免死誰敢負年華文士莫辭酒詩人命屬花退之如放逐李白自矜夸萬古忽將似一朝同嘆嗟何言天道正獨使地形斜南士愁多病北人悲去家梅芳已流管柳色未藏鵶相勸罷吟雪相從愁飲霞醒時不可過愁海浩無涯陪侍御叔遊城南山墅夜坐擁朣亭晝登崔嵬岑日窺萬峯首月見雙泉心松氣清耳目竹氛碧衣襟佇想一作仰悲琅玕字數聴枯槁吟登華嚴寺樓望終南山贈林校書兄弟地脊亞為崖聳出冥冥中樓根插迥雲殿翼翔危空前山胎元氣靈異生不窮勢吞萬象髙秀奪五岳雄一望俗慮醒再登仙願崇青蓮三居士晝景貞賞同遊終南山南山塞天地日月石上生髙峯夜留景太白峯西黄昏後見餘日深谷晝未明山中人自正路險心亦平長風驅松栢聲拂萬壑清到此悔讀書朝朝近浮名遊終南龍池寺飛鳥不到處僧房終南巔龍在水長碧雨開山更鮮步出白日上坐依清溪邊地寒松桂短石險道路一作苔磴偏晚磬送歸客數聲落遥天南陽公請東櫻桃亭子春讌萬木皆未秀一林先含春此地獨何力我公布深仁霜葉日舒巻風枝逺埃塵初英濯紫霞飛雨流清津賞異出囂雜折芳積歡忻文心兹焉重俗尚安能珍碧玉糚粉比飛瓊穠豔均鴛鴦七十二花態併相新常恐遺秀志迨兹廣讌陳芳菲爭勝引歌詠竟良辰方知戲馬㑹永謝登龍賔遊華山雲臺觀華嶽獨靈異草木恒新鮮山盡五色石水無一色泉仙酒不醉人仙芝皆延年夜聞明星館時韻女蘿絃敬兹不能寐焚栢吟道篇喜與長文上人宿李秀才小山池亭燈盡語不盡主人庭砌幽柳枝星影曙蘭葉露華浮塊嶺笑羣岫片池輕衆流更聞清淨子逸唱頗難儔邀花伴時在朔方邊地春不足十里見一花及時須遨遊日暮饒風沙石淙十首巖谷不自勝水木幽竒多朔風入空曲涇一作逕流無大波迢遥逗難盡參差勢相羅雪霜有時洗塵土無由和潔冷誠未厭晚步將如何出曲水未斷入山深更重泠泠若仙語皎皎多異容萬響不相雜四時皆自濃日月㸦分照雲霞各生峯久迷向方理逮兹聳前蹤荒䇿每恣逺戅步難自迴已抱苔蘚疾一作病尚凌潺湲隈驛驥苦銜勒籠禽恨摧頽實力苟未足浮誇信悠哉顧惟非時用静言還自咍朔水刀劒利秋石瓊瑶鮮魚龍氣不腥潭洞狀更妍磴雪入呀谷掬星灑遥天聲忙一作迫不及韻勢疾多斷漣輸去雖有恨躁氣一作翻一何顛蜿蜒相纒掣犖角亦迴旋黑草濯鐵髮白苔浮氷錢具一作其生此云遥非德不可甄何況被犀士制之空以權始知静剛猛文教從來先空谷聳視聴幽湍澤心靈疾流脫鱗甲疊岸衝風霆丹巘墮瓌景霽波灼一作閃虚形淙淙豗厚軸稜稜攅髙冥弱棧跨旋碧危梯倚凝青飄颻鶴骨仙飛動鼇背庭一作亭常聞誇大言下顧皆細萍百尺明鏡流千曲寒星飛為君洗故物有色如新衣不飲泥土汚但飲雪霜饑石稜玉纎纎草色瓊霏霏谷皚有餘力溪舂亦多機從來一智萌能使衆利歸因之山水中喧然論是非入深得竒趣昇險為良隮搜勝有聞見逃俗無蹤蹊宂流恣迴轉竅景忘東西戅獸鮮猜懼羅人巧罝罤幽馳異處所忍慮多端倪虚獲我何飽實歸彼非迷斯文浪云潔此㫖誰得齊屑珠瀉潺湲裂玉何威瓌若調千瑟絃未果一曲諧古駭毛髪慄險驚視聴乖二一作土老皆勁骨風趨縁欹崖地逺有餘一作遺美我遊採棄一作竒懷乘時幸勤鑒前恨多幽霾弱力謝剛健蹇䇿貴安排始知隨事静何必當夕齋昔浮南渡飈今攀朔山景物色多瘦削吟笑還孤永日月凍有稜雪霜空無影玉噴不生氷瑶渦旋成井潛角時聳光隠鱗乍漂冏再吟獲新勝返步失前省愜懷雖已多惕慮未能整頽陽落何處昇魄銜疎嶺聖朝搜巖谷此地多遺玩怠墮成逺遊頑疎恣靈一作虚觀勁飈刷幽視怒水懾餘湍一作惴曽是結芳一作茅誠逺兹勉流倦氷條聳危慮霜翠瑩遐盼物誘信多端荒尋諒難遍去矣朔之隅翛然楚之甸遊韋七洞庭别業洞庭如瀟湘疊翠蕩浮碧松桂無赤日風物饒清激逍遥展幽韻參差逗良覿道勝不知疲冥搜自無斁曠然青霞抱永矣白雲適崆峒非凡鄉蓬瀛在仙籍無言從逺尚還思君子識一作兹焉與之敵波濤潄古岸鏗鏘辨竒石靈響非外求殊音自中積人皆走煩濁君能致虚寂何以袪擾擾叩調清淅淅既懼豪華損誓從詩書益一舉獨往姿再揺飛遁跡山深有變異意愜無驚惕采翠奪日月照曜迷晝夕松齋何用掃蘿院自然滌業峻謝煩蕪文髙追古昔暫遥朱門戀終立青史績物表易淹留人間重離析難隨洞庭酌且醉横塘席越中山水日一作動覺耳目勝我來山水州蓬瀛若髣髴田一作四野如泛浮碧嶂幾千遶清泉一作源萬餘流莫窮合沓步孰盡𣲖别遊越水淨難汚越天隂易収氣鮮無隠物目視逺更周舉俗一作族媚葱蒨連冬擷芳柔菱湖有餘翠茗圃無荒疇賞異忽已逺探竒誠淹留永言終南色去矣銷人憂春集越州皇甫秀才山亭嘉賔一作嘉誘一作善友在何處置亭春山巔顧余寂寞者謬厠芳菲筵視聴日澄澈聲光坐連綿晴湖瀉峯嶂翠浪多萍蘚何以逞髙志為君吟秋天一作秋篇和皇甫判官遊琅琊溪山中琉璃境物外琅琊溪房廊逐巖壑道路隨髙低碧瀨潄白石翠煙含青蜺客來暫遊踐意欲忘簪珪樹杪燈火夕雲端鐘梵齊時同雖可仰跡異難相攜唯當清宵夢髣髴願一作期攀躋孟東野詩集巻四
