body:
  text: 孟東野詩集别集類一唐提要臣等謹案孟東野詩集十巻唐孟郊撰宋宋敏求編前有敏求序稱世傳其集汴吳鏤本五巻一百二十四篇周安惠本十巻三百三十一篇蜀人蹇濬所纂凡二巻一百八十篇取韓愈贈郊句名之曰咸池集自餘諸家所襍録不為編帙諸本各異敏求總括遺逸刪除重複分十四類編輯得詩五百一十一篇又以襍文二篇附于後共為十巻即此本也郊詩託興深微而結體古奥唐人自韓愈以下莫不推之自蘇軾空螯小魚之誚始有異詞元好問論詩絶句乃有東野窮愁死不休髙天厚地一詩囚之句當以蘇尚俊邁元尚髙華門徑不同故是丹非素究之郊詩品格不以二人之論減價也乾隆四十二年八月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀孟東野詩集原序東野詩世傳汴吳鏤本五巻一百二十四篇周安惠本十巻三百三十一篇别本五巻三百四十篇蜀人蹇濬用退之贈郊句纂咸池集二巻一百八十篇自餘不為編秩雜録之家家自異今總括遺逸擿去重複若體製不類者得五百一十一篇釐别樂府感興詠懷遊適居處行役紀贈懷寄酬荅送别詠物雜題哀傷聯句十四種又以贊書二系于後合十巻嗣有所得當次篇益諸十聯句見昌黎集章章於時此不著云集賢校理常山宋敏求序
