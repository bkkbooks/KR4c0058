body:
  text: 孟東野詩集巻五唐孟郊撰遊適下汝州南潭陪陸中丞公燕一雨百泉漲南潭夜來深分明碧沙底寫出青天心逺客洞庭至因兹滌煩襟既登飛一作青雲舫願奏清風琴髙岸立旗㦸潛蛟失一作㸦浮沈威稜護斯浸魍魎逃所侵山態變初霽水聲流清音耳目極眺聴潺湲與嶔岑誰言柳太守空有白蘋吟汝州陸中丞席喜張從事至同賦十韻汝水無濁波汝山饒竒石大賢為此郡佳士來如積有客乘白駒奉義愜所適清風蕩華館雅瑟泛瑶席芳醑静無喧金樽光有滌縱情孰慮損聴論自招益願折若木枝却彼曜靈夕貴賤一相接一作憂憂一作情悰忽轉易㑹合勿言輕别離古來惜請君駐征車良遇難再覿夜集汝州郡齋聴陸僧辯彈琴康樂寵詞客清宵意無窮徴文北山一作牕外借月南樓中千里愁併盡一樽歡暫同胡為戛楚琴一作瑟淅瀝起寒風同年春燕少年三十士嘉㑹良在兹髙歌揺春風醉舞摧花枝意蕩晼晚景喜凝芳菲時馬跡攅騕䮍樂聲韻參差視聴改舊趣物象含新姿紅雨花上滴緑煙柳際垂淹中講精義南皮獻清詞前賢與今人千載為一期明鑒有皎潔澄玉無磷緇永與沙泥别各整雲漢儀盛氣自中積英名日四馳塞鴻絶儔匹海月難等夷鬱抑忽已盡親朋樂無涯幽蘅發空曲芳杜綿所思浮跡自聚散壯心誰别離願保金石志無令有奪移羅氏花下奉招陳侍御眼在枝上春落地成埃塵不是風流者誰為攀折人寧辭波浪濶莫道往來頻拾紫豈宜晚掇芳須及晨勞収賈生淚强起屈平身花下本無俗酒中别有神遊蜂不飲故戲蝶亦争新萬物盡如此過時非所珍遊石龍渦四壁千仞散泉如雨石龍不見形石雨如散星山下晴皎皎山中隂泠泠水飛林木杪珠綴莓苔屏蓄異物皆别當晨景欲暝泉芳春氣碧松月寒色青險一作隂力此獨壯猛獸亦不停日暮且迴去浮心恨一作尚未寧浮石亭曽是風雨力崔嵬漂來時落星夜皎潔近榜朝逶迤翠瀲遞明滅清潨㵼欹危況逢蓬島仙㑹合良在兹㸔花五首家家有一作如芍藥不妨至溫柔溫柔一同女紅笑笑不休月娥雙雙下楚豔枝枝浮洞裏逢仙人一作幸逢仙人立綽約青一作清宵遊芍藥誰為壻人人不敢來唯應待詩老日日殷勤開玉立無氣力春凝且徘徊將何謝青春痛飲一百杯芍藥吹欲盡無奈曉風何餘花欲誰待唯待諫郎過諫郎不事俗黄金買髙歌髙歌夜更清花意晚更多飲之不見底醉倒深江波江波蕩諫心諫心終無他獨遊終難醉挈榼徒經過閑花不解語勸得酒無多三年此村落春色入心悲料得一孀婦經一作他時獨淚垂濟源春太行横偃脊百里芳崔嵬濟濵花異顔枋口雲如裁新畫彩色濕上界光影來深紅縷草木淺碧珩泝洄千家門前飲一道傳禊杯玉鱗吞金鈎仙璇琉璃開朴童茂言語善俗無驚倩狂吹寢恒宴曉清夢先迴治生鮮惰夫積學多深材再遊詎癲戅一洗驚塵埃濟源寒食七首風巢嫋嫋春鵶鵶無子老人仰面嗟柳弓葦箭一作篙矢覷不見髙紅逺緑勞相遮女嬋一作蟬童子黄短短耳中聞人惜春晚逃蜂匿蝶踏地來抛却齋麋一瓷椀一日踏春一百迴朝朝没脚走芳埃饑童餓馬掃花餵向晚飲溪三兩杯莓苔井上空相憶轆轤索斷無消息酒人皆倚春鬚緑病叟獨藏秋髮白長安落花飛上天南風引至三殿前可憐春物亦朝謁唯我孤吟渭水邊枋口花間掣手歸嵩陽一作山為我留一作駐紅暉可憐躑躅千萬尺柱地柱天疑一作今欲飛蜜蜂為主各磨牙咬盡村中萬木花君家甕甕今應滿五色冬籠甚可誇遊枋口二首一步復一步出行一作行路千里幽為取山水意故作寂寞遊太行青巔髙枋口碧照浮明明無底鏡泛泛忘機鷗老逸不自限病狂不可周恣閑饒淡薄怠玩多淹留芳物競晼晚緑梢挂新柔和友鶯相遶言語亦以稠一作和友鶻相逺飛鷹亦以稠始知萬類然静躁難相求聳我殘病骨健如一仙人鏡中照千里鏡浪洞百神此神日月華不作尋常春三十夜皆明四時晝恒新鳥聲盡依依獸心亦忻忻澄幽出所怪閃異坐微絪可來復可來此地靈相親與王二十一員外涯遊枋口柳溪萬株古柳根挐此磷磷溪野榜多屈曲仙潯無端倪春桃散紅煙寒竹含晚淒曉聴忽以異芳樹安能齊共疑落鏡中坐泛紅景低水意酒易醒浪情事非迷小儒峭章句大賢嘉提攜潛竇韻靈瑟翠崖鳴玉珪主人稷卨翁徳茂芝术畦鑿出幽隠端氣象皆昇躋曽是清樂抱逮兹幾省溪宴位席蘭草濫觴驚鳧鷖靈味薦魴瓣金花屑橙韲江調擺衰俗洛風逺塵泥徒言奏狂狷詎敢忘筌蹄與王二十一員外涯遊昭成寺洛友寂寂約省騎霏霏塵遊僧步晚磬話茗含芳春一作茵瑶䇿氷入手粉壁畫瑩神頳廊芙蓉霽碧殿琉璃津一作勻𤣥講島一作海岳盡淵詠文字新屢笑寒竹讌況接青雲賔顧慙餘眷下衰瘵嬰殘身嵩少沙彌舞袈裟走向躑躅飛閑步亦惺惺芳援相依依噎塞春咽喉蜂蝶事光輝羣嬉且已晚孤引將何歸流豔去不息朝英亦疎微旅次洛城東水亭水竹色相洗碧花動軒楹自然逍遥風蕩滌浮競情霜落葉聲燥景寒人語清我來招隠亭衣上塵暫輕洛橋晚望天津橋下氷初結洛陽陌上人行絶榆柳蕭疎樓閣閑月明直見嵩山雪居處北郭貧居進乏廣莫力退為䝉瀧一作籠居三年失意歸四向相識疎地僻草木壯荒條扶我廬夜貧燈燭絶明月照吾書欲識貞静操秋蟬飲清虚題陸鴻漸上饒新開山舍驚彼武陵狀移歸此巖邊開亭擬貯雲鑿石先得泉嘯竹引清吹吟花成一作討新篇乃知髙潔情擺落區中縁題韋承總吳王故城下幽居韋生相門子孫才飽身自貴巷荒門豈貧韋生堪繼相孟子願依鄰夜思琴一作酒語切晝情茶味新霜枝留過鵲一作鶴風竹掃䝉塵郢唱一聲發呉花千片春對君何所得歸去覺情真一作貞蘇州崑山惠聚寺僧房昨日到上方片雲掛石牀錫杖莓苔青袈裟松栢香晴磬無短韻古燈含永光有時乞鶴歸還訪一作放逍遥場題從叔述靈巖山壁換却世上心獨起山中情露衣凉且鮮雲䇿髙復輕喜見夏日來變為松景清每將逍遥聴不厭颼飀聲逺念塵末宗未疎俗閒名桂枝一作科妄舉手一作意萍路空勞生仰謝開淨絃相招時一鳴題林校書花嚴寺書牕隠詠不誇俗問禪徒淨居翻將白雲字一作寺寄向青蓮書擬古投松坐就明開紙疏昭昭一作綿綿南山景獨與心相如藍溪元居士草堂市井不容義義歸山谷中夫君宅松桂招我棲䝉籠人朴情慮肅境閑一作開視聴空清溪宛轉水脩竹徘徊風木倦採樵子土勞稼穡翁讀書業雖異敦本志亦同藍岸青漠漠藍峯碧崇崇日昬各命酒一作返寒蛩鳴蕙叢一作寒鹿鳴荒叢新卜青羅幽居奉獻陸大夫黔婁住何處仁邑無餒一作饑寒豈誤舊羇旅變為新閑安二頃有餘食三農行可觀籠禽得髙巢轍鮒還層瀾翳翳桑柘墟紛紛田里歡兵戈忽消散耦耕非艱難嘉木偶良酌芳隂庇清彈力農唯一事趨世徒萬端静覺本相厚動為末所殘此外有餘暇鋤荒出幽蘭酬孟十二新居見寄陸長源大道本夷曠髙情亦冲虛因隨白雲意偶逐青羅居青羅分䝉密四序無慘舒餘清濯子襟散彩還吾廬去嵗登美第榮名在公車將必繼管蕭豈唯躡應徐首夏尚清和殘芳遍邱墟褰幃暎牕柳汲井滋園蔬達者貴知心古人不願餘愛君蔣生逕且著茂陵書題韋少保静恭宅藏書洞髙意合天製自然狀無窮仙華凝四時玉蘚生數峯書秘漆文字匣藏金蛟龍閑為氣候肅開作雲雨濃洞隠諒非久巖夢誠必通將綴文士集貫就真珠叢生生亭灘閙不妨語跨溪仍一作宜置亭置亭嵽嵲頭開牕納遥青遥青新畫出三十六扇屏裊裊立平地稜稜浮髙冥一日數開扉仙閃目不停徒誇逺方岫曷若中峯靈拔意千餘丈浩言永堪銘浩言無愧同愧同忍醜醒致之未有力力在君子聴寒溪八首霜一作路洗水色盡寒溪見纎鱗幸臨虚空鏡照此殘悴身潛滑不自隠露底瑩更新豁如君子懷曽是危陷人始明淺俗心夜結朝已津淨潄一掬碧逺消千慮塵始知泥步泉莫與山源鄰洛陽岸邊道孟氏莊前溪舟行素氷拆一作舟行芰荷折聲作清瑶嘶緑水結緑玉白波生白珪明明寶鏡中物物天照齊仄步下危曲攀枯聞孀啼霜芬一作宿霧稍消一作蕭索歇凝景微茫齊癡坐直視聴戅行失蹤蹊岸童斸棘勞語言多悲悽曉飲一杯酒踏雪過清溪波瀾凍為刀剸割鳧與鷖宿羽皆翦棄血聲沈沙泥獨立欲何語黙念心酸嘶凍血莫作春作春生不齊凍血莫作花作花發孀啼幽幽棘針村凍死難耕犂篙工磓玉星一路隨迸螢朔凍哀澈底獠饞咏潛鯹氷齒相磨嚙風音酸鐸鈴清悲不可逃洗出纎悉聴碧瀲巻已盡彩縷飛飄零下躡滑不定上棲折難停哮嘐呷喢寃仰訴何時寧一曲一直水白龍何鱗鱗凍飈雜碎號韲音坑谷辛柧椾吃無力飛走更相仁猛弓一折絃餘瑞争來賔大嚴闕二字立小殺不復陳皎皎何皎皎氲氲復氲氲瑞精刷日月髙碧開星辰獨立兩脚雪孤吟千慮新天欃徒昭昭箕舌虛齗齗堯聖不聴汝孔微亦有臣諫書竟成章古義終難陳因凍死得食殺風仍不休以兵為仁義仁義生刀頭刀頭仁義腥君子不可求波瀾抽劒氷相劈如仇讎大雪入魚心魚心明愀愀怳如罔兩説似訴割切由誰使異方氣入此中土流翦盡一月春閉為百谷幽仰懷新霽光下照疑憂愁溪老哭甚寒涕泗氷珊珊飛死走死形雪裂紛心肝劒刃凍不割弓絃彊難彈常聞君子武不食天殺殘劚玉掩骼胔吊瓊哀䦨干溪風擺餘凍溪景銜明春玉消花滴滴虬解光鱗鱗懸步下清曲消期濯芳津千里氷裂處一勺暖亦仁凝精㸦相洗漪漣競將新忽如劒瘡盡初起百戰身立徳新居十首立徳何亭亭西南聳髙隅陽崖洩春意井圃留冬蕪勝引即紆道幽行豈通衢碧峯逺相揖清思誰言孤寺秩雖未貴家醪良可哺聳城架霄漢潔宅涵絪緼開門洛北岸時鎖嵩陽雲夜髙星辰大晝長天地分厚韻屬疎語薄名謝􅅝聞兹焉有殊隔永矣難及羣賔秩已覺厚私儲常恐多清貧聊自爾素責將如何儉教先勉力修襟無餘他良棲一枝木靈巢片葉荷仰笑鵾鵬輩委身拂天波疎門不掩水洛邑寒更髙曉碧流視聴夕清濯衣袍為於仁義得未覺登陟勞逺岸雪難暮勁枝風易號霜禽各嘯侣吾亦愛吾曹﨑嶇有懸步委曲饒荒尋逺樹足良木疎巢無争禽素魄銜夕岸綠水生曉潯空曠伊洛視髣髴瀟湘心何必尚逺異憂勞滿行襟懸途多仄足﨑圃無脩畦芳一作霜蘭與宿艾手擷心不迷品子懶讀書轅駒難服犁虛食日相役奔腸詎能低恥從新學遊願將古農齊都城多聳秀愛此髙縣居伊雒遶街巷鴛鴦飛閻閭翠景何的礫霜颸飄空虚突出萬家表獨治二畝蔬一作餘一旬一手版十日九手鋤手鋤手自朂激勸亦已饒畏彼梨栗兒空資玩弄驕夜景卧難盡晝光坐易消治舊得新義耕荒生嘉苖鋤治苟愜適心形俱逍遥玉蹄裂鳴水金綬忽照門拂拭貧士席拜候丞相軒徳疎未為髙禮至方覺尊豈惟耀兹日可以榮逺孫如何一陽朝獨荷衆瑞繁東南富水木寂寥蔽光輝此地足文字及時隘驂騑仄雪踏為平澀行變如飛令畦生氣色嘉緑新霏微天意資厚養賢人肯相違末二章冬至日鄭相至門以屬意在焉
