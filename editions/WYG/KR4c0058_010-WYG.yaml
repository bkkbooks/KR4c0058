body:
  text: 孟東野詩集巻十唐孟郊撰哀傷弔國殤徒言人最靈白骨亂縱横如何當春死不及羣草生堯舜宰乾坤器農不器兵秦漢盜山岳鑄殺不鑄耕天地莫生金生金人競爭弔比干墓殷辛帝天下厭為天下尊乾綱既一㫁賢愚無二門佞是福身本忠是喪己源餓虎不食子人無骨肉恩日影不入地下埋寃死魂有骨不為土應作直木根今來過此鄉下馬吊此墳静念君臣間有道誰敢論弔元魯山十首摶鷙有餘飽魯山長饑空豪人飫鮮肥魯山飯蒿蓬食名皆霸官食力皆堯農君子恥新態魯山與古終天璞本平一人巧生異同魯山不自剖全璞竟没躬一作窮自剖多是非流濫将何歸奔競一作損􅀈立詭節凌侮爭怪輝五常坐銷鑠萬類隨衰微以兹見魯山道蹇無所依君子不自蹇魯山蹇有因苟含天地秀皆是天地身天地蹇既甚魯山道莫伸天地氣不足魯山食更貧始知補元化竟須得賢人賢人多自霾道理與俗乖細功不敢言逺韻方始諧萬物飽為飽萬人懷為懷一聲苟失所衆憾來相排所以元魯山饑衰難與偕逺階無近級造次不可昇賢人絜腸胃寒日空澄凝血誓竟訛繆膏明易煎蒸以之驅魯山疎迹去莫乗言從魯山宦盡化堯時心豺虎恥狂噬齒牙閉霜金一作針競來闢田土相與耕嶔岑當宵無關鎖竟嵗饒歌吟善敎復一作履天術美詞非俗箴精微自然事視聽不可尋因書魯山績庶合簫韶音簫韶太平樂魯山不虚作千古若有知百年幸如昨誰能嗣敎化以此洗浮薄君臣貴深遇天地有靈槖力運既艱難徳符方合莫名位苟虚曠聲明自銷鑠禮法雖相救貞濃易糟粕哀哀元魯山畢竟誰能度當今富敎化一作聖朝禮嘉士元后得賢相氷心鏡衰古霜議清遐障幽埋盡光洗滯旅免流浪唯餘魯山名未獲旌亷讓二三貞苦士刷視聳危望髮秋青山夜目㫁丹闕亮誘類幸從兹嘉招固非妄小生奏狂狷感惕増萬狀黄犢不知孝魯山自駕車非賢不可妻魯山竟無家供養恥他力言詞豈纎瑕将謡魯山徳賾海誰能涯遺嬰盡雛乳何況肉骨枝心腸結苦誠胷臆垂甘滋事已出古表誰言獨今竒賢人母萬物愷悌流前詩哭李觀志士不得老多為直氣傷阮公終日哭壽命固難長顔子既殂謝孔門無輝光文星落竒曜寶劒摧脩芒常作金應石忽為宫别商為爾弔琴瑟㫁絃難再張偏轂不可轉隻翼不可翔清塵無吹嘘委地難飛揚此義古所重此風今已亡自聞喪元賔一日八九狂沈痛此丈夫驚呼彼穹蒼我有出俗韻勞君疾惡腸知音既已矣微言一作善誰能彰旅葬無髙墳栽一作孤松不成行哀歌動寒日贈淚沾晨霜神理本窅窅一作冥冥今來更茫茫何以蕩悲懷萬事付一觴李少府㕔吊李元賔遺字元賔題少府㕔云宿從叔宅有感有其義而無其辭零落三四字忽成千萬年那知冥寞客不有補亡篇斜月弔空壁旅人難獨眠一生能㡬時百慮來相煎戚戚故交淚幽幽長夜泉已矣難重言一言一澘然悼呉興湯衡評事君生一作在霅水清君殁霅水渾空令骨肉情哭得白日昬大夜不復曉古松長閉門琴絃緑水絶詩句青山存昔為芳春顔今為荒草根獨問冥冥理先儒未曽言哀孟雲卿嵩陽荒居戚戚抱幽獨晏晏沈荒居不聞新歡笑但覩舊詩書藝蘗意彌苦耕山食無餘定交昔何在至戚今或疎薄俗易銷歇淳風難久舒秋蕪上空堂寒槿落枯渠薙草恐傷蕙攝衣自理鋤殘芳亦可餌遺秀誰忍除徘徊未能去為爾涕漣如哭盧貞國一别難與期存亡易寒燠下馬入君門聲悲不成哭自能富才藝當兾深榮禄皇天負我賢遺恨至兩目平生嘆無子家事親相囑傷舊遊去春㑹處今春歸花數不減人數稀朝笑片時暮成泣東風一向還西輝弔房十五次卿少府日髙方得起獨賞些些春可惜宛轉鶯好音與他人昔年此氣味還走曲江濵逢著韓退之結交方殷勤蜀客骨目髙聰辯劒㦸新如何昨日歡今日見無因英竒一謝世視聽一為塵誰言老淚短淚短沾衣巾一作足沾巾逢江南故晝上人㑹中鄭方回上人往年手札五十篇相贈云以為他日之念相逢失意中萬感因語至追思東林日掩抑北邙淚筐筴有遺文江山舊清氣塵生逍遙注一作篇墨故飛動字荒毁碧澗居虚無青松位珠沈百泉暗月死羣象閟永謝平生言知音豈容易哭秘書包大監哲人卧病日賤子泣玉年常恐寳鏡破明月難再圓文字未改素聲容忽歸𤣥始知知音稀千載一絶絃舊館有遺琴清風那復傳悼幼子一閉黄蒿門不聞白日事生氣散成風枯骸化為地負我十年恩欠爾千行淚灑之北原上不待秋風至悼亡山頭明月夜増輝増輝不照重泉下泉下雙龍無再期金蠶玉燕空銷化朝雲暮雨成古墟蕭蕭野竹風吹亞弔李元賔墳曉上荒凉原弔彼冥寞魂眼咽此時淚耳悽在日言寂寂千萬年墳鎖孤松根覽崔爽遺文因抒幽懷崔君殁于南方墮淚數首文悲結千里墳蒼旻且留我白日空遺君仙鶴未巢月衰鳯先墜雲清風獨起時舊語如再聞瑤草罷葳蕤桂花休氛氲萬物與我心相感呉江濆峽哀十首昔多相與笑今誰相與哀峽哀哭幽魂一作夢噭噭風吹來墮魄抱空月出没難自裁韲粉一閃間春濤百丈一作尺雷峽水聲不平碧沲牽清洄沙􅀈箭箭一作湔湔急波齒齗齗開呀彼無底吮待此不測災谷號相噴激石怒爭旋迴古醉有復鄉今縲多為能字孤徒髣髴銜雪猶驚猜薄俗少直腸交結須横財黄金買相弔幽泣無餘漼我有古心意為君空摧頽上天下天水出地入地舟石劒相劈斫石波怒蛟虬花木疊宿春風飈凝古秋幽怪窟穴語飛聞􅆄蠁流沈哀日已深銜訴将何求三峽一線天三峽萬繩泉上仄碎日月一掣狂漪漣破魄一兩㸃凝幽千百年峽暉不停午峽險多饑涎樹根鎖枯棺孤骨褭褭懸樹枝哭霜棲哀韻杳杳鮮逐客零落腸到此湯火煎性命如紡績道路隨索縁奠淚弔一作酹波靈波靈将閃然峽亂鳴清磬一作峽虬鳴清聲産石為鮮鱗噴為腥雨涎吹作黒井身怪光閃衆異餓劒唯待人老腸未曽飽古齒嶄嵓嗔嚼齒三峽泉三峽聲齗齗峽螭一作蛟老解語百丈潭底聞毒波為計校飲血養子孫既非臯陶吏空食沈獄一作玉魂潛怪何幽幽魄說徒云云峽聽哀哭泉峽弔鰥寡猿峽聲非人聲劒水相劈翻斯誰士諸謝奏此沈苦言讒人峽虬心渇罪呀然潯所食無直腸所語饒梟音石齒嚼百泉石風號千琴幽哀莫能逺分雪何由尋月魄一作魂髙卓卓峽窟一作寃清沈沈銜訴何時明抱痛已不禁犀飛空波濤裂石千嶔岑峽稜剸日月日月多摧輝物皆斜仄生鳥亦斜仄飛潛石齒相鎖沈魂招莫歸恍惚清泉甲斑斕碧石衣餓嚥潺湲號涎似泓汯肥峽春不可遊腥草生微微峽景滑易墮峽花怪非春紅光根潛涎碧雨飛沃津巴谷蛟螭心巴鄉魍魎親噉生不問賢至死獨養身腥語信者誰拗歌歡非真仄田無異稼毒水多獰鱗異類不可友峽哀哀難伸峽水劒㦸獰峽舟霹靈翔因依虺蜴手起坐風雨忙峽旅多竄官峽氓多非良滑心不可求滑習積已長漠漠涎霧起齗齗涎水光渇賢如之何忽在水一作此中央梟䲭作人語蛟虬吸山波能於白日間諂欲晴風和駭智蹶衆命藴腥布深蘿齒泉無底貧鋸涎在處多仄樹鳥不巢踔􅨬猿相過峽哀不可聽峽怨其奈何杏殤九首并序杏殤花乳也霜翦而落因悲昔嬰故作是詩凍手莫弄珠弄珠珠易飛驚霜莫翦春翦春無光輝零落小花乳斕斑昔嬰衣拾之不盈把日暮空悲歸地上空拾星枝上不見花哀哀孤老人戚戚無子家豈若没水鳧不如拾巢雅浪鷇破便飛風雛裊相誇芳嬰不復生向物空悲嗟應是一線淚入此春木心枝枝不成花片片落翦金春壽何可長霜衰亦已深常時洗芳泉此日洗淚襟兒生月不明兒死月始光兒月兩相奪兒命果不長如何此英英亦為弔蒼蒼甘為墮地塵不為末世一作世木芳踏地恐土痛損彼芳樹根此誠天不知翦棄我子孫垂枝有子落芳命無一存誰謂生人家春色不入門冽冽霜殺春枝枝疑纎刀木心既零落山竅空呼號斑斑落地英㸃㸃如明膏始知天地間萬物皆不牢哭此不成春淚痕三四斑失芳蝶既狂失子老亦孱且一作豈無生生力自有死死顔靈鳯不銜訴誰為扣天關此兒自見災花發多不諧窮老收碎心永夜抱破懷聲死更何言意死不必喈病叟無子孫獨立猶束柴霜似敗紅芳翦啄十數雙參差呻細風噞喁沸一作􅃧淺缸泣凝一作疑不可消一作誚恨壯難自降空遺舊日影怨彼一作此小書窻弔江南老家人春梅念爾筋力盡違我衣食恩奈何麤獷兒生鞭見死痕舊使常以禮新怨一作寃将誰吞胡為乎泥中一作上天消歇敎義源哭李丹一作舟員外并寄杜中丞生死方知交態存忍将齚齖報幽魂十年同在平原客更遣何人哭寢門哭劉言史詩人業孤峭餓死良已多相悲與相笑累累其奈何精異劉言史詩腸傾珠河取次抱置之一作為抛擲飛過東溟波可惜大國謠飄為四夷歌常於衆中㑹顔色兩切磋今日果成死葬襄一作喪之洛河洛岸逺相弔灑淚雙滂沲弔盧殷十首詩人多清峭餓死抱空山白雲既無主飛出意等閒久病牀席尸䕶喪童僕孱故書窮䑕嚙狼籍一室間君歸新鬼鄉我面古玉一作土顔羞見入地時無人叫追攀百泉空相弔日久一作夕哀潺潺唧唧復唧唧千古一月色新新復新新千古一花春邙風噫孟郊嵩秋葬盧殷北邙前後客相弔為埃塵北邙棘針草淚根生苦辛煙火不自煖筋力早已貧幽薦一杯泣㵼之清洛濵添為㫁腸聲愁殺長别人棘針風相號破碎諸苦哀苦哀不可聞掩耳亦入來哭絃多煎聲恨涕有餘摧噫貧氣已焚噫死心更灰夢世浮閃閃淚波深洄洄薤歌一以去蒿閉不復開登封草木深登封道路微日月不與光莓苔空生衣可憐無子翁蚍蜉縁病肌攣卧嵗時長漣漣但幽噫幽噫虎豹聞此外相訪稀至親唯有詩抱心死有歸河南韓先生後君作因依磨一片嵌巖書千古光輝賢人無計校生苦死徒誇他名潤子孫君名潤泥沙可惜千首文閃如一朝花零落難苦言一作久留起坐空驚嗟耳聞陋巷生眼見魯山君餓死始有名餓名髙氛氲戅叟老壯氣感之為憂雲所憂唯一泣古今相紛紛平生與君説逮此俱云云初識漆鬢髮爭為新文章夜踏明月橋店飲吾曹牀醉啜二杯釀名郁一縣香寺中摘梅花園裏翦浮芳髙嗜緑蔬一作雲羮意輕肥膩羊吟哦無滓韻言語多古腸白首忽然至盛年如偷将清濁俱莫追何須罵滄浪前賢多哭酒哭酒免哭心後賢試銜之哀至無不深少年哭酒時白髮亦以侵老年哭酒時聲韻隨生沈寄言哭酒賔勿作登封音登封徒放聲天地竟難尋同人少相哭異類多相號始知禽獸癡却至天然髙非子病無淚非父念莫勞如何裁親疎用禮如用刀孤喪鮮匍匐閉哀抱鬱陶煩他手中葬誠信焉能褒嗟嗟無子翁死棄如脫毛聖人哭賢人骨化氣為星文章飛上天列宿増晶熒前古文可數今人文亦靈髙名稱謫仙昇降曽莫停有文死更香無文生亦腥為君鏗好辭永傳作謐寧聨句有所思聨句相思繞我心日夕千萬重年光坐晼晚春淚銷顔容郊臺鏡晦舊暉庭草滋新茸望夫山上石别劒水一作池中龍愈遣興聨句我心隨月光冩君庭中央郊月光有時晦我心安所忘愈常恐金石契㫁為相思腸郊平生無百嵗岐路有四方愈四方各異俗適意非所将郊駑蹄顧挫秣逸翮遺稻粱愈時危抱獨沈道泰懷同翔郊獨居久寂黙相顧聊慨慷愈慨慷丈夫志可以耀鋒鋩郊蘧甯知巻舒孔顔識行藏愈朗鑒諒不逺佩蘭永芬芳郊苟無夫子聽誰使知音揚愈贈劒客李園聨句天地有靈術得之者唯君郊築爐地區外積火燒氛氲愈照海鑠幽怪滿空歊異氛郊山磨電奕奕水淬龍蝹蝹愈太一裝以寳列仙篆其文郊可用懾百神豈唯壯三軍愈有時幽匣吟忽似深潭聞郊風胡久已死此劒将誰分愈行當獻天子然後致殊勲郊豈如豐城下空有斗間雲愈讃讃維摩詰貌是古印言是空音在酒不飲在色不淫非獨僧禮亦使儒欽感此補亡書謝懸金書上常州盧使君書道徳仁義天地之常也将有人主張之乎将無人主張之乎曰賢人君子有其位言之可以周天下而行也無其位則周身言之可也周身言之可周天下言之不可也仲尼當時無其位言之亦不可周天下而行也及至著書載其言則周萬古而行也豈唯周天下而已哉仲尼非獨載其言周萬古而行也前古聖賢得仲尼之道則其言皆載之周萬古而行閣下道徳仁義之言已聞周天下誦之久矣其後著書君子亦當載之周萬古而行也幸甚幸甚道徳仁義之言天地至公之道也君子著書期不朽亦天地至公之道夫何讓哉是故不以道徳仁義事其君者以盜賊事其君也不以道徳仁義之衣食養其親者是盜賊養其親也閣下既以道徳仁義事其君聞之天下久矣小子顯求閣下道徳仁義之衣食以為養也謂之中庸之道謂之中庸則敢求也謂之特逹則不敢求小子嘗衣食宣武軍司馬陸大夫道徳仁義之矣陸公既没又嘗衣食此郡前守吏部侍郎韋公道徳仁義之矣韋公既去衣食亦去道徳仁義顯其主張謹載是書及舊文又有子遇之書同乎緘獻輕重可否傾一言陳謝誠兾於異日不宣郊再拜又上養生書天之與人一其道也天地不棄於人人自棄於天天可棄於人乎曰不可人自棄也已曰人皆棄之乎曰賢人君子不棄也凡人棄之可天有殺物之心而無棄物之心天有棄物之心則萬物莫能生矣是故君子之于萬物皆不棄也而況於身乎棄其身是棄其後也棄其後是棄其先也故曰君子之道豈易哉敢不法天而行身乎所以君子養其身養其公也小人養其身養其私也身以及家家以及國國以及天下以公道養天下則天下肥也以私道養天下則天下削也養身之道豈容易哉養其公者天道養也養其私者人情養也以天道養其人則合天矣以人情養其人則不合天矣以人情養其人自棄矣天道質也人情文也天道静也人情動也質者生之侈也静者生之得也動者生之棄也文不以質勝之則文為棄矣動不以静制之則動為棄矣天者水之謂也人者魚之謂也魚棄水則螻蟻得之矣人棄天則疾病得之矣魚可安于水而不可翫于水其失也在乎恣波浪而不迴也人可安于天而不可翫于天其失也在乎恣嗜慾而不迴也所謂安于天者法天之味而食之食不違于四時也法天之聽而聽之聽不違于五節也法天之明而視之視不違于五色也食與視聽苟違于天則疾病得之矣故曰君子法天而行身也小人翫天而棄身也書之座右嵇康猶有所棄秦之醫和晉之杜蒯其亦不書于右則何以為君子之座哉良藥苦口也苦口獲罪於人苟或有矣仁義之獲罪於天未之有也恩養下将逺辭違書冩至誠之言不勝惶悚之甚不宣郊再拜孟東野詩集巻十
