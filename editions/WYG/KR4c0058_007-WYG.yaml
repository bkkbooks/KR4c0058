body:
  text: 孟東野詩集巻七唐孟郊撰懷寄寄張籍夜鏡不照物朝光何時昇黯然秋思來一作暗然愁氣來走入志士膺志士惜時逝一宵三四興清漢徒自朗濁河終無澄舊愛忽已逺新愁坐相凌君其隠壯懷我亦逃名稱古人貴從晦君子忌黨朋傾敗生所競保全歸矒矒一作苦情浮雲何當來潛虬㑹飛騰憶周秀才素上人時聞各在一方東西分我情魂夢安能定野客雲作心髙僧月為性浮雲自髙閑明月常空淨衣敝得古風居山無俗病吟聽碧雲語手把青松柄羨爾欲寄書飛禽杳難倩舟中喜遇從叔簡别後寄上時從叔初擢第歸江南郊不從行一意兩片雲暫合還却分南雲乗慶歸北雲與誰羣寄聲千里風相喚聞不聞懷南岳隠士二首見説祝融峯擎天勢似騰藏千尋布水出十八髙僧古路無人跡新霞吐石稜終居将爾叟一一共余登千峯映碧湘真叟此中藏飯不煑石喫眉應似髮長楓梩榰酒甕鶴虱落琴牀強效忘機者斯人尚未忘春夜憶蕭子真半夜不成寐燈盡又一作夕無月獨向堦前立子規啼不歇况我有金蘭忽爾為胡越爭得明鏡中久長無白髮寄院中諸公奕奕秋水傍駸駸緑雲蹄月仙有髙曜靈鳯無卑棲翠色逺雲谷碧華凝月溪竹林遞歴覽雲寺行攀躋冠豸猶屈蠖匣龍期剸犀千山驚月曉百里聞霜鼙戎府多秀異謝公期相攜因之仰羣彦養拙固難齊寄洺州李大夫自從薊師反中國事紛紛儒道一失所賢人多在軍鳥巢憂迸射鹿耳駭驚聞劍折唯恐一作怨匣一作匠弓貪不讓勲方知省事将動必謝前羣鸛陣常先罷魚符最晚分步閑洺水曲笑激太行雲詩叟未相識竹兒爭見君殷勤越談説記盡古風文寄盧䖍使君霜露再相換遊人猶未歸嵗新月改色客久線㫁衣有鶴氷在翅竟久力難飛千家舊素沼昨日生緑輝春色若不一作可借為君步芳菲寄崔純亮百川有餘水大海無滿波器量各相懸賢愚不同科羣辯有姿語衆歡無一作有行歌唯餘洛陽子鬱鬱恨常多時讀過秦篇為君涕滂沱汴州離亂後憶韓愈李翺㑹合一時哭别離三㫁腸殘花不待風春盡各飛揚歡去收不得悲來難自防孤門清館夜獨臥明月牀忠直血白刃道路聲蒼黄食恩三千士一旦為豺狼海島士皆直夷門士非良人心既不類天道亦反常自殺與彼一作被殺未知何者臧寄張籍未見天子面不如雙盲人賈生對文帝終日猶悲辛夫子亦如盲所以空泣麟有時獨齋心髣髴夢稱臣夢中稱臣言覺後真埃塵東京有眼富不如西京無眼貧西京無眼猶在耳隔牆時聞天子車聲之轔轔轔轔車聲輾氷玉南郊壇上禮百神西明寺後窮瞎張大祝縱爾有眼誰爾珍天子只尺不得見不如閉眼且養真寄義興小女子江南莊宅淺所固唯疎籬小女未解行酒弟一作病叔老更癡家中多呉語教爾遙可知山恠夜動門水妖時弄池所憂癡酒腸不解委曲辭漁妾性崛強耕童手皴釐想兹為襁褓如鳥拾柴枝我詠元魯山胷臆流甘滋終當學自乳起坐常相隨憶江南弟白首眼垂血望爾唯夢中筋力強起時魂魄猶在東眼光寄明星起來東望空望空不見人江海波無窮衰老無氣力呼叫不成風孑然憶憶言落地何由通常師共被教竟作生離翁生離不可訴上天亦曽聰未忍對松栢自鞭殘朽躬自鞭亦何益知教非所崇努力柱杖來餘活與爾同不然死後恥遺死亦有終宿空姪院寄澹公夜坐冷竹聲二三髙人語燈窻看律鈔小師别為侣雪簷晴滴滴茗椀華舉舉磬音多風飈聲韻聞江楚官街不相隔詩思空愁予明日䇿杖歸去住兩延佇寄陜府鄧一作竇給事陜城臨大道館宇屹㡬鮮候謁隨芳一作方語鏗詞芬蜀牋從來鏡目下見盡道心前自謂古詩量異一作兾将新學偏戅人年六十每月請三千不敢等閑用願為長壽錢非關亦潔爾将以救羸然孤省癡皎皎黙吟寫綿綿病書慿晝日驛信寄宵鞭疾訴将何喻肆鱗今倒懸塵鯉見枯浪土鬛思乾泉感感無緒蕩愁愁作闕邉貞元文祭酒即陽公比謹學韋𤣥滿座無風雜當朝雅獨全見知囑徐􅐐即徐端公賞句類陶淵一顧生鴻羽再言将鶴翩宣陽隘車馬君子凑駢闐曽是此同睠至今應賜憐磨墨零落淚楷字貢仁賢送諫議十六叔至孝義渡後奉寄曉渡明鏡中霞衣相飄䬙浪鳧驚亦雙蓬客将誰僚别飲孤易醒離憂壯難銷文清雖無敵儒貴不敢驕江吏捧紫泥海旗翦紅蕉分明太中禮跨躡毘陵橋伊洛去未迴遐矚空寂寥至孝義渡寄鄭軍事唐二十五咫尺不得見心中空嗟嗟官街泥水深下脚道路斜嵩少玉峻峻伊雒碧華華岸亭當四迥詩老獨一家洧一作􅀈叟何所如鄭食唯有些何當來説事為君開流霞酬荅荅友人白日照清水淺深無隠姿君子業髙文懐抱多正思砥行碧山石結交青松枝碧山無轉易青松難傾移落落出俗韻琅琅大雅詞自非隨氏掌明月安能持千里不可倒一返無近期一作一别無迴期如何非意中良覿忽在兹道語必疎淡儒風易凌遲願存堅貞節勿為霜霰欺酬友人見寄新文為客棲未定況當𤣥月中繁雲翳碧霄落雪和清風郊陌絶行人原隰多飛蓬耕牛返村巷野鳥依房櫳我無饑凍憂身託蓮花宫安閑賴禪伯復得疎塵䝉覽君郢曲文詞彩何沖融謳吟不能已頓覺形神空荅韓愈李觀别因獻張徐州富别愁在顔貧别愁銷骨懶磨舊銅鑑畏見新髮白古樹春無花子規啼有血離絃不堪聽一聽四五絶世途非一險俗慮有千結有客步大方驅車獨迷轍故人韓與李逸翰雙皎潔哀我摧折歸贈詞縱横設徐方國東樞元戎天下傑禰生一作衡投刺遊王粲吟詩謁髙情無遺照朗一作明抱開曉月有土一作在七不埋寃有讎皆為雪願為直一作竒草木永向君地列願為古琴瑟永向君聽一作前發欲識丈夫心曽将孤劒説荅晝上人止讒作烈烈鸑鷟吟鏗鏗琅玕音梟摧明月嘯鶴起清風心渭水不可渾涇流徒相侵俗侣唱桃葉隠仙一作士鳴桂琴子野真遺却浮淺藏淵深荅姚怤見寄日月不同光晝夜各有宜賢哲不苟合出處亦待時而我獨迷見意求異士知如将舞鶴管誤向驚鳧吹大雅難具陳正聲易漂淪君有丈夫淚泣人不泣身行吟楚山下一作玉義淚沾衣巾荅郭郎中松栢死不變千年色青青志士貧更堅守道無異營每彈瀟湘瑟獨抱風波聲中有失意吟知者淚滿纓何以報知者永存堅與貞荅盧䖍故園見寄訪舊無一人獨歸清雒春花聞一作開哭聲死水見别容新亂後故鄉宅多為行路塵因悲楚左右謗玉不知珉汝墳䝉從弟楚材見贈時郊将入秦楚材適楚朝為主人心夕作行客吟汝水忽凄咽汝風流苦音北闕秦門髙南路一作山楚石深分淚灑白日離腸繞青岑何以寄逺懐一作我書黄鶴能相尋同從叔簡酬盧殷少府梅尉吟楚聲竹風為凄清深虚氷在性髙潔雲入情借水洗閑貌寄蕉書逸名羞将片石文鬭此雙瓊英酬李侍御書記秋夕雨中病假見寄秋風遶衰栁逺客聞雨聲重兹阻良夕孤坐唯積誠果枉移疾詠中含嘉慮明洗滌煩濁盡視聽昭曠生未覺衾枕倦久一作文為章奏嬰達人不寳一作保藥所保在閑情荅盧仝楚屈入水死詩孟踏雪僵直氣苟有存死亦何所妨日劈髙查牙清稜含氷漿前古後古氷與山氣勢強閃恠千石形異狀安可量有時春鏡破百道聲飛揚潜仙一作山不足言朗一作期客無隠腸為君傾海宇日夕多文章天下豈無縁此山雪昻藏煩君前致詞哀我老更狂狂歌不及狂歌聲縁鳯凰鳯兮何當來消我孤直瘡君文真鳯聲宣隘滿鏗鏘洛友零落盡逮兹悲重傷獨自奮一作有異骨将騎白一作玉角翔再三勸莫行寒氣有刀槍仰慙君子多慎勿作芬芳奉報翰林張舍人見遺之詩百蟲笑秋律清削月夜聞曉稜視聽微風翦葉已紛君子鑒大雅老人非俊羣收拾古所棄俛仰補空文孤韻恥春俗餘響逸零雰自然蹈終南滌暑凌寒氛巖霰不知午澗澌鎮含曛曽是醒方醉所以多隠淪江調樂之逺溪謡生徒新衆藴有餘採寒泉空哀呻南謝竟莫至北宋當時珍賾靈各自異酌酒一作聖誰能均昔詠多冩諷今詞詎無因品松位何髙宫殿一作翠宫没荒榛苔趾識宏製沙潨遊崩津忽吟陶淵明此即羲皇人心放出天地形拘在風塵前賢素行階夙嗜青山勤達士立明鏡朗言為近臣将期律萬有傾倒甄無垠鸑鷟應蟋蟀絲毫意皆申况於三千章哀叩不為神送别上送從弟郢東歸爾去東南夜我無西北夢誰言貧别易貧别愁更重曉色奪明月征人逐羣動秋風楚濤髙旅榜将誰共山中送從叔簡赴舉石根百尺杉山眼一片泉倚一作亭之道氣髙飲之詩思鮮於此逍遙塲忽奏别離絃却笑薜蘿子不同鳴躍年送别崔寅亮下第天地唯一氣用之自偏頗憂人成苦吟達士為髙歌君子識一作誠不淺桂枝幽更多嵗晏期攀折時歸且婆娑素質如削一作荆玉清詞若傾一作天河虬龍未化時魚鼈同一波去矣當自適故鄉饒薜蘿大梁送栁淳先入關青山輾為塵白日無閑人自古推髙車爭利西入秦王門與侯門待富不待貧空攜一束書去去誰相親一作空賫一束書獨去将誰親送無懐道士遊富春山水一作送别呉逸士歸山造化絶一作見髙處富春獨多觀山濃翠消灑一作的礫水折珠摧殘溪鏡不隠髮樹衣長遇一作禦寒風猿虚空飛月狖叫嘯酸信此神仙路一作樂豈為時俗安煑金隂陽火一作芙蓉水囚怪星宿壇花發我一作或未識玉生忽藂攅蓬萊浮蕩漾非道相從難送温初下第日落濁水中夜光誰能分髙懐無近趣清抱多逺門欲識丈夫志心藏孤岳雲長安風塵别咫尺不見君送盧䖍端公守復州師曠聽羣木自然識孤桐正聲逢知音願出太朴中知音不韻俗獨立占一作上古風忽挂觸邪冠逮逐南飛鴻肅肅太守章明明華轂熊商山無平路楚水有驚潨日月千里外光隂難載同新愁徒自積良㑹何由通送任齊二秀才自洞庭遊宣城任載齊古并序文章者賢人之心氣也心氣樂則文章正心氣非則文章不正當正而不正者心氣之偽也賢與偽見於文章一直之詞衰代多禍賢無曲詞文章之曲直不由於心氣心氣之悲樂亦不由賢人由於時故今宣州多君子閑暇而寛文章之曲直纎微悉而備舉洞庭二客勉而客去之鼓其風波之詞吾知夫樂莫是行也遂為詩曰洞庭非人境道路行虚空二客月中下一帆天外風魚龍波五色金碧樹千叢閃怪如可懼在誠無不通扣竒驚浩淼採異訪穹崇物表積髙韻人間訪仙公宣城文雅地謝守聲問融證玉易為力辨珉誰不同從兹阮籍淚且免泣途窮送曉公歸庭山一作歸稽亭庭山一作稽亭何﨑嶇寺路縁翠微秋霽山盡出日落人獨歸雲生髙髙步泉灑田田衣枯巢無還羽新水有爭飛兹焉不可繼夢寐空清輝送豆盧䇿歸别墅短松鶴不巢髙石雲不一作始栖君今一作為瀟湘去意一作性與雲鶴齊力買竒險地手開清淺溪身披薜茘衣一作薜蘿襟山陟莓苔梯一巻氷雪文避俗常自攜送清逺上人歸楚山舊寺一作國清上人遊蘇波中出呉境霞際登楚岑水寺一别來雲蘿三改隂詩誇碧雲句道證青蓮心應笑泛萍者一作應憐萍泛者不知松隠深山中送從叔簡莫以手中瓊言邀世上名莫以山中迹久向人間行松栢有霜操風泉無俗聲應憐枯朽質驚此别離情送蕭鍊師入四明山閑於獨鶴心大於髙松年迥出萬物表髙棲四明巔千尋直裂峯百尺倒㵼泉絳雪為我飯白雲為我田静言不語一作話俗靈蹤時步天孟東野詩集巻七
