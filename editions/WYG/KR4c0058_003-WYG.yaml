body:
  text: 孟東野詩集巻三唐孟郊撰感興下亂離天下無義劒中原多瘡痍哀哀陸大夫正直神反欺子路已成血嵇康今尚嗤為君每一慟如劒在四肢折羽不復飛逝水不復歸直松摧髙柯弱蔓將何依朝為春日歡夕為秋日悲淚下無尺寸紛紛天雨絲積怨成疾􅐄積恨成狂癡怨草豈有邊恨水豈有涯怨恨馳我心茫茫日何之勸酒白日無定影清江無定波人無百年壽百年復如何堂上陳美酒堂下列清歌勸君金屈巵勿謂朱顔􅋳嵗嵗松栢茂邱陵日日多君㸔終南山千古青峩峩去婦君心匣中鏡一破不復全妾心藕中絲雖斷猶牽連安知御輪士今日翻迴轅一女事一夫安可再移天君聴去鶴言哀哀七絲絃君子勿鬱鬱士有謗毁者作詩以贈之二首君子勿鬱鬱聴我青蠅歌人間少平地森聳山岳多折輈不在道覆舟不在河須知一尺水日夜増髙波叔孫毁仲尼臧倉掩孟軻蘭艾不同香自然難為和良玉燒不熱直竹文不頗自古皆如此其如道在何日往復不見秋堂暮仍學𤣥髮不知白曉入寒銅覺為林未離樹有玉猶在璞誰把碧梧枝刻作雲門樂聞砧杜鵑聲不哀斷猿啼不切月下誰家砧一聲腸一絶杵聲不為客客聞髮自白杵聲不為衣欲令遊子歸遊子萱草生堂堦遊子行天涯慈親倚堂門不見萱草花自歎愁與髪相形一愁白數莖有髪能幾多禁愁日日生古若不置兵天下無戰争古若不置名道路無欹傾太行聳巍峩是天産不平黄河奔濁浪是天生不清四蹄日日多雙輪日日成二物不在天安能免營營求友北風臨大海堅氷臨河面下有大波瀾對之無由見求友須在良得良終相善求友若非良非良中道變欲知求友心先把黄金鍊投所知苦心知苦節不容一毛髪鍊金索堅貞洗玉求明潔自慙所業微功用如鳩拙何殊嫫母顔對彼寒塘月君存古人心道出古人轍盡美固可揚片善亦不遏朝向公卿説暮向公卿説誰謂黄鍾管化為君子舌一説清嶰竹二説變嶰谷三説四説時寒花拆寒木􅰵􅰵家道路燦燦吾衣服豈直輝友朋亦用慰骨肉一暖荷疋素一飽荷升粟而況大恩恩此身報得足且將食蘖勞酬之作金刀病客吟主人夜呻吟皆入妻子心逺客一作客子晝呻吟徒為蟲鳥音妻子手中病愁思不復深僮僕手中病憂危獨難任丈夫久漂泊神氣自然沈況於滯疾中何人免噓􅀈大海亦有涯髙山亦有岑沈一作此憂獨無極塵淚㸦盈襟感懷孟冬隂氣交兩河正屯兵煙塵相馳突烽火日夜驚太行險阻髙輓粟輸連營奈何操弧者不使梟巢傾猶聞漢北兒怙亂謀縱横擅揺干戈柄呼叫豺狼聲白日臨爾軀胡為喪丹誠豈無感激士以致天下平登髙望寒原黄雲鬱崢嶸坐馳悲風暮歎息空沾纓離思不寐亦不語片月秋梢舉孤鴻憶霜羣獨鶴叫雲侣怨彼浮花心飄飄無定所髙張係繂帆逺過梅根渚迴織别離字機聲有酸楚結交鑄鏡須青銅青銅易磨拭結交逺小人小人難姑息鑄鏡圖鑒微結交圖相依凡銅不可照小人多是非傷春兩河春草海水清十年征戰城郭腥亂兵殺兒將女去二月三月花冥冥千里無人旋風起鶯啼燕語荒城裏春色不揀墓傍枝紅顔皓色逐春去春去春來那得知今人㸔花古人墓令人惆悵山頭路擇友獸中有人性形異遭人隔人中有獸心幾人能真識古人形似獸皆有大聖徳今人表似人獸心安可測雖笑未必和雖哭未必戚面結口頭交肚裏生荆棘好人常直道不順世間逆惡人巧謟多非義苟且得若是傚真人堅心如鐵石不謟亦不欺不奢復不溺面無恡色容心無詐憂惕君子大道人朝夕恒的的夜憂豈獨科斗死所嗟文字捐蒿蔓轉驕王菱荇減嬋娟未遂擺鱗志空思吹浪旋何當再霖雨洗濯生華鮮惜苦于鵠值諫議以毬不能官焦䝉值舍人以杯不得完一作官可惜大雅㫖意此小團欒名迴不敢辨心轉實是難不惜為君轉轉非君子觀轉之復轉之强轉誰能歡哀哉虛轉言不可窮波瀾寒地百姓吟為鄭相其年居河南畿内百姓大䝉矜恤無火炙地眠半夜皆立號冷箭何處來棘針風騷勞一作騷騷霜吹破四壁苦痛不可逃髙堂槌鐘飲到曉聞烹炮寒者願為蛾燒死彼華膏華膏隔仙羅虛遶千萬遭到頭落地死踏地為遊遨遊遨者是誰君子為鬱陶出東門餓馬骨亦聳獨驅出東門少年一日程衰叟十日奔寒景不我為疾走落平原眇黙荒草行恐懼夜魄翻一生自組織千首大雅言道路如抽蠶宛轉羈腸繁敎坊歌兒十嵗小小兒能歌得聞一作朝天六十孤老人能詩獨臨川去年西京寺衆伶集講筵能嘶竹枝詞供養繩牀禪能詩不如歌悵望三百篇訪疾冷氣入瘡痛夜來痛如何瘡從公怒生豈以私恨多公怒亦非道怒消乃天和古有煥輝句嵇康閑婆娑請君吟嘯之正氣庶不訛酒徳酒是古明鏡輾開小人心醉見異舉止醉聞異聲音酒功如此多酒屈亦以深罪人免罪酒如此可為箴冬日老人行人事百一不及周凍馬四啼吃陟卓難自収短景仄飛過午光不上頭少壯日與輝衰老日與愁日愁疑在日嵗箭迸如讎萬事有何味一生虚自一作㠯囚不知文字利到死空遨遊饑雪吟饑烏夜相啄瘡聲互悲鳴氷腸一直刀天殺無曲情大雪壓梧桐折柴墮崢嶸安知鸞鳳巢不與梟鳶傾下有幸災兒拾遺多新爭但求彼失所但誇此經營一作誇誕自經營君子亦拾遺拾遺非拾名將補鸞鳳巢免與梟鳶并因為饑雪吟至曉竟一作意不平偷詩餓犬齚枯骨自喫饞饑涎今文與古文各各稱可憐亦如嬰兒食餳桃口旋旋唯有一㸃味豈見逃景延繩牀獨坐翁黙覽有所傳終當罷文字别著逍遥篇從來文字淨君子不以賢晚雪吟貧富喜雪晴出門意皆饒鏡海見纎悉氷天步飄䬙一一仙子行家家塵聲銷小兒擊玉指大耋歌聖朝睿氣流不盡瑞仙何夐寥始知望幸色終疑異禮招市井亦清潔閭閻聳岧嶤蒼生願東顧翠華仍西遙天念豈薄厚宸𠂻多憂焦憂焦致太平以兹時比堯古耳有未通新詞有潛韶甘為酒伶擯坐恥歌女嬌選音不易言裁正逢今朝今朝前古文律異同一調願於堯琯中奏盡鬱抑謠自惜傾盡眼中力抄詩過與人自悲風雅老恐被巴竹嗔零落雪文字分明鏡精神坐甘氷抱晚永謝酒懷春徒有言言舊慙無黙黙新始驚儒教誤漸與佛乘親老恨無子抄文字老吟多飄零有時吐向牀枕席不解聴鬭蟻甚微細病聞亦清泠小大不自識自然天性靈詠懷上湖州取解述情霅水徒清深照影不照心白鶴未輕舉衆鳥爭浮沈因兹挂帆去遂作歸山吟落第曉月難為光愁人難為腸誰言春物榮豈見葉上霜一作獨見花上霜鵰鶚一作鶴鵲失勢病一作飛失勢鷦鷯假一作改翼翔棄置復棄置情如刀刃傷詠情一作感遇濁水心易一作已傾明波興初發思逢海底人乞取蚌中月此興若未諧此心終不歇病起言懷强行尋溪一作淨水洗却殘病姿花景晼晚盡麥風清泠吹交道卧來見世情貧去知髙閑思楚逸澹泊一作淺薄厭齊兒終伴碧山侣結言青桂枝秋夕貧居述懷卧冷無逺夢聴秋酸别情髙枝低枝風千葉萬葉聲淺井不供飲瘦田長廢耕今交非古交貧語聞皆輕夜感自遣一作失志夜坐思歸楚江又作苦學吟夜學曉未休苦吟神鬼愁如何不自閑心與身為讎死辱片時痛生辱長年羞清桂無直枝碧江思舊遊再下第一夕九起嗟夢短不到家兩度長安陌空將淚見花下第東歸留别長安知己共照日月影獨為愁思人豈知鶗鴂鳴一作鶗鴂等閑鳴瑶草不得春一片兩片雲千里萬里身雲歸嵩之陽身寄江之濵棄置復何道楚情吟白蘋失意歸呉因寄東臺劉復侍御自念西上身忽隨東歸風長安日下影又落江湖中離婁豈不明子野豈不聰至寶非眼别至音非耳通因緘俗一作物外詞仰寄髙天鴻下第東南行越風東南清楚日瀟湘明試逐伯鸞去還作靈均行江蘺伴我泣海月投人驚失意容貌改畏塗性命輕時聞喪侣猿一叫千愁并一作生歎命三十年來命唯藏一卦中題詩還怨易問易䝉復䝉本望文字達今因文字窮影孤别離月衣破道路風歸去不自息耕耘成楚農逺遊慈烏不逺飛孝子念先歸而我獨何事四時心有違江海戀空積波濤信來稀長為路傍食着盡家中衣别一作烈劒不割物離人難作威逺行少僮僕驅使無是非為性玩好盡積愁心緒微始知時節駛愛一作夏日非長輝商州客舍商山風雪壯遊子衣裳單四望失道路百憂攅肺肝日短覺易老夜長知至寒淚流瀟湘絃調苦屈宋彈識聲今所易識意古所難聲意今詎辨一作竟誰辨髙明鑒其端長安旅情盡説青雲路有足皆可至我馬亦四蹄出門似無地玉京十二樓峩峩倚青翠下有千朱門何門薦孤士長安羇旅聴樂離别中聲聲入幽腸曉淚滴楚瑟夜魂遶呉鄉幾迴羇旅情夢覺殘燭光渭上思歸獨訪千里信迴臨千里河家在一作住呉楚鄉淚寄東南一作流波登科後昔日齷齪不足誇今朝放蕩思無涯春風得意馬蹄疾一日㸔徧長安花初於洛中選塵土日易没驅馳力無餘青雲不我與白首方選書宦途事非逺拙者取自踈終然戀皇邑誓以結吾廬帝城富髙門京路饒勝居碧水走龍狀蜿蜒遶庭除尋常異方客過此亦踟蹰乙酉嵗舍弟扶侍歸興義莊居後獨止舍待替人誰言舊居止主人忽成客僮僕强與言相懼終脈脈出亦何所求入亦何所索飲食迷精麤衣裳失寛窄迴風巻閑簟新月生空壁士有百役身官無一姓宅丈夫恥自飾衰鬢從颯白蘭交早已謝榆景徒相迫惟予心中鏡不語光厯厯西齋養病夜懷多感因呈上從叔子雲逺客夜衣薄厭眠待雞鳴一牀空月色四壁秋蛩聲守淡遺衆俗養疴念餘生方全君子拙恥學小人明蚊蜹亦有時羽毛各有成如何騏驥跡踡跼未能行西北有平路運來無相輕孟東野詩集巻三
