body:
  text: 山南西道節度參謀試大理評事平昌孟郊行役西上經靈寶觀人舊宅觀即尹真道士無白髮語音言一作靈泉清青松多壽色白石􅁪夜明放步霽霞起振衣華風生真文秘中頂寶氣浮四楹一片古關路萬里今人行上仙一可見驅䇿徒西征泛黄河誰開崑崙源流出混沌河積雨羽一作飛作風驚龍噴爲波湘瑟颼飀絃越賔客一作嗚咽歌有根􅀟眼一作不可洗虛此來經過徃河陽􅀫峽陵􅀉李侍御暮天寒風悲屑屑啼烏遶樹泉水噎行路解鞍投古陵蒼蒼隔山見㣲月鴞鳴犬吠霜煙昏開囊拂巾對盤飱人生窮達感知己明日投君申片言鵶路溪行呈陸中丞鵶路不可越二十六渡溪有物飲碧水髙林挂青蜺歷覽道更險驅使跡頻暌視聴易常主心魂㸦相迷浪石忽揺動沙堤信難躋危峯紫霄外古木浮雲齊出阻望汝郡太賢多招携疲馬戀舊秣羇禽思故棲應憐泣楚玉棄置如塵泥獨宿峴首憶長安故人月迴無隠物況復大江秋江城與沙村人語風颼飀峴亭當此時故人不同逰故人在長安亦可將夢求自商行謁復州盧使君䖍一身遶千山逺作行路人未遂東呉歸暫出西京塵仲宣荆州客今余爲一作竟陵賔徃蹟雖不同託意皆有因商嶺莓苔滑石坂上下頻江漢沙泥潔永日水白一作光景新獨淚起殘夜孤吟望初晨驅馳竟何事章句依深仁夢澤行楚山爭蔽虧日月無全輝楚路饒迴惑旅人有多一作迷歸騏驥思北首鷓鴣願南飛我懷京雒逰未厭風塵衣京山行衆䖟聚病馬流血不得行後路起夜色前山聞虎聲此時逰子心百尺風中旌旅次湘沅有懷靈均分拙多感激久逰遵長􅂗經過湘水源懷古方踟蹰舊稱楚靈均此處殞忠軀側聆故老言遂得旌賢愚名參君子場行爲小人儒騷文􅃷貞亮體物情﨑嶇三黜有愠色即非賢哲模五十爵髙秩謬膺從大夫胷􅁭積憂愁容鬢復先一作彫枯死爲不弔􅀑生作猜謗徒吟澤㓗其身忠節寧見輸懷沙㓕其性孝行焉能俱且聞善稱君一何善自殊且聞過稱已一何過不渝悠哉風土人角黍投川隅相傳歴千祀哀悼延八區如今聖明朝養育無羇孤君臣逸雍熈徳化盈紛敷巾車徇前侣白日猶昆吾寄君臣子心戒此真良圖過彭澤揚帆過彭澤舟人訝歎息不見種柳人霜風空寂歴過分水嶺山壯馬力短路行石齒中十步九舉轡迴環失西東溪水變爲雨懸崖隂濛濛客衣飃䬙􅀄葛花零落風白日捨我没去一作征途忽然窮分水嶺别夜示從弟寂于孟叔一作示南中少平地山水重疊生别泉萬餘曲迷舟獨難行四際亂峯合一眺千慮并潺湲冬夏冷光彩晝夜明賞心難久勝離腸忽自驚古木揺霽色髙風動秋聲棄􅂞風結秋聲一作古木解舊飲爾一樽酒慰我百憂輕嘉期何處定此晨堪􅀉情連州吟三章春風朝夕起吹緑日日深試爲連州吟淚下不可禁連山何連連連天碧岑崟衰猿哭花死子規裂客心蘭芷結新佩瀟湘遺舊音怨聲能翦􅃶坐撫零落琴羽翼不自有相追力難任唯憑方寸靈獨夜萬里尋方尋魂飃䬙南夢山嶇嶔髣髴驚魍魎悉窣聞楓林正直被放者􅀑魅無所侵賢人多安排俗士多虛歆孤懷吐明月衆毁鑠黄金願君保玄曜壯志無自沉朝亦連州吟暮亦連州吟連州果有信一紙萬里心開緘白雲斷明月墯衣襟南風嘶舜琯苦竹動猿音萬里愁一色瀟湘雨滛滛兩劒忽相觸雙蛟恣浮沉鬭水正迴斡倒流安可禁空愁江海信驚浪隔相尋旅行楚水結冰薄楚雲爲雨㣲野梅參差發旅榜逍遥歸紀贈上河陽李大夫上將秉神略至兵無猛威三軍當嚴冬一撫勝重衣霜劒奪衆景夜星失長輝蒼鷹獨立時惡鳥不敢飛武牢鎻天關河橋紐地機大將奚以安守此稱者稀貧士少顔色貴門多輕肥試登山岳髙方見草木㣲山岳㤙既廣草木心皆歸投贈張端公君子量不極胷吞百川流嫉邪霜氣直問俗春辭柔日戸晝輝静月盃宵景幽詠驚芙蓉發笑激風飈秋鸞步獨無侣鶴音仍寡儔幸沾分寸顧散此千萬憂贈蘇州韋郎中使君謝客吟一聲霜落羣聽清文含元氣柔鼓動萬物輕嘉木依性植曲枝亦不生塵埃徐􅁃詞金玉曹劉名章句作雅正江山益鮮明蘋萍一水草菰蒲片池榮曽是康樂詠如今搴其英顧惟菲薄質亦願將此并上張徐州爲水不入海安得浮天波爲木不在山安得横日柯再來君子傍始覺精義多藝多一作大徳唯一施衆情自偏頗至樂無变一作宫徵至聲遺謳謌願鼓空桑絃永使萬物和顧已誠拙訥干名已蹉􅋸獻詞唯在口所欲無餘它乍作支泉石乍作翳松蘿一不改方圓破質爲琢磨賤子本如此大賢心若何豈是無異途異途難經過上包祭酒岳岳冠盖彦英英文字雄瓊音獨聽時塵韻固不同春雲生紙上秋濤起胷中時吟五君詠再舉七子風何幸松桂侣見知勤苦功願將黄鶴翅一借飛雲空贈崔純亮食薺腸亦苦强歌聲無歡出門即有礙誰謂天地寛有礙非遐方長安大道傍小人智慮險平地生太行鏡破不攺光蘭死不攺香始知君子心交久道益彰君心與我懷離别俱迴遑譬如浸蘖泉流苦巳日長忍泣目易衰忍憂形易傷項籍非不壯賈生非不良當其失意時涕泗各沾裳古人勸加飡食一作此飡食一作難自强一飯九祝噎一嗟十斷腸況是兒女怨怨氣凌彼蒼彼蒼昔有知白日下清霜今朝始驚歎呼一作碧落空茫茫贈文應上人棲遲青山巔髙静身所便不踐有命草但飲無聲泉齋性空轉寂學情深更専經文開貝葉衣製垂秋蓮猒此俗人羣暫來還却旋嚴河南赤令風骨峭語言清霜寒不必用雄威見者毛髮攅我有赤令心未得赤令官終朝衡門下忍志將筑彈君從西省郎正有東洛觀洛民蕭條久威恩憫撫難苦竹聲嘯雪夜齋聞千竿詩人偶􅀉耳聽苦心多端多端落盃酒酒中方得歡隠士多隠酒此言信難刋取次令坊沽舉止務在寛何必紅燭嬌始言清宴䦨丈夫莫矜莊矜莊不中㸔贈李觀觀􅀄登第誰言形影親燈滅影去身誰言魚水歡水竭魚枯損一作鱗昔爲同恨客今爲獨笑人捨予在泥轍飄跡上雲津卧木易成蠧棄花難再春何言對芳景愁望極蕭晨埋劒誰識氣匣絃日生塵願君語髙風爲余問蒼旻呉安西館贈從弟楚客䝉籠楊桞館中有南風生風生今爲誰湘客多逺情􅀌枕楚水夢獨帆楚江程覺來殘恨深作一心尚與歸路并玉匣正絃在請君時一鳴贈章仇將軍將軍不誇劒才氣爲英雄五岳拽力内百川傾意中本立誰敢拔飛文自難窮前時天地翻已有扶正功贈道月上人僧皃淨無㸃僧衣寧綴華尋常晝日行不使身影斜飯木煑松栢坐山敷邀一作雲霞欲知禪隠髙緝薜爲袈裟杼情因上郎中二十二叔監察十五叔兼呈李益端公柳縝評事方憑指下絃冩出心中言寸草賤子命髙山主人恩逰邉風沙意夢楚波濤䰟一日引别袂九迴霑淚㾗自悲何以然在禮闕晨昏名利時轉甚是非宵亦喧浮情少定主百慮隨世翻舉此胷臆恨幸從賢哲論明明三飛鸞與􅀟鸞一作歩兵照物如朝暾贈城郭道士望裏失却山聴中遺却泉松枝休䇿雲藥囊翻貯錢曽依青桂鄰學得白雲絃别别意未迴世上爲隠仙桐廬山中贈李明府静境無濁氛清雨零碧雲千山不隠響一葉動亦聞即此佳志士精㣲誰相羣欲識楚化一作章句袖中蘭􅊉薫獻漢南樊尚書天下昔崩亂大君識賢臣衆木盡揺落始見竹色真兵􅀔走山岳陽光潛埃塵心開玄女符面縳清波人異俗既從化澆風亦歸淳自公理斯郡寒谷皆變春旗影巻赤電劒鋒匣青鱗如何嵩髙氣作鎮楚水濵雲鏡忽開霽景一作孤光射無垠乃知尋常鑒照影不照神贈轉運陸中丞掌運職既大摧邪名更雄鵬飛簸曲雲鶚怒生直風投彼霜雪令翦除荆􅁄􅓜楚倉傾向西呉米發登一作自東忛影咽河口車聲聾關中堯知才䇿髙人喜道路通皆驚内史力繼得鄼侯功萊子真爲少相如未免窮衣花野菡蓞書葉山梧桐不是宗匠心誰憐久栖蓬贈萬年陸郎中天子憂劇縣􅀉深華省郎紛紛風響珮蟄蟄劒開霜舊事笑堆案新聲唯雅章誰言百里才終作横天梁江鴻恥承眷雲津未能翔徘徊塵俗中短毳無輝光擢第後東歸書懷獻坐主吕侍郎昔嵗辭親淚今爲戀恩泣去住情難並别離景易戢夭矯大空鱗曽爲小泉蟄幽意獨沉時震雷忽相及神行既不宰直致非所執至運本遺功輕生各苦一作自立大君思此化良佐自然集寶鏡無􅀻光時文有新習慈親誡志就賤子歸情急擢第謝靈臺牽衣名一作出皇邑行襟海日曙逸抱江風入蒹葭得波浪芙蓉紅岸濕雲寺勢動揺山鐘韻嘘吸舊逰期再踐懸水得重挹松蘿雖可居青紫終當拾古意贈梁肅補闕曲木忌日影讒人畏賢明自然照燭間不受邪佞輕不有百鍊火孰知寸金精金鉛正同在一作鑪願分精與麤贈黔府王中丞楚舊説天下山半在黔中青又聞天下泉半落黔中鳴山水千萬遶中有君子行儒風一以扇汙俗心皆平我願中國春化從異方生昔爲隂草毒今爲陽華英嘉實綴緑蔓涼湍瀉清聲逍遥物景勝視聽空曠并困驥猶在轅沉珠尚隠精路遐莫及盻泥汚日已盈嵗宴將何從落葉甘自輕上達溪舎人北山少日月草木苦風霜貧士在重坎食梅有酸腸萬俗皆走圓一身心一作猶學方常恐衆毁至春葉成秋黄大賢秉髙鑒公燭無􅀻光暗室曉未及幽吟涕空行贈主人斗水㵼大海不如㵼枯池分明賢達交豈顧豪華兒海有不足流豪有不足資枯鱗易爲水貧士易爲施幸覩君子席㑹將幽賤期側聞清風議如飲黄金巵此道與日月同光無盡時贈建業契公師住青山寺清華常遶身雖然到城郭衣上不棲塵獻襄陽于大夫襄陽青山郭漢江白銅堤謝公領兹郡山水無塵泥鐵馬萬霜雪絳旗千虹蜺風漪參差泛石板重疊躋舊淚不復墯新歡居然齊還耕竟原野歸老相扶携物色増曖曖寒芳更萋萋淵清有遐略髙躅無近蹊掠奭歌有安緩一作衆賦無暴即此冨蒼翠自然引翔棲曩逰常抱憶夙好今尚暌願言從逸轡暇日凌清溪贈鄭夫子魴天地入胷臆吁嗟生風雷文章得其㣲物象由我裁宋玉逞大句李白飛狂才苟非聖賢心孰與造化該勉矣鄭夫子驪珠今始胎大隠訪三首崔從事鄖以直隳職官一作古人留清風千載遥贈君破松見貞心裂竹㸔直文殘月色不攺髙賢徳常新家懷詩書冨宅抱草木貧安得一蹄泉來化千尺鱗含意永不語釣璜幽水濵章仇將軍良棄功守貧飲君江海心詎誰一作能辨淺深揖君山岳徳誰能齊嶔岑東海精爲月西岳氣凝金進則萬景晝盡一作退則羣物隂我欲薦此言天門峻沉沉風飈亦感激爲我颼飀吟趙記室俶在職無事卑静身後老髙動物先摧方圓水任器剛勁木成灰大道母羣物達人腹衆才時吟堯舜篇心向無爲開彼隠山萬曲我隠酒一杯公庭何所有日日清風來贈韓郎中愈二首何以定結一作交契贈君髙山石何以保貞堅贈君青松色貧居過此外無可相彩飾聞君碩䑕詩吟之淚空滴碩䑕既穿墉又嚙機上絲穿墉有閑餘一作土嚙絲無餘衣朝吟枯桑柘暮泣穿杼機豈是無巧妙絲斷將何施衆人上肥華忠士多饑羸願君保此節此貞節一作願保天意當察㣲本作一詩右二詩一前日逺别離今日生白髪欲知萬里情曉卧半牀月常恐百蟲秋使我芳草歇此一篇一本無戲贈无本二首長安秋聲乾木葉相號悲瘦僧卧冰凌嘲朔一作詠含金痍金痍非戰痕峭病方在兹詩骨聳東野詩濤湧退之有時踉蹌行人驚鶴阿師可惜李杜死不見此狂癡燕僧聳聴詞袈裟喜新翻北岳厭利殺玄功生㣲言天髙亦可飛海廣亦可源文章查無底斸掘誰能根夢靈髣髴到匠我方與論拾月鯨口邉何人免爲吞燕僧擺造化萬有隨手奔補綴雜霞衣笑傲諸貴門將明文在身亦爾示一作道所存朔雪凝别句􅃋風飄征魂再期嵩少逰一訪蓬蘿村春草步步緑春山日日喧遥鸎相應吟晚聴恐不繁相思塞心胷髙逸難攀援孟東野詩集巻第六
