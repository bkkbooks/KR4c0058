front:
  text: 孟東野詩集卷第十
  hash: sha256:ab6a66daac7b75c814f999beaee7a5877269965b818c8c5c4c7703fcb22bb168
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0058_SBCK_010-1a}
body:
  text: 山南西道節度參謀試大理評事平昌孟郊哀傷弔國殤徒言人最靈白骨亂縱横如何當春死不及羣草生堯舜宰乾坤噐農不噐兵秦漢盗山岳鑄殺不鑄耕天地莫生金生金人競爭弔比干墓殷辛帝天下猒爲天下尊乾綱既一㫁賢愚無一門佞是福身本忠是喪己源餓虎不食子人無骨肉恩日影不入地下埋寃死䰟有骨不爲土應作直木根今來過此鄉下馬弔此墳靜念君臣間有道誰敢論弔元魯山十首摶鷙有餘飽魯山長飢空豪人飫鮮肥魯山飯蒿蓬食名皆霸官食力乃堯農君子恥新態魯山與古終天璞本平一人巧生異同魯山不自剖全璞竟没躬自剖多是非流濫將何歸奔競損驅一作立詭節凌侮爭怪輝五帝坐銷鑠萬類隨衰㣲以兹見魯山道蹇無所依君子不自蹇魯山蹇有因苟含天地秀皆是天地身天地蹇既甚魯山道莫伸天地氣不足魯山食更貧始知補元化竟須得賢人賢人多自霾道理與俗乖細功不敢言逺韻方始諧萬物飽爲飽萬人懐爲懷一聲苟失所衆憾來相棑所以元魯山饑衰難與偕逺階無近級造次不可昇賢人絜腸胃寒日空澄凝血誓竟訛繆膏明易煎蒸以之驅魯山踈迹去莫乗言從魯山宦盡化堯時心豺虎恥狂噬齒牙閉霜金針一作競來闢田土相與耕嶔岑當宵無關鎻竟嵗饒歌吟善敎復履一作天術美詞非俗箴精㣲自然事視聽不可尋因書魯山績庻合簫韶音簫韶太平樂魯山不虚作千古若有知百年幸如昨誰能嗣教化以此洗浮薄君臣貴深遇天地有靈橐力運既艱難徳符方合莫名位苟虚矌聲明自銷鑠禮法雖相救貞濃易糟粕哀哀元魯山畢竟誰能度當今富敎化禮嘉士一作聖朝元后得賢相冰心鏡衰古霜議清遐障幽埋盡洸洗滯旅免流浪唯餘魯山名未獲旌廉讓二三貞苦士刷視聳危望髮秋青山夜日㫁丹闕亮誘類幸從兹嘉招固非妄小生奏狂狷感惕増萬狀黄犢不知孝魯山自駕車非賢不可妻魯山竟無家供養恥它力言詞豈纎瑕將謡魯山徳賾海誰能涯遺嬰盡鶵乳何況肉骨枝心腸結苦誠胷臆垂甘滋事已出古表誰言獨今竒賢人母萬物愷悌流前詩哭李觀志士不得老多爲直氣傷阮公終日哭壽命固難長顔子既殂謝孔門無輝光文星落竒曜寶劒摧脩鋩常作金應石忽爲宫别商爲爾弔琴瑟㫁絃難再張偏轂不可轉隻翼不可翔清塵無吹嘘委地難飛揚此義古所重此風今已亡自聞喪元賔一日入九狂沉痛此丈夫驚呼彼穹蒼我有出俗韻勞君疾惡腸知音既已矣㣲言善一作誰能彰旅葬無髙墳栽􅀌一作松不成行哀歌動寒日贈淚沾晨霜神理本窅窅􅄀宴一作今來更茫茫何以蕩悲懷萬事付一觴李少府㕔弔李元賔遺字㕔云􅀫從叔元賓題少府義而無其辭宅有感有其零落三四字忽成千萬年那知冥寞客不有補亡篇斜月弔空壁旅人難獨眠一生能幾時百慮來相煎戚戚故交淚幽幽長夜泉已矣難重言一言一潜然悼呉興湯衡評事君生在一作霅水清君殁霅水渾空令骨肉情哭得白日昏大夜不復曉古松長閉門琴絃緑水絶詩句青山存昔爲芳春顔今爲荒草根獨問􅁳􅁳理先儒未曽言哀孟雲卿嵩陽荒居戚戚抱幽獨晏晏沉荒居不聞新歡笑但覩舊詩書藝蘗意彌苦耕山食無餘定交昔何在至戚今或踈薄俗易銷歇淳風難久舒秋蕪上空堂寒槿落枯渠薙草恐傷蕙攝衣自理鋤殘芳亦可餌遺秀誰忍除徘徊未能去爲爾涕漣如哭盧貞國一别難與期存亡易寒燠下馬入君門聲悲不成哭自能冨才藝當兾深榮禄皇天􅀒我賢遺恨至兩目平生嘆無子家事親相囑傷舊逰去春㑹處今春歸花數不減人數稀朝笑片時暮成泣東風一向還西輝弔房十五次卿少府日髙方得起獨賞些些春可惜宛轉鸎好音與它人昔年此氣味還走曲江濵逢着韓退之結交方殷勤蜀客骨目髙聦辯劒㦸新如何昨日歡今日見無因英竒一謝世視聽一爲塵誰言老淚短淚短沾衣巾沾巾一作足逢江南故晝上人㑹中鄭方回年手礼上人徃以為它日之念五十篇相贈云相逢失意中萬感因語至追思東林日掩抑北印淚筐篋有遺文江山舊清氣塵生逍遥注作一篇墨故飛動字荒毁碧澗居虚無青松位珠沉百泉暗月死羣象閟永謝平生言知音豈容易哭祕書包大監哲人卧病日賤子泣玉年常恐寳鏡破明月難再圓文字未攺素聲容忽歸玄始知知音稀千載一絶絃舊館有遺琴清風那復傳悼幻子一閉黄蒿門不聞白日事生氣散成風枯骸化爲地􅀒我十年恩欠爾千行淚洒之北原上不待秋風至悼亡山頭明月夜増輝不照重泉下泉下雙龍無再期金􅁞玉鷰空銷化朝雲暮雨成古墟蕭蕭野竹風吹亞弔李元賔墳曉上荒涼原弔彼􅁳寞䰟眼咽此時淚耳悽在日言寂寂千萬年墳鎻􅀌松根覽崔爽遺文因杼幽懷於南方崔君殁墮淚數首文悲結千里墳蒼旻且留我白日空遺君仙鶴未巢月衰鳯先墜雲清風獨起時舊語如再聞瑶草罷葳蕤桂花休氛氲萬物與我心相感呉江濆峽哀十首昔多相與笑今誰相與哀峽哀哭幽䰟夢一作噭噭風吹來墮魄抱空月出没難自裁韲粉一閃間春濤百丈尺一作雷峽水聲不平碧沲牽清洄沙稜箭箭湔湔一作急波齒齗齗開呀彼無底吮待此不測災谷號相噴激石怒爭旋廻古罪有復鄉今縲多爲能字􅀌徒髣髴銜雪猶驚猜薄俗少直腸交結須横財黄金買相弔幽泣無餘漼我有古心意爲君空摧頽上天下天水出地入地舟石劒相劈斫石波怒蛟虬花木疊宿春風飈凝古秋幽怪窟穴語飛聞􅆄響流沉哀日已深銜訴將何求三峽一線天三峽萬繩泉上仄碎日月一掣狂漪漣破魄一兩㸃凝幽數百年峽暉不停午峽險多饑涎樹根鎻枯棺􅀌骨􅙂􅙂懸樹枝哭霜棲哀韻杳杳鮮逐客零落腸到此湯火煎性命如紡績道路隨索縁奠淚酹一作弔波靈波靈將閃然峽亂鳴清磬鳴清聲峽虬産石爲鮮鱗噴爲腥雨涎吹作黒井身怪光閃衆異餓劒唯待人老腸未曽飽古齒嶄嵓嗔嚼齒三峽泉三峽聲齗齗峽螭蛟一作老解語百丈潭底聞毒波爲計校飲血養子孫既非臯陶吏空食沉獄玉一作䰟潜怪何幽幽魄說徒云云峽聽哀哭泉峽弔鰥寡猿峽聲非人聲劒水相劈翻斯誰士諸謝奏此沉苦言讒人峽虬心渇罪呀然潯所食無直腸所語饒臰音石齒嚼百泉石風號千琴幽哀莫能逺分雪何由尋月魄魄一作髙卓卓峽窟􅁈一作清沉沉銜訴何時明抱痛已不禁犀飛空波濤裂石千嶔岑峽稜剸日月日月多摧輝物皆斜仄生鳥亦斜仄飛潜石齒相鎻沉䰟招莫歸恍惚清泉甲班爛碧石衣餓嚥潺湲號涎似􅇦汯肥峽春不可逰腥草生㣲㣲峽景滑易墮峽花怪非春紅光根潜涎碧雨飛沃津巴谷蛟螭心巴鄉魍魎親噉生不問賢至死獨養身腥語信者誰拗歌歡非真仄田無異稼毒水多獰鱗異類不可友峽哀哀難伸峽水劒㦸獰峽舟霹􅆮翔因依虺蜴手起坐風雨忙峽旅多竄官峽氓多非良滑心不可求滑習積已長漠漠涎霧起齗齗涎水光渇賢如之何忽在水此一作中央梟䲭作人語蛟虬吸山波能於白日間謟欲晴風和駭智蹶衆命藴腥布深蘿齒泉無底貧鋸涎在處多仄樹鳥不巢踔猿相過峽哀不可聽峽怨其奈何杏殤九首并序杏殤花乳也霜翦而落因悲昔嬰故作是詩凍手莫弄珠弄珠珠易飛驚霜莫翦春翦春無光輝零落小花孔斕班昔嬰衣拾之不盈把日暮空悲歸地上空拾星枝上不見花哀哀􅀌老人戚戚無子家豈若没水鳬不如拾巢雅浪鷇破便飛風鶵裊相誇芳嬰不復生向物空悲嗟應是一線淚入此春木心枝枝不成花片片落翦金春壽何可長霜哀亦已深常時洗芳泉此日洗淚襟兒生月不明兒死月始光兒月兩相奪兒命果不長如何此英英亦爲弔蒼蒼甘爲墮地塵不爲末世世木一作芳踏地恐土痛損彼芳樹根此誠天不知翦棄我子孫垂枝有千落芳命無一存誰謂生人家春色不入門洌洌霜殺春枝枝疑纎刀木心既零落山竅空呼號班班落地英㸃㸃如明膏始知天地間萬物皆不牢哭此不成春淚痕三四班失芳蝶既狂失子老亦孱且豈一作無生生力自甘一作有死死顔靈鳯不銜訴誰爲扣天關此兒自見災花發多不諧窮老收碎心永夜抱破懷聲死更何言意死不必喈病叟無子孫獨立猶束柴霜似敗紅芳翦啄十數雙參差呻細風噞喁沸戲一作淺江泣凝疑一作不可消誚一作恨壯難自降空遺舊日影怨彼此一作小書牎弔江南老家人春梅念爾筋力盡違我衣食恩奈何麤獷兒生鞭見死痕舊使常以禮新怨􅁈一作将誰吞胡爲乎泥中上天一作消歇敎義源哭李丹貟外并􅀉杜中丞生死方知交態存忍將齚齖報幽䰟十年同在平原客更遣何人哭寢門哭劉言史詩人業􅀌峭餓死良已多相悲與相笑累累其奈何精異劉言史詩腸傾珠河取次抱置之作一抛鄭取次爲飛過東溟波可惜大國謡飃爲四夷歌常扵衆中㑹顔色兩切磋今日果成死葬襄作一喪之洛河洛岸逺相弔酒淚雙滂沲弔盧殷十首詩人多清峭餓死抱空山白雲既無主飛出意等閑久病牀席尸䕶喪童僕孱故書窮䑕嚙狼籍一室間君歸新􅀑鄉我面古玉土一作顔羞見入地時無人叫追攀百泉空相弔日久夕一作哀潺潺唧唧復唧唧千古一月色新新復新新千古一花春邙風噫孟郊嵩秋葬盧殷北邙前後客相弔爲埃塵北邙􅁄針草淚根生苦辛烟火不自煖筋力早已貧幽薦一盃泣㵼之清洛濵添爲㫁腸聲愁殺長别人􅁄針風相號破碎諸苦哀苦哀不可聞掩耳亦入來哭絃多煎聲恨涕有餘摧噫貧氣已焚噫死心更灰夢世浮閃閃淚波深洄洄薤歌一以去蒿閉不復開登封草木深登封道路㣲日月不與光莓苔空生衣可憐無子翁蚍蜉縁病肌攣卧歳時長漣漣但幽噫幽噫虎豹聞此外相訪稀至親唯有詩抱心死有歸河南韓先生後君作因依磨一片嵌巖書千古光輝賢人無計校生苦死徒誇它名潤子孫君名潤泥沙可惜千首文閃如一朝花零落難苦言作一留久起坐空驚嗟耳聞陋巷生眼見魯山君餓死始有名餓名髙氛氲戅叟老壯氣感之爲憂雲所憂唯一泣古今相紛紛平生與君説逮此俱云云初識漆鬢髮爭爲新文章夜踏明月橋店飲吾曹床醉啜二盃釀名郁一縣香寺中摘梅花園裏翦浮芳髙嗜緑􅂼雲一作羮意輕肥膩羊吟哦無滓韻言語多占腸白首忽然至盛年如偷將清濁俱莫追何須罵滄浪前賢多哭酒哭酒免哭心後賢試銜之哀至無不深少年哭酒時白髮亦以侵老年哭酒時聲韻隨生沉􅀉言哭酒賔勿作登封音登封徒放聲天地竟難尋同人少相哭異類多相號始知禽獸癡却至天然髙非子病無淚非父念莫勞如何裁親踈用禮如用刀􅀌喪鮮匍匐閉哀抱鬱陶煩他手中葬誠信焉能褒嗟嗟無子翁死棄如脫毛聖人哭賢人骨化氣爲星文章飛上天列宿増晶熒前古文可數今人文亦靈髙名稱謫仙昇降曽莫停有文死更香無文生亦腥爲君鏗好辭永傳作謐寧聮句有所思聮句相思繞我心日夕千萬重年光坐晼晚春淚銷顔容郊臺鏡晦舊暉庭草滋新茸望夫山上石别劒水池一作中龍愈遣興聮句我心随月光冩君庭中央郊月光有時晦我心安所忘愈常恐金石契㫁爲相思腸郊平生無百嵗岐路有四方愈四方各異俗適意非所將郊駑蹄顧挫抹逸翮遺稻粱愈時危抱獨沉道獻天子然後致殊勲郊豈如豐城下空有斗間雲愈讃讃維摩詰皃是古印言是空音在酒不飲在色不淫非獨僧禮亦使儒欽感此補亡書謝懸金書上常州盧使君書道徳仁義天地之常也將有人主張之乎將無人主張之乎曰賢人君子有其位言之可以周天下而行也無其位則周身言之可也周身言之可周天下言之不可也仲尼當時無其位言之亦不可周天下而行也及至著書載其言則周萬古而行也豈唯周天下而已哉仲尼非獨載其言周萬古而行也前古聖賢得仲尼之道則其言皆載之周萬古而行閤下道徳仁義之言已聞周天下誦之久矣其後著書君子亦當載矣周萬古而行也幸甚幸甚道徳仁義之言天地至公之道也君子著書期不朽亦天地至公之道夫何讓哉是故不以道徳仁義事其君者以盗賊事其君也不以道徳仁義之衣食養其親者是盗賊養其親也閤下既以道徳仁義事其君聞之天下久矣小子顯求閤下道徳仁義之衣食以爲養也謂之中庸之道謂之中庸則敢求也謂之特逹則不敢求也小子嘗衣食宣武軍司馬陸大夫道徳仁義之矣陸公既没又嘗衣食此郡前守吏部侍郎韋公道徳仁義之矣韋公既去衣食亦去道徳仁義顯其主張謹載是書及舊文又有子遇之書同乎緘獻輕重可否傾一言陳謝誠兾扵異日不宣郊再拜又上養生書天之與人一其道也天地不棄扵人人自棄扵天天可棄於人乎曰不可人自棄也已曰人皆棄之乎曰賢人君子不棄也凡人棄之可天有殺物之心而無棄物之心天有棄物之心則萬物莫能生矣是故君子之扵萬物皆不棄也而況扵身乎棄其身是棄其後也棄其後是棄其先也故曰君子之道豈易哉敢不法天而行身乎所以君子養其身養其公也小人養其身養其􅀻也身以及家家以及國國以及天下以公道養天下則天下肥也以􅀻道養天下則天下削也養身之道豈容易哉養其公者天道養也養其􅀻者人情養也以天道養其人則合天矣以人情養其人則不合天矣以人情養其人自棄矣天道質也人情文也天道静也人情動也質者生之侈也静者生之得也動者生之棄也文不以質勝之則文爲棄矣動不以静制之則動爲棄矣天者水之謂也人者魚之謂也魚棄水則螻蟻得之矣人棄天則疾病得之矣魚可安扵水而不可翫扵水其失也在乎恣波浪而不迴也人可安扵天而不可翫扵天其失也在乎恣嗜慾而不迴也所謂安扵天者法天之味而食之食不違扵四時也法天之聽而聽之聽不違扵五節也法天之明而視之視不違扵五色也食與視聽苟違扵天則疾病得之矣故曰君子法天而行身也小人翫天而棄身也書之座右嵇康猶有所棄秦之醫和晉之杜蒯其亦不書扵右則何以爲君子之座哉良藥苦口也苦口獲罪扵人苟或有矣仁義之獲罪扵天未之有也恩養下將逺辭違書冩至誠之言不勝
