front:
  text: 孟東野詩集卷第三
  hash: sha256:8ef4b5ff117a3fc3d17a54a9019812c839756a18765001002d0054081b54f741
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0058_SBCK_003-1a}
body:
  text: 山南西道節度叅謀試大理評事平昌孟郊感興下亂離天下無義劒中原多瘡痍哀哀陸大夫正直神反斯子路已成血嵇康今尚嗤爲君每一慟如劒在四肢折羽不復飛逝水不復歸直松摧髙柯弱蔓將何依朝爲春日歡夕爲秋日悲淚下無尺寸紛紛天雨絲積怨成疾疹積恨成狂癡怨草豈有邊恨水豈有涯怨恨馳我心茫茫日何之勸酒白日無定影清江無定波人無百年壽百年復如何堂上陳羙酒堂下列清歌勸君金屈巵勿謂朱顔􅋳松栢歳歳茂丘陵日日多君㸔終南山千古青峩峩去婦君心匣中鏡一破不復全妾心藕中絲雖斷猶牽連安知御輪士今日翻迴轅一女事一夫安可再移天君聴去鶴言哀哀七絲絃君子勿鬱鬱士有謗毁者作詩以贈之二首君子勿鬱鬱聴我青蠅歌人間少平地森聳山岳多折輈不在道覆舟不在河須知一尺水日夜増髙波叔孫毁仲尼臧倉掩孟軻蘭艾不同香自然難爲和良玉燒不熱直竹文不頗自古皆如此其如道在何日徃復不見秋堂暮仍學玄髮不知白曉入寒銅覺爲林未離樹有玉猶在璞誰把碧梧枝刻作雲門樂聞砧杜鵑聲不哀斷猿啼不切月下誰家砧一聲腸一絶杵聲不爲客客聞髮自白杵聲不爲衣欲令遊子歸遊子萱草生堂堦遊子行天涯慈親倚堂門不見萱草花自歎愁與髪相形一愁白數莖有髪能幾多禁愁日日生古若不置兵天下無戰爭古若不置名道路無欹傾太行聳巍峩是天産不平黄河奔濁浪是天生不清四蹄日日多雙輪日日成二物不在天安能免營營求友北風臨大海堅氷臨河面下有大波瀾對之無由見求友須在良得良終相善求友若非良非良中道變欲知求友心先把黄金鍊投所知苦心知苦節不容一毛髪鍊金索堅貞洗玉求明潔自慙所業微功用如鳩拙何殊嫫母顔對彼寒塘月君存古人心道出古人轍盡羙固可揚片善亦不遏朝向公卿説暮向公卿説誰謂黄鍾管化爲君子舌一説清嶰竹二説變嶰谷三説四説時寒花拆寒木􅰵􅰵家道路燦燦我衣服豈直輝友朋亦用慰骨肉一暖荷疋素一飽荷升粟而況大恩恩此身報得足且將食蘖勞酬之作金刀病客吟主人夜呻吟皆入妻子心逺客客子一作晝呻吟徒爲蠱鳥音妻子手中病愁思不復深僮僕手中病憂危獨難任丈夫乆漂泊神氣自然沉況扵滯疾中何人免噓􆉆大海亦有涯髙山亦有岑沉此一作憂獨無極塵淚牙盈襟感懷孟冬隂氣交兩河正屯兵煙塵相馳突烽火日夜驚太行險阻髙輓粟輸連營奈何操弧者不使梟巢傾猶聞漢比兒怙亂謀縱横擅揺干戈柄呼叫豺狼聲白日臨爾軀胡爲喪丹誠豈無感激士以致天下平登髙望寒原黄雲鬱崢嶸坐馳悲風暮歎息空沾纓離思不寐亦不語片月秋稍舉孤鴻憶霜羣獨鶴叫雲侣怨彼浮花心飄飄無定所髙張係繂帆逺過梅根渚迴織别離字機聲有酸楚結交鑄鏡須青銅青銅易磨拭結交逺小人小人難姑息鑄鏡圖鑑微結交圖相依凡銅不可照小人多是非傷春兩河春草海水清十年征戰城郭腥亂兵殺兒將女去二月三月花冥冥千里無人旋風起鸎啼鷰語荒城裏春色不揀墓傍枝紅顔皓色逐春去春去春來那得知今人看花古人墓令人惆悵山頭路擇友獸中有人性形異遭人隔人中有獸心幾人能真識古人形似獸皆有大聖徳今人表似人獸心安可測雖笑未必和雖哭未必戚面結口頭交肚裏生荆棘好人常直道不順世間逆惡人巧謟多非義苟且得若是傚眞人堅心如鐵石不謟亦不欺不奢復不溺面無恡色容心無詐憂惕君子大道人朝夕恒的的夜憂豈獨科斗死所嗟文字捐蒿蔓轉驕王菱荇減嬋娟未遂擺鱗志空思吹浪旋何當再霖雨洗濯生華鮮惜苦于鵠值諫議以毬不能官焦䝉值舍人以盃不得完官一作可惜大雅㫖意此小團欒名迴不敢辨心轉寔是難不惜爲君轉轉非君子觀轉之復轉之强轉誰能歡哀哉虚轉言不可窮波瀾寒地百姓吟畿内百姓大䝉矜邱為鄭相其年居河南無火炙地眠半夜皆立號冷箭何處來棘針風騷勞騷騷一作霜吹破四壁苦痛不可逃髙堂搥鐘飲到曉聞烹炮寒者願爲蛾燒死彼華膏華膏隔仙羅虚遶千萬遭到頭落地死踏地爲遊遨遊遨者是誰君子爲鬱陶出東門餓馬骨亦聳獨驅出東門少年一日程衰叟十日奔寒景不我爲疾走落平原眇黙荒草行恐懼夜魄飜一生自組織千首大雅言道路如抽蠶宛轉覊腸繁敎坊歌兒十嵗小小兒能歌得聞朝一作天六十孤老人能詩獨臨川去年西京寺衆伶集講筵能嘶竹枝詞供飬繩床禪能詩不如歌悵望三百篇訪疾冷氣入瘡痛夜來痛如何瘡從公怒生豈以私恨多公怒亦非道怒消乃天和古有煥輝句嵇康閑婆娑請君吟嘯之正氣庻不訛酒徳酒是古明鏡輾開小人心醉見異舉止醉聞異聲音酒功如此多酒屈亦以深罪人免罪酒如此可爲箴冬日老人行人事百一不及周凍馬四蹄吃陟卓難自收短景仄飛過午光不上頭少壮日與輝衰老日與愁日愁疑在日嵗箭迸如讎萬事有何味一生虚自囚不知文字利到死空遨遊飢雪吟飢烏夜相啄瘡聲互悲鳴氷腸一直刀天殺無曲情大雪壓梧桐折柴墮崢嶸安知鸞鳯巢不與梟鳶傾下有幸災兒拾遺多新爭但求彼失所但誇此經營自經營一作誇誕君子亦拾遺拾遺非拾名將補鸞鳯巢免與梟鳶并因爲飢雪吟至曉竟意一作不平偷詩餓犬齚枯骨自喫饞飢涎今文與古文各各稱可憐亦如嬰兒食餳桃口旋旋唯有一㸃味豈見逃景延繩床獨坐翁黙覽有所傳終當罷文字别著逍遥篇從來文字浄君子不以賢晚雪吟貧富喜雪晴出門意皆饒鏡海見纎悉冰天步飄䬙一一仙子行家家塵聲銷小兒擊玉指大耋歌聖朝睿氣流不盡瑞仙何夐寥始知望幸色終疑異禮招市井亦清潔閭閻聳岧嶤蒼生願東顧翠華仍西遙天念豈薄厚宸衷多憂焦憂焦致太平以兹時比堯古耳有未通新詞有潛韶甘爲酒伶擯坐恥歌女嬌選音不易言裁正逢今朝今朝前古文律異同一調願扵堯琯中奏盡鬱抑謠自惜傾盡眼中力抄詩過與人自悲風雅老恐被巴竹嗔零落雪文字分明鏡精神坐甘氷抱晚永謝酒懷春徒有言言舊慙無黙黙新始驚儒教誤漸與佛乗親老恨無子抄文字老吟多飄零有時吐向床枕席不解聴鬭蟻甚微細病聞亦清泠小大不自識自然天性靈詠懷上湖州取解述情霅水徒清深照影不照心白鶴未輕舉衆鳥爭浮沉因兹挂帆去遂作歸山吟落第曉月難爲光愁人難爲腸誰言春物榮豈見葉上霜花上霜一作獨見鵰鶚鶴鵲一作失勢病失勢一作飛鷦鷯假改一作翼翔棄置復棄置情如刀刃傷詠情一作感㝢濁水心易巳一作傾明波興初發思逢海底人乞取蚌中月此興若未諧此心終不歇病起言懷强行尋溪淨一作水洗却殘病姿花景晼晚盡麥風清泠吹交道卧來見世情貧去知髙閑思楚逸澹泊淺薄一作猒齊兒終伴碧山侣結言青桂枝秋夕貧居述懷卧冷無逺夢聽秋酸别情髙枝低枝風千葉萬葉聲淺井不供飲瘦田長廢耕今交非古交貧語聞皆輕夜感自遣楚江又作苦學吟一作失志夜坐思歸夜學曉未休苦吟神鬼愁如何不自閑心與身爲讎死辱片時痛生辱長年羞清桂無直枝苦江思舊遊再下第一夕九起嗟夢短不到家兩度長安陌空將淚見花下第東歸留别長安知己共照日月影獨為愁思人豈知鶗鴂鳴鳴等閑一作鶗鳴瑶草不得春一片兩片雲千里萬里身雲歸嵩之陽身寄江之濵棄置復何道楚情吟白蘋失意歸呉因寄東臺劉復侍御自念西上身忽隨東歸風長安日下影又落江湖中離婁豈不明子野豈不聰至寶非眼别至音非耳通因緘俗外詞外詞一作物仰寄髙天鴻下第東南行越風東南清楚日瀟湘明試遂伯鸞去還作靈均行江蘺伴我泣海月投人驚失意容皃改畏塗惟命輕時聞喪侣猿一叫千愁并生一作歎命三十年來命唯藏一卦中題詩還怨易問易䝉復䝉本望文字逹今因文字窮影孤别離月衣破道路風歸去不自息耕耘成楚農逺遊慈烏文逺飛孝子念先歸而我獨何事四時心有違江海戀空積波濤信來稀長爲路傍食着盡家中衣别烈一作劒不割物離人難作威逺行少童僕驅使無是非爲性玩好盡積愁心緒㣲始知時節駛愛夏一作日非長輝商州客舍商山風雪壯遊子衣裳單四望失道路百憂攅肺肝日短覺易老夜長知至寒淚流瀟湘絃調苦屈宋彈識聲今所易識意古所難聲意今詎辨誰辨一作竟髙明鑒其端長安旅情盡説青雲路有足皆可至我馬亦四蹄出門似無地玉京十二樓峩峩倚青翠下有千朱門何門薦孤士長安覊旅聽樂離别中聲聲入幽腸曉淚滴楚瑟夜䰟遶呉鄉幾迴覊旅情夢覺殘燭光渭上思歸獨訪千里信迴臨千里河家在住一作呉楚鄉淚寄東南流一作波登科後昔日齷齪不足誇今朝放蕩思無涯春風得意馬蹄疾一日㸔盡長安花初於洛中選塵土日易没驅馳力無餘青雲不我與白首方選書宦途事非逺拙者取自踈終然戀皇邑誓以結吾盧帝城富髙門京路饒勝居碧水走龍狀蜿蜒遶庭除尋常異方客過此亦踟蹰乙酉嵗舍弟扶侍歸興義莊居後獨止舍待替人誰言舊居止主人忽成客僮僕强與言相懼終脉脉出亦何所求入亦何所索飲食迷精麤衣裳失寛窄迴風卷閑簟新月生空壁士有百役身官無一姓宅丈夫恥自飾衰鬢從颯白蘭交早已謝榆景徒相迫惟予中心鏡不語光歴歴西齋飬病夜懷多感因呈上從叔子雲逺客夜衣薄猒眠待雞鳴一床空月色四壁秋蛩聲守淡遺衆俗養痾念餘生方全君子拙恥學小人明蚊蜹亦有時羽毛各有成如何騏驥跡踡跼未能行西北有平路運來無相輕孟東野詩集卷第三
