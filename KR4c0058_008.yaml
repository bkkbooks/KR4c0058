  text: 孟東野詩集卷第八
  hash: sha256:9a4abe8e5c347362c1f484a02e780c8149109664c84ebb6cd8941ac0c00e240d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0058_SBCK_008-1a}
body:
  text: 山南西道節度參謀試大理評事平昌孟郊送别下感别送從叔校書簡再登科東歸長安車馬道髙槐柳一作結浮隂下有名利人一人千萬心黄鵠多逺勢滄溟無近潯怡怡静退姿泠泠思歸吟菱唱忽生聽芸書迴望深清風散言笑餘花綴衣襟獨恨魚鳥别一飛將一沉送玄亮師蘭泉滌我襟杉月棲我心茗啜味一作緑淨花經誦清柔音何處笑爲别淡情愁不侵送李尊師玄口誦碧簡文身是青霞君頭冠兩片月肩身一作披一條雲松骨輕自飛鶴心髙不羣同晝上人送郭邵一作秀才江南尋兄弟地池一作上春色生眼前詩彩明手擕片寳月言是髙僧名溪轉萬曲心石一作水流千里聲飛鳴向誰去江鴻弟與兄春日同韋郎中使君送鄒儒立少府扶侍赴雲陽離思着百草緜緜生無窮側聞畿甸秀三振詞䇿雄太守不韻俗諸生皆變風郡齋敞西清楚瑟驚南鴻海畔帝高一作城望雲陽天色中酒酣正芳景詩綴新碧叢服綵老萊並侍車江革同過隋栁顦顇入洛花蒙籠髙步詎留足前程在層空獨慙病鶴羽飛送力難崇送從叔校書簡南歸東㳺一作長安别離道宛在東城隅寒草根未死愁人心已枯促促水上景遥遥天際途生隨昏曉中皆被日月驅北騎達驥達一作山岳南帆指江湖髙蹤一超越千里在須臾送韓愈從軍志士感㤙起變衣非變性親賔攺舊觀僮僕生新敬坐作羣書吟行爲孤劒詠始知出處心不失平生正淒淒天地秋凜凜軍馬令驛塵時一飛物色極四靜王師既不戰廟略在無競王粲有所依元瑜初應命一章喻檄明百萬心氣定今朝旌鼓前笑别丈夫盛同茅郎中使君送河南裴文學河南有歸客江風繞行襟送君無塵聽舞鶴清瑟音菱蔓綴楚棹日華正嵩岑如何謝文學還起㑹雲長一作吟送李翺習之習之勢翩翩東南去遥遥贈寄一作君雙履足一爲上臯橋臯橋路逶迤碧水清風飄新秋折藕花應對呉語嬌千巷分渌波四門生早潮湖榜輕褭褭酒旗髙寥寥小時履齒痕有處應未銷舊憶如霧星怳見扵夢消言之燒人心事去不可招獨孤宅前曲箜茯醉中謡壯年俱悠悠逮兹各焦焦執手復執手唯道無枯凋送丹霞子阮芳顔上人歸山松色不肯秋玉性不可柔登山湏正路飲水須直流倩鶴附書信索雲作衣裘仙村莫道逺枉䇿招交遊送從舅端適楚地歸情似泛空飄蕩楚波中羽扇掃輕汗布㠶篩細風江花折菡蓞岸影泊梧桐元舅唱離别賤生愁不窮送盧汀侍御歸天徳幕仲宣領騎射結束皆少年匹馬黄河岸射鵰清霜天旌旗防日北道路上雲巔古雪無銷鑠新冰有堆填清溪徒聳誚白壁自招賢豈比重思者閉門方獨全送草書獻上人歸廬山狂僧不爲酒狂筆自通天將書雲霞片直至清明巔手中飛黒電象外㵼玄泉萬物隨指顧三光爲迴旋驟書雲霮䨴洗硯山晴鮮忽怒畫虵虺噴然生風煙江人願停筆驚浪恐傾船和薛先輩送獨孤秀才上都赴嘉㑹字得青秦雲攀窈窕楚桂搴芳馨五色豈徒爾萬枝皆有靈仙謡天上貴林詠雪中青持此一爲贈送君翔杳冥送崔爽之湖南江與湖相通一水洗髙空定知一日帆使得作一竭千里風雪唱與誰和俗情多不通何當逸翮縱鶴迹一作逸飛起泥沙中送超上人歸天台天台山最髙動躡赤仙一作城霞何以靜雙目掃山除妄花何以潔其性形影一作鑒濾泉去泥沙靈境物皆直萬松無一斜月中見心近雲外將世賖山獸䕶方丈山猿捧袈裟遺身獨得身笑我牽名華同李益崔放送王鍊師還樓觀兼爲羣公先營山居十千一作年白雲士一卷紫芝書來結崆峒侣還期縹緲居霞冠遺彩翠月丹一作帔上空虚寄謝泉壽水清泠閑有餘張徐州席送岑秀才振振芝蘭步昇自君子堂泠泠松桂吟生自楚客腸羇鳥無定棲驚蓬在它鄉去兹門館閑即彼道路長雨餘山川淨麥熟草木涼楚淚滴章句京塵染衣裳贈君無餘它久要不可忘送黄構擢第後歸江南澹澹滄海氣結成黄香才㓜齡思奮飛弱冠逰靈臺一鶚顧喬木衆禽不敢猜一驥騁長衢衆獸不敢陪遂得㑹風雨感通如雲雷至矣小宗伯確乎心不回能令幽静人聲實喧九垓却憶江南道祖筵花裏開春風不能别别罷空徘徊送道士十年山上行山上無遺蹤一日人間㳺六合人皆逢自有意中侣白寒徒相從送孟寂赴舉烈士不憂身爲君吟苦辛男兒乆失意寳劒亦生塵浮俗官是貴君子道所珍況是聖明立豈乏證玉臣濁水無白日清流鑒蒼旻賢愚皎然别結交當有因同溧陽宰送孫秀才廢瑟難爲絃南風難爲歌幽幽拙疾中怱怱浮夢多清韻始嘯侣雅言相與和訟閑毎徃招祖送奈若何牽苦強爲贈邦邑光峩峩溧陽唐興寺觀薔薇花同諸公餞陳明府忽驚紅琉璃千艶萬艶開佛火不燒物淨香空徘徊花下印文字林間詠觴盃羣官餞宰官此地車馬來送栁淳青山臨黄河下有長安道世上名利人相逢不知老送殷秀才南逰詩句臨一作離袂酒花薫别顔水程千里外岸泊㡬宵間風葉亂辭木雪猿清叫山南中多作一高古事詠遍始應還送青陽上人逰越秋風吹白髮㣲宦自蕭索江僧何用歎溪縣饒寂寞楚思物皆清越山勝非薄時看鏡中月獨向衣上落多謝入冥鴻笑予在籠鶴奉同朝賢送新羅使淼淼望逺國一萍秋海中恩傳日月外夢在波濤東浪興豁胷臆泛程舟虚空既兹吟仗信亦以難私躬實怪賞不足異鮮悦多叢安危所繫重征役誰能窮彼俗媚文史聖朝冨才雄送行數百首各以鏗竒工冗隷竊抽韻孤屬思將同留弟郢不得送之江南剛有下水船白日留不得老人獨自歸苦淚滿眼黒送陸暢歸湖州因憑題吊一作故人皎然塔陸羽墳渺渺霅寺前白蘋多清風昔㳺詩㑹滿今游詩㑹空孤詠玉淒惻逺思景䝉籠杼山塼塔禪竟陵廣擴一作宵翁饒彼草木聲髣髴聞餘聦因君寄數句遍爲書其藂追吟當時說來者實不窮江調難再得京塵徒滿躬送君溪鴛鴦彩色雙飛東東多髙静鄉芳宅冬亦崇手自擷甘㫖供養歡冲融待我遂前心收拾使有終不然洛岸亭歸死爲大同送淡公十二首燕本冰雪骨雪操一作冰越淡蓮花風五言雙寳刀聨響髙飛鴻翰苑錢舎人詩韻鏗雷公識本末識淡仰詠嗟無窮清恨生物表朗玉傾夢中常扵泠竹坐相語道意冲嵩洛興不薄稽江事難同明年若不來我作黄蒿翁何以兀其心爲君學虚空坐愛青草上意含滄海濵渺渺獨見水悠悠不問人鏡浪洗手緑剡花入心春雖然防外觸無奈饒衣新行當譯文字慰此吟殷勤銅斗飲江酒手拍銅斗歌儂是拍浪兒飲則拜浪婆脚踏小船頭獨速舞短蓑笑伊漁陽操空恃文章多閑倚青竹竿白日奈我何短簑不怕雨白鷺相爭飛短楫畫菰蒲鬭作豪横歸笑伊水健兒浪戰求光輝不如竹枝弓射鴨無是非射鴨復射鴨鴨驚菰蒲頭鴛鴦亦零落彩色難相求儂是清浪兒毎踏清浪㳺笑伊鄉貢郎踏土稱風流如何丱角翁至死不裹頭師得天文章所以相知懐數年伊雒同一旦江湖乖江湖有故莊小女啼喈喈我憂未相識乳養難和諧幸以片佛衣誘之令看齋齋中百福言催促西歸來伊洛氣味薄江湖文章多坐縁江湖岸意識作一織鮮明波銅斗短簑行新章其奈何兹焉激切句非是等閑歌製掣一作之附驛迴勿使餘風訛都城第一寺昭成屹嵯峨爲師書廣壁仰詠時經過徘徊相思心老淚雙滂沲江南寺中邑邑古一作平地生勝山開元呉語僧律韻髙且閑妙樂溪岸平桂榜復徃徃復一作還樹石相鬭生紅緑各異顔風味我遥憶新竒師獨攀報恩兼報徳寺與山爭鮮先一作橙橘金蓋檻竹蕉緑凝禪經童音韻細風磬清泠翩離腸繞師足舊憶隨路延不知㡬千尺至死方綿綿鄉在越鏡中分明見歸心鏡芳步步緑鏡水日日深異刹碧天上古香清桂岑朗約徒在昔章句忽盈今幸因西飛葉書作東風吟落我病枕上慰此浮恨侵牽師袈裟别師㫁袈裟歸問師何苦去感吃言語稀意恐被詩餓欲住將底依盧殷劉言史餓死君已噫不忍見别君哭君他是非詩人苦爲詩不如脱空飛一生空鷕氣非諫復非譏脫枯掛寒枝葉如一唾㣲一步一步乞半片半片衣倚詩爲活計從古多無肥詩飢老不怨勞師淚霏霏送魏端公入朝東洛尚淹翫西京足芳妍大賔威儀肅上客冠劒鮮豈惟空戀闕亦以將朝天局促塵末吏幽老病中絃徒懐青雲價忽至白髮年何當補風敎爲薦三百篇送盧郎中汀洛水春渡濶别離心悠悠一生空吟詩不覺成白頭向事毎計較與山實綢繆太華天上開其下車轍流縣街無塵土過客多淹留坐飲孤驛酒行思獨山逰逸關嵐氣明照渭空漪浮玉珂擺新歡聲與鸞鳯儔朝謁大家事唯余去無由送鄭僕射出節山南元僕射招一作酬鄭興國老出爲將紅旗入青山再招門下生結束餘病孱自笑騎馬醜強從驅馳間顧顧傾傾一作磨天路褭褭鏡下顔文魄旣飛越宦情唯等閑羡他白面少多是清朝班惜命非所報慎行誠獨艱悠悠去住心兩説何能刪别妻家芙蓉濕曉露秋别南浦中鴛鴦卷有一作新贈遥戀東牀空碧水不息浪清溪易生風參差坐作一路成阻飄颻去恨一作無窮孤雲目雖㫁明月心相通私情詎銷鑠積芳在春藂贈姚怤别美人廢琴瑟不是無巧彈聞君郢中唱始覺知音難驚蓬無還根馳水多分瀾倦客猒出門疲馬思解鞍何以冩此心贈君握中丹贈竟陵盧使君䖍别赤日千里火火中行子心孰不苦焦灼所行爲貧侵山木豈無凉猛獸蹲清隂歸人憶懷一作平坦别路多嶇嶔賴得竟陵守時聞建安吟贈别折楚芳楚芳芳色一作摇衣襟與韓愈李翺張籍話别朱絃奏離别華燈少光輝物色豈知異人心故將違客程殊未已嵗華忽然巳一作㣲秋桐故葉下寒露新鴈飛逺逰起重恨送人念先歸夜集類飢鳥晨光失相依馬跡遶川水鴈書還妻泣一作守閨闈常恐親朋阻獨行知慮非監察十五叔東齋招李益端公㑹别欲知惜别離㵼水還清池此地有君子芳蘭步葳蕤手掇綴一作雜英彩一作珮意摇春夜夢一作思莫作遶山雲循環無定期汴州别韓愈不飲濁水瀾空滯此汴河坐見遶岸冰水一作盡爲還海波四時不在家弊服㫁線多逺客獨顦顇春英落各一作婆娑汴水饒曲流野桑無直柯但爲君子心歎息飲之一作終匪他贈别殷山人説易後歸幽墅夫子説天地若與靈龜言幽幽人不知一一予所敦秋月吐白夜涼風韻清源旁通忽已逺神感寂不喧一悟祛萬結夕懷傾朝煩旅輈無停波别馬嘶去轅殷勤荒草士㑹有知己論壽安西渡奉别鄭相公二首洛河向西道石波横磷磷清風送君子車逺無還塵春别亦蕭索況兹冰霜晨零落景易入鬱抑抱難申百宵華燈宴一旦星散人歳去絃吐箭憂來蠶抽綸綿綿無窮事各各馳遶身徘徊黄縹緲倐忽春霜賔相爲物表物永謝區中姻日嗟來教士仰望無由親東都清風減君子西歸朝獨抱嵗晏恨泗吟不成謡貴逰意多味賤别情易消迴鴈憶前叫浪鳬念後漂悠悠孤飛景聳聳銜霜條昧趣多滯澀趾一作懶朋寡新僚病深理方晤悔至心自燒寂靜道何在憂勤學空饒乃知减聞見始遂情逍遥文字徒營織聲華諒疑驕顧慙耕稼士朴略氣韻調善士有餘食佳畦冬生苗養人在養身此㫖清如韶願貢髙古言敢望錫類招孟東野詩集卷第八
