body:
  text: 山南西道節度參謀試大理評事平昌孟郊送别下感别送從叔校書簡再登科東歸長安車馬道髙槐柳一作結浮隂下有名利人一人千萬心黃鵠多逺勢滄溟無近潯怡怡靜退姿泠泠思歸吟菱唱忽生聽藝書回望深清風散言笑餘花綴衣襟獨恨魚鳥别一飛將一沉送玄亮師蘭泉滌我襟杉月棲我心茗啜味一作緑淨花經誦清柔音何處笑為别淡情愁不侵送李尊師玄口誦碧簡文身是青霞君頭冠兩片月肩身一作披一條雲松骨輕自飛鶴心髙不羣同晝上人送郭邵一作秀才江南尋兄弟地池一作上春色生眼前詩彩明手擕片寶月言是髙僧名溪轉萬曲心石一作水流千里聲飛鳴向誰去江鴻弟與兄春日同韋郎中使君送鄒儒立少府扶侍赴雲陽離思著百草綿綿生無窮側聞畿甸秀三振詞䇿雄太守不韻俗諸生皆變風郡齋敞西清楚瑟驚南鴻海畔帝高一作城望雲陽天色中酒酣正芳景詩綴新碧叢服綵老萊並侍車江革同過隋栁憔悴入洛花蒙籠髙步詎留足前程在層空獨慙病鶴羽飛送力難崇送從叔校書簡南歸東遊一作長安别離道宛在東城隅寒草根未死愁人心已枯促促水上景遙遙天際途生隨昏曉中皆被日月驅北騎達驥達一作山嶽南帆指江湖髙蹤一超越千里在須臾送韓愈從軍志士感恩起變衣非變性親賔攺舊觀僮僕生新敬坐作羣書吟行為孤劒詠始知出處心不失平生正淒淒天地秋凜凜軍馬令驛塵時一飛物色極四靜王師既不戰廟略在無競王粲有所依元瑜初應命一章喻檄明百萬心氣定今朝旌鼓前笑别丈夫盛同茅郎中使君送河南裴文學河南有歸客江風繞行襟送君無塵聽舞鶴清瑟音菱蔓綴楚棹日華正嵩岑如何謝文學還起會雲長一作吟送李翺習之習之勢翩翩東南去遙遙贈寄一作君雙履足一為上臯橋臯橋路逶迤碧水清風飄新秋折藕花應對吳語嬌千巷分渌波四門生早潮湖榜輕裊裊酒旗髙寥寥小時履齒痕有處應未銷舊憶如霧星恍見于夢消言之燒人心事去不可招獨孤宅前曲箜茯醉中謡壯年俱悠悠逮兹各焦焦執手復執手唯道無枯凋送丹霞子阮芳顔上人歸山松色不肯秋玉性不可柔登山須正路飲水須直流倩鶴附書信索雲作衣裘仙村莫道逺枉䇿招交遊送從舅端適楚地歸情似泛空飄蕩楚波中羽扇掃輕汗布帆篩細風江花折菡蓞岸影泊梧桐元舅唱離别賤生愁不窮送盧汀侍御歸天德幕仲宣領騎射結束皆少年匹馬黃河岸射雕清霜天旌旗防日北道路上雲巔古雪無銷鑠新冰有堆填清溪徒聳誚白壁自招賢豈比重思者閉門方獨全送草書獻上人歸廬山狂僧不為酒狂筆自通天將書雲霞片直至清明巔手中飛黑電象外㵼玄泉萬物隨指顧三光為回旋驟書雲霮䨴洗硯山晴鮮忽怒畫蛇虺噴然生風煙江人願停筆驚浪恐傾船和薛先輩送獨孤秀才上都赴嘉會字得青秦雲攀窈窕楚桂搴芳馨五色豈徒爾萬枝皆有靈仙謡天上貴林詠雪中青持此一為贈送君翔杳冥送崔爽之湖南江與湖相通一水洗髙空定知一日帆使得作一竭千里風雪唱與誰和俗情多不通何當逸翮縱鶴迹一作逸飛起泥沙中送超上人歸天台天台山最髙動躡赤仙一作城霞何以靜雙目掃山除妄花何以潔其性形影一作鑒濾泉去泥沙靈境物皆直萬松無一斜月中見心近雲外將世賖山獸護方丈山猿捧袈裟遺身獨得身笑我牽名華同李益崔放送王鍊師還樓觀兼為羣公先營山居十千一作年白雲士一卷紫芝書來結崆洞侣還期縹眇居霞冠遺彩翠月丹一作帔上空虛寄謝泉壽水清泠間有餘張徐州席送岑秀才振振芝蘭步升自君子堂泠泠松桂吟生自楚客腸羇鳥無定棲驚蓬在它鄉去兹門館間即彼道路長雨餘山川淨麥熟草木涼楚淚滴章句京塵染衣裳贈君無餘它久要不可忘送黃構擢第後歸江南淡淡滄海氣結成黃香才幼齡思奮飛弱冠逰靈臺一鶚顧喬木衆禽不敢猜一驥騁長衢衆獸不敢陪遂得會風雨感通如雲雷至矣小宗伯確乎心不回能令幽靜人聲實喧九垓却憶江南道祖筵花裏開春風不能别别罷空徘徊送道士十年山上行山上無遺蹤一日人間遊六合人皆逢自有意中侣白寒徒相從送孟寂赴舉烈士不憂身為君吟苦辛男兒久失意寶劒亦生塵浮俗官是貴君子道所珍況是聖明立豈乏證玉臣濁水無白日清流鑒蒼旻賢愚皎然别結交當有因同溧陽宰送孫秀才廢瑟難為絃南風難為歌幽幽拙疾中匆匆浮夢多清韻始嘯侣雅言相與和訟間每往招祖送奈若何牽苦強為贈邦邑光峩峩溧陽唐興寺觀薔薇花同諸公餞陳明府忽驚紅琉璃千艷萬艷開佛火不燒物淨香空徘徊花下印文字林間詠觴杯羣官餞宰官此地車馬來送栁淳青山臨黃河下有長安道世上名利人相逢不知老送殷秀才南逰詩句臨一作離袂酒花薰别顔水程千里外岸泊幾宵間風葉亂辭木雪猿清叫山南中多作一高古事詠遍始應還送青陽上人逰越秋風吹白髮微宦自蕭索江僧何用歎溪縣饒寂寞楚思物皆清越山勝非薄時看鏡中月獨向衣上落多謝入冥鴻笑豫在籠鶴奉同朝賢送新羅使渺渺望逺國一萍秋海中恩傳日月外夢在波濤東浪興豁胸臆泛程舟虛空既兹吟仗信亦以難私躬實怪賞不足異鮮悅多叢安危所繫重征役誰能窮彼俗媚文史聖朝冨才雄送行數百首各以鏗竒工冗隸竊抽韻孤屬思將同留弟郢不得送之江南剛有下水船白日留不得老人獨自歸苦淚滿眼黑送陸暢歸湖州因憑題吊一作故人皎然塔陸羽墳渺渺霅寺前白蘋多清風昔遊詩會滿今遊詩會空孤詠玉淒惻逺思景蒙籠杼山磚塔禪竟陵廣擴一作宵翁饒彼草木聲髣佛聞餘聰因君寄數句遍為書其藂追吟當時説來者實不窮江調難再得京塵徒滿躬送君溪鴛鴦彩色雙飛東東多髙靜鄉芳宅冬亦崇手自擷甘旨供養歡沖融待我遂前心收拾使有終不然洛岸亭歸死為大同送淡公十二首燕本冰雪骨雪操一作冰越淡蓮花風五言雙寶刀聨響髙飛鴻翰苑錢舍人詩韻鏗雷公識本末識淡仰詠嗟無窮清恨生物表朗玉傾夢中常于泠竹坐相語道意沖嵩洛興不薄稽江事難同明年若不來我作黃蒿翁何以兀其心為君學虛空坐愛青草上意含滄海濵渺渺獨見水悠悠不問人鏡浪洗手緑剡花入心春雖然防外觸無奈饒衣新行當譯文字慰此吟殷勤銅斗飲江酒手拍銅斗歌儂是拍浪兒飲則拜浪婆腳踏小船頭獨速舞短蓑笑伊漁陽操空恃文章多間倚青竹竿白日奈我何短簑不怕雨白鷺相爭飛短楫畫菰蒲鬭作豪橫歸笑伊水健兒浪戰求光輝不如竹枝弓射鴨無是非射鴨復射鴨鴨驚菰蒲頭鴛鴦亦零落彩色難相求儂是清浪兒每踏清浪遊笑伊鄉貢郎踏土稱風流如何丱角翁至死不裹頭師得天文章所以相知懷數年伊雒同一旦江湖乖江湖有故莊小女啼喈喈我憂未相識乳養難和諧幸以片佛衣誘之令看齋齋中百福言催促西歸來伊洛氣味薄江湖文章多坐緣江湖岸意識作一織鮮明波銅斗短簑行新章其奈何兹焉激切句非是等間歌製掣一作之附驛回勿使餘風訛都城第一寺昭成屹嵯峨為師書廣壁仰詠時經過徘徊相思心老淚雙滂沱江南寺中邑邑古一作平地生勝山開元吳語僧律韻髙且間妙樂溪岸平桂榜復往往復一作還樹石相鬭生紅緑各異顔風味我遙憶新竒師獨攀報恩兼報德寺與山爭鮮先一作橙橘金蓋檻竹蕉緑凝禪經童音韻細風磬清泠翩離腸繞師足舊憶隨路延不知幾千尺至死方綿綿鄉在越鏡中分明見歸心鏡芳步步緑鏡水日日深異剎碧天上古香清桂岑朗約徒在昔章句忽盈今幸因西飛葉書作東風吟落我病枕上慰此浮恨侵牽師袈裟别師斷袈裟歸問師何苦去感吃言語稀意恐被詩餓欲住將底依盧殷劉言史餓死君已噫不忍見别君哭君他是非詩人苦為詩不如脫空飛一生空鷕氣非諫復非譏脫枯挂寒枝葉如一唾微一步一步乞半片半片衣倚詩為活計從古多無肥詩飢老不怨勞師淚霏霏送魏端公入朝東洛尚淹玩西京足芳妍大賔威儀肅上客冠劒鮮豈惟空戀闕亦以將朝天局促塵末吏幽老病中絃徒懷青雲價忽至白髮年何當補風教為薦三百篇送盧郎中汀洛水春渡濶别離心悠悠一生空吟詩不覺成白頭向事每計較與山實綢繆太華天上開其下車轍流縣街無塵土過客多淹留坐飲孤驛酒行思獨山逰逸關嵐氣明照渭空漪浮玉珂擺新歡聲與鸞鳯儔朝謁大家事唯余去無由送鄭僕射出節山南元僕射招一作酬鄭興國老出為將紅旗入青山再招門下生結束餘病孱自笑騎馬醜強從驅馳間顧顧傾傾一作磨天路裊裊鏡下顔文魄既飛越宦情唯等間羡他白面少多是清朝班惜命非所報慎行誠獨艱悠悠去住心兩説何能刪别妻家芙蓉濕曉露秋别南浦中鴛鴦卷有一作新贈遙戀東牀空碧水不息浪清溪易生風參差坐作一路成阻飄颻去恨一作無窮孤雲目雖斷明月心相通私情詎銷鑠積芳在春藂贈姚怤别美人廢琴瑟不是無巧彈聞君郢中唱始覺知音難驚蓬無還根馳水多分瀾倦客猒出門疲馬思解鞍何以寫此心贈君握中丹贈竟陵盧使君虔别赤日千里火火中行子心孰不苦焦灼所行為貧侵山木豈無涼猛獸蹲清隂歸人憶懷一作平坦别路多嶇嶔賴得竟陵守時聞建安吟贈别折楚芳楚芳芳色一作搖衣襟與韓愈李翺張籍話别朱絃奏離别華燈少光輝物色豈知異人心故將違客程殊未已嵗華忽然巳一作微秋桐故葉下寒露新鴈飛逺逰起重恨送人念先歸夜集類飢鳥晨光失相依馬迹繞川水鴈書還妻泣一作守閨闈常恐親朋阻獨行知慮非監察十五叔東齋招李益端公會别欲知惜别離㵼水還清池此地有君子芳蘭步葳蕤手掇綴一作雜英彩一作珮意搖春夜夢一作思莫作繞山雲循環無定期汴州别韓愈不飲濁水瀾空滯此汴河坐見繞岸冰水一作盡為還海波四時不在家弊服斷線多逺客獨憔悴春英落各一作婆娑汴水饒曲流野桑無直柯但為君子心歎息飲之一作終匪他贈别殷山人説易後歸幽墅夫子説天地若與靈龜言幽幽人不知一一豫所敦秋月吐白夜涼風韻清源旁通忽已逺神感寂不喧一悟祛萬結夕懷傾朝煩旅輈無停波别馬嘶去轅殷勤荒草士會有知己論壽安西渡奉别鄭相公二首洛河向西道石波橫磷磷清風送君子車逺無還塵春别亦蕭索況兹冰霜晨零落景易入鬱抑抱難申百宵華燈宴一旦星散人歲去絃吐箭憂來蠶抽綸綿綿無窮事各各馳繞身徘徊黃縹眇倐忽春霜賔相為物表物永謝區中姻日嗟來教士仰望無由親東都清風減君子西歸朝獨抱嵗晏恨泗吟不成謡貴逰意多味賤别情易消回鴈憶前叫浪鳬念後漂悠悠孤飛景聳聳銜霜條昧趣多滯澀趾一作懶朋寡新僚病深理方晤悔至心自燒寂靜道何在憂勤學空饒乃知減聞見始遂情逍遙文字徒營織聲華諒疑驕顧慙耕稼士朴略氣韻調善士有餘食佳畦冬生苗養人在養身此旨清如韶願貢髙古言敢望錫類招孟東野詩集卷第八
