  text: 孟東野詩集卷第六
  hash: sha256:7c52b0abd7f9233bece18dfb029f13548519dc9e2aeeeb4ee941f49088f90ee9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0058_SBCK_006-1a}
body:
  text: 山南西道節度參謀試大理評事平昌孟郊行役西上經靈寶觀人舊宅觀即尹真道士無白髮語音言一作靈泉清青松多壽色白石恆夜明放步霽霞起振衣華風生真文祕中頂寶氣浮四楹一片古關路萬里今人行上仙一可見驅䇿徒西征泛黃河誰開崑崙源流出混沌河積雨羽一作飛作風驚龍噴為波湘瑟颼飀絃越賔客一作嗚咽歌有根雙眼一作不可洗虛此來經過往河陽宿峽陵寄李侍御暮天寒風悲屑屑啼烏繞樹泉水噎行路解鞍投古陵蒼蒼隔山見微月梟鳴犬吠霜煙昏開囊拂巾對盤飱人生窮達感知己明日投君申片言鴉路溪行呈陸中丞鴉路不可越二十六渡溪有物飲碧水髙林挂青霓歷覽道更險驅使迹頻暌視聽易常主心魂㸦相迷浪石忽搖動沙堤信難躋危峯紫霄外古木浮雲齊出阻望汝郡太賢多招携疲馬戀舊秣羇禽思故棲應憐泣楚玉棄置如塵泥獨宿峴首憶長安故人月回無隱物況復大江秋江城與沙村人語風颼飀峴亭當此時故人不同逰故人在長安亦可將夢求自商行謁復州盧使君虔一身繞千山逺作行路人未遂東吳歸暫出西京塵仲宣荆州客今余為一作竟陵賔往迹雖不同託意皆有因商嶺莓苔滑石坂上下頻江漢沙泥潔永日水白一作光景新獨淚起殘夜孤吟望初晨驅馳竟何事章句依深仁夢澤行楚山爭蔽虧日月無全輝楚路饒回惑旅人有多一作迷歸騏驥思北首鷓鴣願南飛我懷京雒逰未厭風塵衣京山行衆虻聚病馬流血不得行後路起夜色前山聞虎聲此時逰子心百尺風中旌旅次湘沅有懷靈均分拙多感激久逰遵長塗經過湘水源懷古方踟蹰舊稱楚靈均此處殞忠軀側聆故老言遂得旌賢愚名參君子場行為小人儒騷文衒貞亮體物情﨑嶇三黜有愠色即非賢哲模五十爵髙秩謬膺從大夫胸襟積憂愁容鬢復先一作雕枯死為不弔鬼生作猜謗徒吟澤潔其身忠節寧見輸懷沙滅其性孝行焉能俱且聞善稱君一何善自殊且聞過稱已一何過不渝悠哉風土人角黍投川隅相傳歷千祀哀悼延八區如今聖明朝養育無羇孤君臣逸雍熙德化盈紛敷巾車徇前侣白日猶昆吾寄君臣子心戒此真良圖過彭澤揚帆過彭澤舟人訝歎息不見種柳人霜風空寂歷過分水嶺山壯馬力短路行石齒中十步九舉轡回環失西東溪水變為雨懸崖隂濛濛客衣飄颻𥘉葛花零落風白日捨我沒去一作征途忽然窮分水嶺别夜示從弟寂于孟叔一作示南中少平地山水重疊生别泉萬餘曲迷舟獨難行四際亂峯合一眺千慮并潺湲冬夏冷光彩晝夜明賞心難久勝離腸忽自驚古木搖霽色髙風動秋聲棄回風結秋聲一作古木解舊飲爾一樽酒慰我百憂輕嘉期何處定此晨堪寄情連州吟三章春風朝夕起吹緑日日深試為連州吟淚下不可禁連山何連連連天碧岑崟衰猿哭花死子規裂客心蘭芷結新佩瀟湘遺舊音怨聲能翦絃坐撫零落琴羽翼不自有相追力難任唯憑方寸靈獨夜萬里尋方尋魂飄颻南夢山嶇嶔髣佛驚魍魎悉窣聞楓林正直被放者鬼魅無所侵賢人多安排俗士多虛歆孤懷吐明月衆毁鑠黃金願君保玄曜壯志無自沉朝亦連州吟暮亦連州吟連州果有信一紙萬里心開緘白雲斷明月墯衣襟南風嘶舜琯苦竹動猿音萬里愁一色瀟湘雨淫淫兩劒忽相觸雙蛟恣浮沉鬭水正回斡倒流安可禁空愁江海信驚浪隔相尋旅行楚水結冰薄楚雲為雨微野梅參差發旅榜逍遙歸紀贈上河陽李大夫上將秉神略至兵無猛威三軍當嚴冬一撫勝重衣霜劒奪衆景夜星失長輝蒼鷹獨立時惡鳥不敢飛武牢鎖天關河橋紐地機大將奚以安守此稱者稀貧士少顔色貴門多輕肥試登山嶽髙方見草木微山嶽恩既廣草木心皆歸投贈張端公君子量不極胸吞百川流嫉邪霜氣直問俗春辭柔日戶晝輝靜月杯宵景幽詠驚芙蓉發笑激風飈秋鸞步獨無侣鶴音仍寡儔幸沾分寸顧散此千萬憂贈蘇州韋郎中使君謝客吟一聲霜落羣聽清文含元氣柔鼓動萬物輕嘉木依性植曲枝亦不生塵埃徐庾詞金玉曹劉名章句作雅正江山益鮮明蘋萍一水草菰蒲片池榮曽是康樂詠如今搴其英顧惟菲薄質亦願將此并上張徐州為水不入海安得浮天波為木不在山安得橫日柯再來君子傍始覺精義多藝多一作大德唯一施衆情自偏頗至樂無變一作宫徵至聲遺謳歌願鼓空桑絃永使萬物和顧已誠拙訥干名已蹉跎獻詞唯在口所欲無餘它乍作支泉石乍作翳松蘿一不改方圓破質為琢磨賤子本如此大賢心若何豈是無異途異途難經過上包祭酒嶽嶽冠蓋彥英英文字雄瓊音獨聽時塵韻固不同春雲生紙上秋濤起胸中時吟五君詠再舉七子風何幸松桂侣見知勤苦功願將黃鶴翅一借飛雲空贈崔純亮食薺腸亦苦強歌聲無歡出門即有礙誰謂天地寬有礙非遐方長安大道傍小人智慮險平地生太行鏡破不攺光蘭死不攺香始知君子心交久道益彰君心與我懷離别俱回遑譬如浸蘖泉流苦巳日長忍泣目易衰忍憂形易傷項籍非不壯賈生非不良當其失意時涕泗各沾裳古人勸加餐食一作此餐食一作難自強一飯九祝噎一嗟十斷腸況是兒女怨怨氣凌彼蒼彼蒼昔有知白日下清霜今朝始驚歎呼一作碧落空茫茫贈文應上人棲遲青山巔髙靜身所便不踐有命草但飲無聲泉齋性空轉寂學情深更専經文開貝葉衣製垂秋蓮猒此俗人羣暫來還却旋嚴河南赤令風骨峭語言清霜寒不必用雄威見者毛髮攢我有赤令心未得赤令官終朝衡門下忍志將築彈君從西省郎正有東洛觀洛民蕭條久威恩憫撫難苦竹聲嘯雪夜齋聞千竿詩人偶寄耳聽苦心多端多端落杯酒酒中方得歡隱士多隱酒此言信難刋取次令坊沽舉止務在寬何必紅燭嬌始言清宴闌丈夫莫矜莊矜莊不中看贈李觀觀𥘉登第誰言形影親燈滅影去身誰言魚水歡水竭魚枯損一作鱗昔為同恨客今為獨笑人捨豫在泥轍飄迹上雲津卧木易成蠧棄花難再春何言對芳景愁望極蕭晨埋劒誰識氣匣絃日生塵願君語髙風為余問蒼旻吳安西館贈從弟楚客蒙籠楊桞館中有南風生風生今為誰湘客多逺情孤枕楚水夢獨帆楚江程覺來殘恨深作一心尚與歸路并玉匣正絃在請君時一鳴贈章仇將軍將軍不誇劒才氣為英雄五嶽拽力內百川傾意中本立誰敢拔飛文自難窮前時天地翻已有扶正功贈道月上人僧貌淨無點僧衣寧綴華尋常晝日行不使身影斜飯木煮松柏坐山敷邀一作雲霞欲知禪隱髙緝薜為袈裟杼情因上郎中二十二叔監察十五叔兼呈李益端公柳縝評事方憑指下絃寫出心中言寸草賤子命髙山主人恩逰邉風沙意夢楚波濤魂一日引别袂九回霑淚䀶自悲何以然在禮闕晨昏名利時轉甚是非宵亦喧浮情少定主百慮隨世翻舉此胸臆恨幸從賢哲論明明三飛鸞與雙鸞一作步兵照物如朝暾贈城郭道士望裏失却山聽中遺却泉松枝休䇿雲藥囊翻貯錢曽依青桂鄰學得白雲絃别别意未回世上為隱仙桐廬山中贈李明府靜境無濁氛清雨零碧雲千山不隱響一葉動亦聞即此佳志士精微誰相羣欲識楚化一作章句袖中蘭茞薰獻漢南樊尚書天下昔崩亂大君識賢臣衆木盡搖落始見竹色真兵勢走山嶽陽光潛埃塵心開玄女符面縳清波人異俗既從化澆風亦歸淳自公理斯郡寒谷皆變春旗影卷赤電劒鋒匣青鱗如何嵩髙氣作鎮楚水濵雲鏡忽開霽景一作孤光射無垠乃知尋常鑒照影不照神贈轉運陸中丞掌運職既大摧邪名更雄鵬飛簸曲雲鶚怒生直風投彼霜雪令翦除荆棘􅓜楚倉傾向西吳米發登一作自東忛影咽河口車聲聾關中堯知才䇿髙人喜道路通皆驚內史力繼得鄼侯功萊子真為少相如未免窮衣花野菡蓞書葉山梧桐不是宗匠心誰憐久栖蓬贈萬年陸郎中天子憂劇縣寄深華省郎紛紛風響珮蟄蟄劒開霜舊事笑堆案新聲唯雅章誰言百里才終作橫天梁江鴻恥承眷雲津未能翔徘徊塵俗中短毳無輝光擢第後東歸書懷獻坐主吕侍郎昔嵗辭親淚今為戀恩泣去住情難並别離景易戢夭矯大空鱗曽為小泉蟄幽意獨沉時震雷忽相及神行既不宰直致非所執至運本遺功輕生各苦一作自立大君思此化良佐自然集寶鏡無私光時文有新習慈親誡志就賤子歸情急擢第謝靈臺牽衣名一作出皇邑行襟海日曙逸抱江風入蒹葭得波浪芙蓉紅岸濕雲寺勢動搖山鐘韻噓吸舊逰期再踐懸水得重挹松蘿雖可居青紫終當拾古意贈梁肅補闕曲木忌日影讒人畏賢明自然照燭間不受邪佞輕不有百鍊火孰知寸金精金鉛正同在一作爐願分精與粗贈黔府王中丞楚舊説天下山半在黔中青又聞天下泉半落黔中鳴山水千萬繞中有君子行儒風一以扇汙俗心皆平我願中國春化從異方生昔為隂草毒今為陽華英嘉實綴緑蔓涼湍瀉清聲逍遙物景勝視聽空曠并困驥猶在轅沉珠尚隱精路遐莫及盻泥汚日已盈嵗宴將何從落葉甘自輕上達溪舍人北山少日月草木苦風霜貧士在重坎食梅有酸腸萬俗皆走圓一身心一作猶學方常恐衆毁至春葉成秋黃大賢秉髙鑒公燭無私光暗室曉未及幽吟涕空行贈主人斗水㵼大海不如㵼枯池分明賢達交豈顧豪華兒海有不足流豪有不足資枯鱗易為水貧士易為施幸覩君子席會將幽賤期側聞清風議如飲黃金巵此道與日月同光無盡時贈建業契公師住青山寺清華常繞身雖然到城郭衣上不棲塵獻襄陽于大夫襄陽青山郭漢江白銅堤謝公領兹郡山水無塵泥鐵馬萬霜雪絳旗千虹霓風漪參差泛石板重疊躋舊淚不復墯新歡居然齊還耕竟原野歸老相扶携物色增曖曖寒芳更萋萋淵清有遐略髙躅無近蹊掠奭歌有安緩一作衆賦無暴即此冨蒼翠自然引翔棲曩逰常抱憶夙好今尚暌願言從逸轡暇日凌清溪贈鄭夫子魴天地入胸臆吁嗟生風雷文章得其微物象由我裁宋玉逞大句李白飛狂才苟非聖賢心孰與造化該勉矣鄭夫子驪珠今始胎大隱訪三首崔從事鄖以直隳職官一作古人留清風千載遙贈君破松見貞心裂竹看直文殘月色不攺髙賢德常新家懷詩書冨宅抱草木貧安得一蹄泉來化千尺鱗含意永不語釣璜幽水濵章仇將軍良棄功守貧飲君江海心詎誰一作能辨淺深揖君山嶽德誰能齊嶔岑東海精為月西嶽氣凝金進則萬景晝盡一作退則羣物隂我欲薦此言天門峻沉沉風飈亦感激為我颼飀吟趙記室俶在職無事卑靜身後老髙動物先摧方圓水任器剛徑木成灰大道母羣物達人腹衆才時吟堯舜篇心向無為開彼隱山萬曲我隱酒一杯公庭何所有日日清風來贈韓郎中愈二首何以定結一作交契贈君髙山石何以保貞堅贈君青松色貧居過此外無可相彩飾聞君碩鼠詩吟之淚空滴碩鼠既穿墉又嚙機上絲穿墉有間餘一作土嚙絲無餘衣朝吟枯桑柘暮泣穿杼機豈是無巧妙絲斷將何施衆人上肥華忠士多飢羸願君保此節此貞節一作願保天意當察微本作一詩右二詩一前日逺别離今日生白髮欲知萬里情曉卧半牀月常恐百蟲秋使我芳草歇此一篇一本無戲贈無本二首長安秋聲乾木葉相號悲瘦僧卧冰凌嘲朔一作詠含金痍金痍非戰痕峭病方在兹詩骨聳東野詩濤湧退之有時踉蹌行人驚鶴阿師可惜李杜死不見此狂癡燕僧聳聽詞袈裟喜新翻北嶽厭利殺玄功生微言天髙亦可飛海廣亦可源文章查無底斸掘誰能根夢靈髣佛到匠我方與論拾月鯨口邉何人免為吞燕僧擺造化萬有隨手奔補綴雜霞衣笑傲諸貴門將明文在身亦爾示一作道所存朔雪凝别句朔風飄征魂再期嵩少逰一訪蓬蘿村春草步步緑春山日日喧遙鶯相應吟晚聽恐不繁相思塞心胸髙逸難攀援孟東野詩集卷第六
