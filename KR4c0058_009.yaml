front:
  text: 孟東野詩集卷第九
  hash: sha256:82d718912e08efd52afdb559783aea16110be014521da7e1398fca78675deb87
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0058_SBCK_009-1a}
body:
  text: 山南西道節度參謀試大理評事平昌孟郊詠物宇文秀才齋中海栁詠玉縷青葳㽔結為芳樹姿忽驚明月鈎鈎出珊瑚枝灼灼不死花蒙蒙長生絲飲柏况泛一作仙味詠蘭擬凝一作古詞霜風清颼颼與君長相思搖栁一作採柳弱弱本易驚看看勢難定因風似醉舞盡日不能正時邀詠花女笑輟春粧鏡曉鶴曉鶴彈古舌婆羅門叫音應吹天上律不使塵中尋虛空夢皆斷歆唏安能禁如開孤月口似説明星心既非人間韻枉作人間禽不如相將去碧落窠巢深和薔薇花歌仙機札札軋軋一作織鳯凰花開七十有二行天霞落地攢紅光風枝嫋嫋時一揚飛散葩馥繞空王忽驚錦浪洗新色又似宫娃逞糚飾終當一使移花老一作根還比蒲桃天上植邀人賞薔薇蜀色庶可比楚叢亦應無醉紅不自力狂豔如索扶麗蘂惜未掃宛枝長臾紆何人是花侯詩老強相呼和宣州錢判官使院廳前石楠樹大朴既一剖衆材爭萬殊懿兹南海華來與北壤俱生長如自惜雪霜無凋渝籠籠抱靈秀簇簇抽芳膚寒日吐再艷頳子流細珠鴛鴦花數重翡翠葉四鋪雨洗新糚色一枝如一姝聳異敷庭際傾妍來坐隅散彩飾機桉餘輝盈盤盂髙意立一作因自一作造化常情逐榮枯主公方寸中陶植在須臾養此奉君子賞覿日為娛始覺石楠詠價傾賦西都棠頌庶可比桂詞難以踰因謝丘墟木空採操一作落泥塗時來開佳姿道去卧枯株爭芳無由緣受氣如鬱紆柚肝在郢匠嘆息何踟酬鄭毗躑躅詠不似人手致豈關地勢偏孤光裊餘翠獨影舞多妍迸火燒間地紅星墮青天忽驚物表物嘉客為留連品松追悲謝靈運不得殊常封縱然孔與顔亦莫及此松此松天格髙聳異千萬重􅎲拏拒古手擘裂少室峯擘裂風雨獰抓拏指爪道入難抱心學生易墮蹤時時數點仙嫋嫋一線龍霏微嵐浪際逰戲皓興濃品松徒髙髙雌鳴語一作詎噰噰賞異尚可貴賞潛誰能容名華非典實翦棄徒纎茸刻削大雅文所以不敢慵答李員外小榼味一拳芙蓉水傾玉何泠泠仙清夙已髙詩味今更馨試啜月入骨再銜愁盡醒荷君道古誠使我善飛振一作翎井上枸杞架深鎖銀泉甃髙葉架雲空不與凡木並自將仙蓋同影踈千點月聲細萬條風迸子鄰溝外飄香客位中花杯承此飲椿歲小無窮蜘蛛諷萬類皆有性各各稟天和𧖟身與汝身汝身何太訛𧖟身不為己汝身不為它𧖟絲為衣裳汝絲為網羅濟物幾無功害物日已多百蟲雖切恨其將奈爾何蚊五月中夜息飢蚊尚營營但將膏血求豈覺性命輕顧已寧自愧飲人以偷生願為天下㡡一使夜景清燭蛾燈前雙舞蛾猒生何太切想爾飛來心惡明不惡滅天若百尺髙應去掩明月和錢侍郎甘露玄天何以言瑞露青松繁忽見垂書迹還驚涌澧源春枝晨嫋嫋香味曉翻翻子禮忽來獻臣心固易敦清風惜不動薄霧肯蒙昏嘉晝色更晶仁慈久乃存一方難獨占天下恐爭論側聽飛中使重榮華萃一作德門從公樂萬壽餘慶及兒孫雜題和令狐侍郎郭郎中題項羽廟碧草凌古廟清塵鎖秋窗當時獨宰割猛志誰能降鼓氣雷作敵劒光電為雙新悲徒自起舊恨懷舊一作空浮江讀張碧集天寶太白殁六義已消歇大哉國風本喪而王澤竭先生今復生斯文信難缺下筆證興亡陳詞備風骨髙秋數奏琴澄潭一輪月誰作採詩官忍之教一作不揮發聽琴颯颯微雨收翻翻橡桐一作葉鳴月沉亂峯西寥落三四星前溪忽調琴隔林寒琤琤聞彈正弄聲不敢枕上聽回燭整頭簪漱泉立中庭定步履屐一作齒深貌禪目冥冥微風吹衣襟亦認宫徵聲學道三十年未免憂死生聞彈一夜中會盡天地情聞夜啼贈劉正元寄泣須寄黃河泉此中怨聲流徹方到一作天愁人獨有夜燈見一紙鄉書淚滴穿喜雨朝見一片雲暮成千里雨淒清濕髙枝散漫沾荒土終南山下作見此原野秀始知造化偏山村不假隂流水自日一作雨田家家梯碧峯門門鎖青煙因思蛻骨人化作飛桂仙觀種樹種樹皆待春春至難久留君看朝夕花誰免别離愁心意已零落種之仍未休胡為好竒者無事自買憂春後雨昨夜一霎雨天意蘇羣物何物最先知虛庭草爭出答友人贈炭青山白屋有仁人贈炭價重雙烏銀驅却坐上千重寒燒出爐中一片春吹霞弄日光不定暖得曲身成直身爛柯石仙界一日內人間千嵗窮雙碁未遍局萬物皆為空樵客返歸路斧柯爛從風唯餘石橋在猶自凌丹虹靈丹虹一作猶有尋言上人萬里莓苔地不見驅馳蹤唯開文字窗時寫日月容竹韻漫蕭屑草花徒纎蒙一作茸披霜入衆木獨自識青松噴玉布去塵咫尺步山笑康樂巖天開紫石屏泉縷作一鏤明月簾仙凝刻削迹靈綻雲霞纎恱開若有待瞥見終無厭俗玩詎能近道嬉方可淹踏著不死機欲歸多浮嫌古醉今忽醒今求古仍潛古今相共失語默兩難恬贈君噴玉布一濯髙嶄嶄姑蔑城徑越既成土強吳亦為墟皇風一已被兹邑信平居撫俗觀舊迹行春布新書興亡意何在綿歎空躊蹰崢嶸嶺疏鑿順髙下結構橫煙霞坐嘯郡齋肅玩竒石路斜古樹浮緑氣髙門結朱華始見崢嶸狀仰止逾可嘉尋裴處士涉水更登陸所向皆清真寒草不藏徑靈峯知有人悠哉鍊金客獨與煙霞親曽是欲輕舉誰言空隱淪逺心寄白月日一作華法回青春對此欽勝事胡為勞我身子慶詩王家事已竒孟氏慶無涯獻子還生子羲之又有之鳯兮且莫歎鯉也會聞詩小小豫章甲纎纎玉樹姿人來唯仰乳母抱未知慈我欲揀其養放麛者是誰憩淮上觀公法堂動覺日月短靜知時歲長自悲道路人暫宿空間堂孤燭讓清晝紗巾斂輝光髙僧積素行事外無剛強我有巖下桂願為爐中香不惜青翠姿為君師一作揚芬芳淮水色不汚汴流徒渾黃且將琉璃意淨綴芙蓉章明日還獨行羇愁來舊腸江邑春霖奉贈陳侍御江上花木凍雨中零落春應由放忠直在此成漂淪嘉艷皆損汚好音難殷勤天涯多逺限雪涕盈芳辰坐哭青草上卧吟幽水濵興言念風俗得意唯波鱗枕席病流濕簷楹若飛津始知吳楚水不及京洛塵風浦蕩歸棹泥陂陷征輪兩途日無遂相贈唯沾巾溧陽秋霽晚雨曉猶在蕭寥激前階星星滿衰鬢耿耿入秋懷舊識半零落前心驟相乖飽泉亦恐醉楊宦肅如齋上客處華池下寮宅枯崖叩髙占生物齟齬回難諧列仙文大霞霏晨暉元氣無常形玄轡飛霄外八景乘髙清手把玉皇袂携我晨中生玄挺自嘉會金書拆華名賢女密所妍相期洛水軿右方諸青童君歘駕空清虛徘徊西華館瓊輪暨晨抄虎騎逐煙散惠風振丹旌明燭朗八煥解襟墉房內神鈴鳴璀璨栖景若林柯九絃空中彈遺我積世憂釋此千載款恰眄無極已終夜復待旦清虛真人駕我八景輿歘然入玉清龍羣拂霄上虎旗攝朱兵逍遙三絃際萬流無暫停哀此去留會劫盡天地傾當尋無中景不死亦不生體彼自然道寂觀合大冥南嶽挺直幹玉英曜穎精有任靡期事無心自虛靈嘉會絳河內相與樂朱英金母飛空歌安度明丹霞煥上清八風鼓太和回我神霄輦遂造嶺玉阿咄嗟天地外九圍皆我家上採白日精下飲黃月華靈觀空無中鵬路無間邪顧見魏賢安濁氣傷汝和勤研玄中思道成更相過夏日謁智逺禪師吾師當幾祖説法云無空禪心三界外宴坐天地中院靜鬼神去身與草木同因知護王國滿鉢盛毒龍斗藪塵埃衣謁師見真宗何必千萬劫瞬息去樊籠盛夏火為日一堂十月風不得為弟子名姓挂儒宫訪嵩陽道士不遇先生五嶽逰文熖藏金鼎日下鶴過時人間空落影常言一粒藥不墮生死境何當列禦冦去問仙人請聽藍溪僧為元居士説維摩經古樹少枝葉真僧亦相依山木自曲直道人無是非手持維摩偈心向居士歸空景忽開霽雪花猶在衣洗然水溪晝寒物生光輝借車借車載家具家具少于車借者莫彈指貧窮何足嗟百年徒校役一作走萬事盡隨花喜符郎詩有天縱念符不由級屹得文章階白玉抽一毫緑珉已難排偷筆作文章乞墨潛磨揩海鯨始生尾試擺蓬壺渦幸當禁止之勿使恣狂懷自悲無子嗟喜妬雙喈喈憑周況先輩于朝賢乞茶道意勿乏味心緒病無悰蒙茗玉花盡越甌荷葉空錦水有鮮色蜀山饒芳叢雲根才翦緑印縫已霏紅曽向貴人得最將詩叟同幸為乞寄來救此病窮一作劣躬上昭成閣不得于從姪僧悟空院嘆嗟欲上千級尺一作閣問天三四言未盡數十登心目風浪翻手手把驚魄腳腳踏墜魂却流至舊手傍掣猶欲奔老病但自悲古蠧木萬痕老力安可誇秋海萍一根孤叟何所歸晝眼如黃昏常恐失好步入彼市井門結僧為親情䇿竹為子孫此誠徒切切此意空存存一寸地上語髙天何由聞魏博田興尚書聽嫂命不立非夫人詩君子耽古禮如饞魚吞鈎昨聞敬嫂言掣心東北流田尚書與禮相綢繆善詞聞天下一日一再周讀經垂老抱佛腳教妻讀黃經經黃名小品一紙千明星曽讀大般若細感盻響聽當時把齋中方寸抱萬靈忽復入長安蹴踏日月寧老方却歸來收拾可丁丁拂拭塵機桉開函就孤亭儒書難借索僧籖饒芳馨驛驛不開手鏗鏗聞異鈴得善如焚香去惡如脫腥安得顔子耳曽未如此聽聽之何有言德教貴有形何言中國外有國如海萍海萍國教異天聲各泠泠安排末定時心火競熒熒將如庶幾者聲盡形元冥謝李輈再到等間拜日晚夫妻猶相瘡況是賢人寃何必哭飛揚昨夜夢得劒為君藏中腸會將當風烹血染布衣裳勞君又扣門詞句失尋常我不忍出廳血字濕上牆血字耿不滅我心懼惶惶會有鏗鏘夫見之月生光生光非等間君其且安詳忽不貧喜盧同書船歸洛貧孟忽不貧請問孟何如盧同歸洛船崔嵬但載書江潮清翻翻淮潮碧徐徐夜信為朝信朝信良卷舒江淮君子水相送仁有餘我去官色衫肩經入君廬喃喃肩經郎言語傾琪琚琪琚鏗好詞鳥鵲躍庭除書船平安歸喜報鄉里閭我願拾遺柴巢經于空虛下免塵土侵上為作一與雲霞居日月更相鎖道義分明儲不願空岧嶤但願實工夫實空二理微分别相起豫經書荒蕪多為君勉勉鋤勉勉不敢專傳之方在諸孟東野詩集卷第九
