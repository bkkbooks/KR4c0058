body:
  text: 孟東野以詩鳴于中唐之間極為昌黎韓子所稱重至如聮句諸作與韓公角竒争雋不肯相下可謂雄矣先軰且有東野潤色退之之説雖未必然要其所成就終非翶湜所可班顧其辭意傷於晦澁無盛唐大家雄渾醖藉之風亦噐量使之然㦲提學楊按察䆳菴先生以全集不多見出所抄本屬商州梓行之維時同知于君睿奉命惟謹閲兩月工完先生欲晟識其後嗚呼末學小子扵名家述作何敢妄贅一言然先生嘉恵後學與同知君勤事奉公之羙不可以不白也扵是乎書弘治巳未春正月望日後學汝南強晟識孟東野詩目録山南西道節度參謀試大理評事平昌孟郊第一卷樂府上列女操灞上輕薄行長安羇旅行長安道送逺吟古薄命妾古離别古雜怨三首靜女吟歸信吟山老吟逰子吟小隠吟苦寒吟猛將吟傷哉行古怨湘絃怨楚竹吟逺愁曲貧女詞邊城吟新平歌殺氣不在邊結愛絃歌行覆巢行出門行二首湘妃怨巫山曲巫山髙楚怨塘下行臨池曲車遥遥征婦怨四首空城雀閑怨羽林行古意古别離逰俠行黃雀吟有所思求仙曲嬋姢篇南浦篇清東曲第二卷樂府下織婦辭古意折楊柳二首塞上吟古怨别古别曲樂府三首附陸長源答勸善吟望夫石寒江吟感興上審交怨别百憂路病衰松遣興退居卧病隠士獨愁春日有感將見故人傷時寓言偶作勸學贈農人長安早春罪松感興感懐八首逹士暮秋感思二首古興勸友夷門雪贈主人陸長源答附尭歌二首第三卷感興下亂離勸酒去婦君子勿鬱鬱二首聞砧逰子自歎求友投所知病客吟感懐離思結交傷春擇友夜憂惜苦寒地百姓吟出東門教坊歌兒訪疾酒徳冬日飢雪吟偷詩晚雪吟自惜老恨詠懐上湖州取解述情落第詠懐病起言懐秋夕貧居述懐夜感自遣再下第下第東歸失意寄劉侍御下第東南行歎命逺逰商州客舍長安旅情長安羇旅渭上思歸登科後初於洛中選歸義興莊居飬病呈從叔了雲第四卷詠懐下秋懐十五首靖安寄居雪春愁懊惱遊適上逰城南韓氏莊與友秋宵㑹話夜集招文士飲逰城南山墅登華嚴寺樓逰終南山逰龍池寺櫻桃亭春燕逰華山雲臺觀宿李秀才池亭邀花伴石淙十首逰韋七别業越中山水皇甫秀才山亭和逰琅瑘溪第五卷逰適下陪陸中丞公燕喜張從事至汝州郡齋聽琴同年春燕奉招陳侍御逰石龍渦浮石亭看花五首濟源春濟源寒食七首逰枋口二首逰枋口栁溪逰昭城寺嵩少旅次洛城東水亭洛橋晚望居處北郭貧居題陸鴻漸山舎題韋承緫幽居恵聚寺僧房題從叔述靈巖壁山題花嚴寺書牎藍溪元居士草堂新卜青羅幽居附陸長源答題藏書洞生生亭寒溪九首立徳新居十首第六卷行伇西上經靈寳觀泛黄河宿峽陵寄李侍御鴉路溪行獨宿峴首謁復州盧使君夢澤行京山行旅次湘沅懐靈均過彭澤過分水嶺分水嶺别從弟寂連州吟三章旅行紀贈上河陽李大夫投贈張端公贈蘇州韋使君上張徐州上包祭酒贈崔純亮贈文應上人嚴河南贈李觀贈從弟楚客贈章仇將軍贈道月上人杼情上叔贈城郭道士贈李明府獻漢南樊尚書贈轉運陸中丞贈萬年陸郎中獻坐主吕侍郎古意贈梁肅𥙷闕贈黔府王中丞楚上逹溪舎人贈主人贈建業契公獻襄陽于大夫贈鄭夫子魴大隠詠三首贈韓郎中愈二首戲贈無本二首第七卷懐寄寄張籍憶周秀才素上人舟中喜遇從叔簡懐南岳隠士二首春夜憶蕭子眞寄院中諸公寄洺州李大夫寄盧䖍使君寄崔純亮憶韓愈李翶寄張籍寄義興小女子憶江南弟寄澹公寄陜府鄧給事奉寄諫議十六叔寄鄭軍事十五唐二酬答答友人酬友人見寄新文答韓愈李觀别答晝上人止䜛作答姚怤見寄答郭郎中答盧䖍故園見寄從弟楚材見贈酬盧殷少府酬李侍御答盧仝奉答張舎人送别上送從弟郢東歸送從叔簡赴舉送別崔寅亮送柳淳先入關送無懐道士送温𥘉送盧䖍端公送任齊二秀才送曉公送豆盧䇿歸别墅送清逺上人送從叔簡送蕭鍊師第八卷送别下感别送從叔簡送玄亮師送李尊師玄送郭秀才送鄒儒立少府送從叔校書南歸送韓愈從軍送河南裴文學送李習之送人歸山送從舅端適楚地送盧汀侍御送獻上人送獨孤秀才送崔爽之湖南送超上人歸天台送王鍊師送岑秀才送黃􅌟送道士送孟寂赴舉送孫秀才餞陳明府送柳淳送殷秀才送青陽上人送新羅使送弟郢送陸暢送淡公十二首送魏端公入朝送盧郎中汀送鄭僕射别妻家贈姚怤别贈盧使君䖍别與韓愈籍話别李翶張東齋㑹别汴州别韓愈贈别殷山人奉别鄭相公二首第九卷詠物海柳詠揺桞曉鶴和薔薇花歌邀人賞薔薇石楠樹酬鄭毗躑躅詠品松荅小榼味井上枸𣏌架蜘蛛諷蚊燭蛾和甘露雜題和題項羽廟讀張碧集聽琴聞夜啼贈劉正元喜雨終南山下作觀種樹春後雨荅友人贈炭爛柯石尋言上人噴玉布姑蔑城崢嶸嶺尋裴處士子慶詩憩觀公法堂春霖奉贈陳侍御潭陽秋霽列仙文右方諸青童君清虚眞人金母飛空歌明安度謁智遠禪師訪嵩陽道士不遇聽説維摩經借車喜符郎詩有天縱憑周況乞茶上昭成閣田書不立非夫人讀經謝李輈再到喜盧仝船歸洛第十卷哀傷弔國殤弔比干墓弔元魯山十首哭李觀弔李元賔遺字悼湯衡評事哀孟雲卿荒居哭盧貞國傷舊逰弔房十五次卿逢鄭方回哭祕書包大監悼㓜子悼亡弔李元賔墳覽崔爽遺文峽哀十首杏殤九首弔春梅哭李丹貟外哭劉言史弔唐殷十首聮句有所思聮句遣興聮句贈劒客李園聮句讃讃維摩詰書上常州盧使君書又上飬生書孟東野詩集目録東野詩世傳汴呉鏤本五卷一百二十四篇周安惠本十卷三百三十一篇别本五卷三百四十篇蜀人蹇濬用退之贈郊句篡咸池集二卷一百八十篇自餘不爲編秩雜録之家家自異今緫括遺逸擿去重複若體製不類者得五百一十一篇釐别樂府感興詠懷㳺適居䖏行役紀贈懷寄酬荅送别詠物雜題哀傷聮句十四種又以賛書二系于後合十卷嗣有所得當次第益諸十聨句見昌黎集章章於時此不者云集賢校理常山宋敏求題
