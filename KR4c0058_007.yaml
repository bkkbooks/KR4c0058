front:
  text: 孟東野詩集卷第七
  hash: sha256:534f97ffccf381db2933e0abea5bd678dcaab87191c600abe03dff7490b30aad
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0058_SBCK_007-1a}
body:
  text: 山南西道節度參謀試大理評事平昌孟郊懷寄寄張籍夜鏡不照物朝光何時升黯然秋思來然愁氣一作暗來走入志士膺志士惜時逝一宵三四興清漢徒自朗濁河終無澄舊愛忽已逺新愁坐相凌君其隱壯懷我亦逃名稱古人貴從晦君子忌黨朋傾敗生所競保全歸矒矒苦僧一作浮雲何當來潛虬會飛騰憶周秀才素上人時聞各在一方東西分我情魂夢安能定野客雲作心髙僧月為性浮雲自髙間明月常空淨衣敝得古風居山無俗病吟聽碧雲語手把青松柄羡爾欲寄書飛禽杳難倩舟中喜遇從叔簡别後寄上時從叔初擢第歸江南郊不從行一意兩片雲暫合還却分南雲乘慶歸北雲與誰羣寄聲千里風相喚聞不聞懷南嶽隱士二首見説祝融峯擎天勢似騰藏千尋布水出十八髙僧古路無人迹新霞吐石稜終居將爾叟一一共余登千峯映碧湘真叟此中藏飯不煮石喫眉應似髮長楓梩榰酒甕鶴虱落琴床強效忘機者斯人尚未忘春夜憶蕭子真半夜不成寐燈盡又無月獨向階前立子規啼不歇況我有金蘭忽爾為胡越爭得明鏡中久長無白髮寄院中諸公奕奕秋水傍駸駸緑雲蹄月仙有髙曜靈鳯無卑棲翠色繞雲谷碧華凝句溪竹林遞歷覽雲寺行攀躋冠豸猶屈蠖匣龍期剸犀千山驚月曉百里聞霜鼙戎府多秀異謝公期相擕因之仰羣彥養拙固難齊寄洺州李大夫自從薊師反中國事紛紛儒道一失所賢人多在軍鳥巢憂迸射鹿耳駭驚聞劎折唯恐匣作一匣怨弓貪不讓勳方知省事將動必謝前羣鸛陳常先罷魚符最晚分步間洺水曲笑激太行雲詩叟未相識竹兒爭見君殷勤越談説記盡士風文夙一作寄盧虔使君霜露再相換逰人猶未歸歲新月改色客久線斷衣有鶴氷在翅竟久力難飛千家舊素沼昨日生緑輝春色若不可一作借為君步芳菲寄崔純亮百川有餘水大海無滿波器量各相懸賢愚不同科羣辨有姿語衆歡無有一作行歌唯餘洛陽子鬱鬱恨常多時讀過秦篇為君涕滂沱汴州離亂後憶韓愈李翺會合一時哭别離三斷腸殘花不待風春盡各飛揚歡去收不得悲來難自防孤門清館夜獨卧明月床忠直血白刃道路聲蒼黃食恩三千士一旦為豺狼海島士皆直夷門士非良人心既不類天道亦反常自殺與彼被一作殺未知何者臧寄張籍未見天子面不如雙盲人賈生對文帝終日猶悲辛夫子亦如盲所以空泣麟有時獨齋心髣佛夢稱臣夢中稱臣言覺後真埃塵東京有眼冨不如西京無眼貧西京無眼猶有耳隔牆時聞天子車之字一有聲轔轔轔轔車聲輾氷玉南郊壇上禮百神西明寺後窮瞎張太祝縱爾有眼誰爾珍天子只尺不得見不如閈眼且養真寄義興小女子江南莊宅淺所固唯踈籬小女未解行酒弟作一叔病老更癡家中多吳語教爾遙可知山怪夜動門水妖時弄池所憂癡酒腸不解委曲辭漁妾性崛強耕童手麬釐想兹為襁褓如鳥拾柴枝我詠元魯山胸臆流甘滋終當學自乳起坐常相隨憶江南弟白首眼垂血望爾唯夢中筋力強起時魂魄猶在東眼光寄明星起來東望空望空不見人江海波無窮衰老無氣力呼叫不成風子然憶憶言落地何由通常師共被教竟作生離翁生離不可訴上天曽聰未忍對松柏自鞭殘朽躬自鞭亦何益教非所崇努力柱杖來餘活與爾同不然死後恥遺死亦有終宿空姪院寄淡公夜坐冷竹聲二三髙人語燈窗看律鈔小師别為侣雪簷晴滴滴茗碗華舉舉磬音多風飈聲韻聞江楚官街不相隔詩思空愁豫明日䇿杖歸去住兩延佇寄陜府鄧竇一作給事陜城臨大道館宇屹幾鮮候謁隨芳方一作語鏗詞芬蜀箋從來鏡目下見盡道心前自謂古詩量異兾一作將新學偏戅人年六十每月請二千不敢等間用願為長壽錢非關亦潔爾將以救羸然孤省癡皎皎默吟寫綿綿病書慿晝目驛信寄宵鞭疾訴將何諭肆鱗今倒懸塵鯉見枯浪土鬛思乾泉感感無緒蕩愁愁作邉貞元文祭酒公即陽比謹學韋玄滿坐無風雜當朝雅獨全見知囑徐孑焉正端公即徐賞句類陶淵一顧生鴻羽再言將鶴翩宣揚隘車馬君子湊駢闐曽是此同眷至今應賜憐磨墨零落淚楷字貢仁賢送諫議十六叔至孝義渡後奉寄曉渡明鏡中霞衣相飄颻浪鳧驚亦雙蓬客將誰僚别飲孤易醒離憂壯難銷文清雖無敵儒貴不敢驕江吏捧紫泥海旗翦紅蕉分明太守禮跨躡毗陵橋伊洛去未回遐矚空寂寥至孝義渡寄鄭軍事唐二十五咫尺不得見心中空嗟嗟官街泥水深下腳道路斜嵩少玉峻峻伊雒碧華華岸亭當四逈詩老獨一家洧叟何所如鄭食唯有些何當來説事為君開流霞酬答答友人白日照清水淺深無隱姿君子業髙文懷抱多正思砥行碧山石結交青松枝碧山無轉易青松難傾移落落出俗韻琅琅大雅詞自非隨氏掌明月安能持千里不可倒一返無近期一别一作期無回如何非意中良覿忽在兹道語必踈淡儒風易凌遲願存堅貞節勿為霜霰欺酬友人見寄新文為客棲未定況當玄月中繁雲翳碧霄落雪和清風郊陌絶行人原隰多飛蓬耕牛返村巷野鳥依房櫳我無飢凍憂身託蓮花宫安間賴禪伯復得疏塵蒙覽君郢曲文詞彩何沖融謳吟不能已頓覺形神空答韓愈李觀别因獻張徐州冨别愁在顔貧别愁銷骨懶磨舊銅鏡畏見新白髮古樹春無花子規啼有血離絃不堪聽一聽四五絶世途非一險俗慮有千結有客步大方驅車獨迷轍故人韓與李逸翰雙皎潔哀我摧折歸贈詞縱橫設徐方國東樞元戎天下傑禰生投剌逰王粲吟詩謁髙情無遺照朗抱開曉月有土不埋寃有讎皆為雪願為直草木永向君地列願為古琴瑟永向君聽發欲識丈夫心曽將孤劒説答晝上人止讒作烈烈鸑鷟吟鏗鏗琅玕音梟摧明月嘯鶴起清風心渭水不可渾涇流徒相侵俗侣唱桃葉隱仙士一作鳴桂琴子野真遺却浮淺藏淵深答姚怤見寄日月不同光晝夜各有冝賢哲不苟合出處亦待時而我獨迷見意求異士知如將舞鶴管誤向驚鳧吹大雅難具陳正聲易漂淪君有丈夫淚泣人不泣身行吟楚山下玉一作義淚沾衣巾答郭郎中松柏死不變千年色青青志士貧更堅守道無異營每彈瀟湘瑟獨抱風波聲中有失意吟知者淚滿纓何以報知者永存堅與貞答盧虔故園見寄訪舊無一人獨歸清雒春花聞哭聲死水見别容新亂後故鄉宅多為行路塵因悲楚左右謗玉不知珉汝墳蒙從弟楚材見贈時郊將入秦楚材適楚朝為主人心夕作行客吟汝水忽凄咽汝風流苦音北闕秦門髙南路山一作楚石深分淚灑白日離腸繞青岑何以寄逺懷我書一作黃鶴能相尋同從叔簡酬盧殷少府梅尉吟楚聲竹風為凄清深虛冰在性髙潔雲入情借水洗間貌寄蕉書逸名羞將片石文鬭此雙瓊英酬李侍御書記秋夕雨中病假見寄秋風繞衰栁逺客聞雨聲重兹阻良夕孤坐唯積誠果枉移疾詠中含嘉慮明洗滌煩濁盡視聽昭曠生未覺衾枕倦久為章奏嬰達人不寶呆一作藥所保在間情答盧同楚屈入水死詩死踏雪僵直氣苟有存死亦何所妨日劈髙查牙清稜含冰漿前古後古􅖅與山氣勢強閃怪千石形異狀安可量有時春鏡破百道聲飛揚潛仙不足言朗客無隱腸為君傾海宇日夕多文章天下豈無緣此山雪昻藏煩君前致詞哀我老更狂狂歌不及狂歌聲緣鳯凰鳯兮何當來消我孤直瘡君文真鳯聲宣隘滿鏗鏘洛友零落盡逮兹悲重傷獨自奮異骨將騎白玉一作角翔再三勸莫行寒氣有刀槍仰慙君子多慎勿作芬芳奉報翰林張舍人見遺之詩百蟲笑秋律清削月夜聞曉稜視聽微風翦葉已紛君子鑒大雅老人非俊羣收拾古所棄俯仰補空文孤韻恥春俗餘響逸零氛自然蹈終南滌暑凌寒氛巖霰不知午澗澌鎮含曛曽是醒古醉所以多隱淪江調樂之逺溪謡生徒新衆藴有餘採寒泉空哀呻南謝竟莫至北宋當時珍賾靈各自異酌酒聖一作誰能均昔詠多寫諷今詞詎無因品松位何髙翠宫沒荒榛苔趾識宏製沙潨遊崩津忽吟陶淵明此即羲皇人心放出天地形拘在風塵前賢素行階夙嗜青山勤達士立明鏡朗言為近臣將期律萬有傾倒甄無垠鸑鷟應蟋蟀絲毫意皆申況于三千章哀叩不為神送别上送從弟郢東歸爾去東南夜我無西北夢誰言貧别易貧别愁更重曉色奪明月征人逐羣動秋風楚濤髙旅榜將誰共山中送從叔簡赴舉石根百尺杉山眼一片泉倚惇一作之道氣髙飲之詩思鮮于此逍遙場忽奏别離絃却笑薜蘿子不同鳴躍年送别崔寅亮下第天地唯一氣用之自偏頗憂人成苦吟達士為髙歌君子識不淺桂枝幽更多歲晏期攀折時歸且婆娑素質如削荆一作玉清詞若傾天一作河虬龍未化時魚鱉同一波去矣當自適故鄉饒薜蘿大梁送栁淳先入關青山輾為塵白日無間人自古推髙車爭利西入秦王門與侯門待冨不待貧空擕一束書去去誰相親書獨去將誰親一云空賫一東送無懷道士逰冨春山水逸士歸山一作送别吳造化絶見一作髙處冨春獨多觀山濃翠滴灑作一樂的水折珠摧殘溪鏡不隱髮樹衣長遇禦一作寒風猿虛空飛月狖叫嘯酸信此神仙路樂一作豈為時俗安煮金隂陽火蓉水一作美因怪星宿壇花發我或一作未識玉生忽藂攢蓬萊浮蕩漾非道相從難送溫初下第日落濁水中夜光誰能分髙懷無近趣清抱多逺聞欲識丈夫志心藏孤嶽雲長安風塵别咫尺不見君送盧虔端公守復州師曠聽羣木自然識孤桐正聲逢知音願出大朴中知音不韻俗獨立占上一作古風忽挂觸邪冠逮逐南飛鴻肅肅太守章明明華轂熊商山無平路楚水有驚潨日月千里外光隂難載同新愁徒自積良會何由通送任齊二秀才自洞庭逰宣城古并序任載齊文章者賢人之心氣也心氣樂則文章正心氣非則文章不正當正而不正者心氣之偽也賢與偽見于文章一直之詞衰代多禍賢無曲詞文章之曲直不由于心氣心氣之悲樂亦不由賢人由于時故今宣州多君子間暇而寬文章之曲直纎微悉而備舉洞庭二客勉而客去之鼓其風波之詞吾知夫樂莫是行也遂為詩曰洞庭非人境道路行虛空二客月中下一帆天外風魚龍波五色金碧樹千叢閃怪如可懼在誠無不通扣竒驚浩渺採異訪穹崇物表積髙韻人間訪仙公宣城文雅地謝守聲問融證玉易為力辨珉誰不同從兹阮籍淚且免泣途窮送曉公歸庭山朁亭一作歸庭山柳庭一作何﨑嶇寺路緣翠微秋霽山盡出日落人獨歸雲生髙髙步泉灑田田衣枯巢無還羽新木有爭飛兹焉不可繼夢寐空清輝送豆盧䇿歸别墅短松鶴不巢髙石雲不始一作栖君今為一作瀟湘去意性一作與雲鶴齊力買竒險地手開清淺溪身披薜荔衣蘿襟一作薜山陟莓苔梯一卷冰雪文避俗常自擕送清逺上人歸楚山舊寺上人遊蘇一作國清波中出吳境霞際登楚岑水寺一别來雲蘿三攺隂詩誇碧雲句道證青蓮心應笑泛萍者云一泛者應憐萍不知松隱深山中送從叔簡莫以手中瓊言邀世上名莫以山中迹久向人間行松柏有霜操風泉無俗聲應憐枯朽質驚此别離情送蕭鍊師入四明山間于獨鶴心大于髙松年逈出萬物表髙棲四明巔千尋直裂峯百尺倒㵼泉綘雪為我飯白雲為我田靜言不語話一作俗靈蹤時步天孟東野詩集卷第七
