front:
  text: 孟東野詩集卷第二
  hash: sha256:01bce8d99866cf8c4a5ad52e408caf92a248be4b5cd3939a6f8fbd085bb68f1e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0058_SBCK_002-1a}
body:
  text: 山南西道節度參謀試大理評事平昌孟郊樂府下織女辭夫是田中郎妾是田中女當年嫁得君為君秉機杼筋力日已疲不息窗下機如何織紈素自著藍縷衣官家榜村路更索栽桑樹古意蕩子守邊戍佳人莫相從去來年月多苦愁改形容上山復下山踏草成古蹤徒言採蘼蕪十度不一逢鑒獨是明月識志唯寒松井桃始開花一見悲萬重人顔不再春桃色有再濃掯氣入空房無憀乍從容啓貼理針線非獨學裁縫手持未染綵繡為白芙蓉芙蓉無染汚將以表心素欲寄未歸人當春無信去無信反增愁愁心緣隴頭願君如隴水冰鏡宛宛青絲紀纎纎白玉鈎玉鈎不虧缺青絲無斷絶回還勝雙手解盡心中結折楊栁二首楊柳多短枝短枝多別離贈逺纍攀折柔條安得垂青春有定節離別無定時但恐人别促不怨來遲遲莫言短枝條中有長相思朱顔與緑楊併在別離期樓上春風過風前楊栁歌枝踈緣別苦曲怨為年多花驚燕地雲葉映楚池波誰堪别離此征戍在交河和丁助教塞上吟哭雪復吟雪廣文丁夫子江南萬里寒曽未及如此整頓氣候誰言從生靈始無令惻隱者哀哀不能已古怨别颯颯秋風生愁人怨離别含情兩相向欲語氣先咽心曲千萬端悲來却難説別後唯所思天涯共明月古别曲山川古今路縱橫無斷絶來往天地間人皆有離别行衣未束帶中腸已先結不用看鏡中自知生白髮欲陳去留意聲向言前咽愁結填心胸茫茫若為説荒郊煙莽蒼曠野風凄切處處得相隨人那不如月樂府戲贈陸大夫十二丈三首蓮子不可得荷花生水中猶勝道傍栁無事作一時蕩春風渌萍與荷葉同此一水中風吹荷葉在渌萍西復東蓮葉未開時苦心終日卷春水風一作徒蕩漾荷花未開展戲答陸長源芙蓉初出水菡蓞露中花風吹著枯木無奈值空槎勸善吟醉會中贈郭行餘瘦郭有志氣相哀老龍鍾勸我少吟詩俗窄難爾容一口百味别況在醉會中四座正當喧片言何由通顧余昧時調居止多踈慵見書眼始開聞樂耳不聰視聽互相隔一身且莫同天疾難自醫詩僻將何攻見君如見書語善千萬重自悲咄咄感變作煩惱翁煩惱不可欺可欺古一作不劒古劒澀亦雄知君方少年少年懷古風藏書拄屋脊不借與凡聾我願拜少年師之學崇崇從他笑為矯矯善亦可宗望夫石望夫石夫不來兮江水碧行人悠悠朝與暮千年萬年色如故寒江吟冬至日光白始知隂氣凝寒江波浪凍急一作千里無平氷飛鳥絶髙羽樹一作行人皆晏興荻洲素浩渺崎岸澌碐磳煙舟忽自阻風帆不相乘何況異形體信任為股肱涉江莫涉凌得意須得朋結交非賢良誰免生愛憎凍水有再浪失飛有載騰一言縱醜詞萬響無善應取鑒諒不逺江水千萬層何當春風吹利涉吾道弘感興上審友種樹須擇地惡土變木根結交若失人中道生謗言君子芳桂性春榮冬更繁寒更繁一作春濃小人槿花心朝在夕不存莫躡冬氷堅中有潛浪翻唯當金石交可以賢達論怨別一別一回老志士白髮早在冨易為容居貧難自好沉憂損性靈服藥亦枯稿秋風遊子衣落日行逺道君問去何之賤身難寧一作自保百憂萱草女兒花不解壯士憂壯士心是劒為君射斗牛朝思除國讎難一作暮思除國讎計盡山河畫意窮草木籌智士日千慮愚夫唯四愁何必在波濤然後驚生一作沉浮伯倫心不醉四皓迹難留出處各有時衆議徒啾啾路病病客無主人艱哉求卧難飛光赤道路內火焦肺肝欲飲井泉竭欲醫囊用單稚顔能幾日壯志忽已殘人子不言苦歸書但云言一作安愁環在我腸宛轉終無端衰松近世交道衰青松落顔色人心忌孤直木性隨改易既摧栖日幹未展擎天力終是君子材還思君子識遣興絃貞五條音音詞一作五松直百尺心貞絃含古風直松凌髙岑浮聲與狂葩胡為欲相侵退居一作退老退身何所食敗力不能間種稻耕白水負薪斫青山衆聽喜巴唱獨醒愁楚顔日暮靜歸時幽幽扣松關卧病貧病誠可羞故床無新裘羞數整藍縷裘一作貪病對客春色燒肌膚時飱苦咽喉倦寢意蒙昧強言聲幽柔承顔自俯仰有淚不敢流默默寸心中朝愁續暮愁隱士本末一相返漂浮不還真山野多餒士市井無飢人虎豹忌當道麋鹿知藏身奈何貪競者日與患害親顔貌嵗嵗改利心朝朝新孰知冨生禍取冨不取貧寶玉忌出璞出璞先為塵松柏忌出山出山先為薪君子隱石壁道書為我鄰寢興思其義淡泊味始真陶公自放歸尚平去有依草木擇地生禽鳥順性飛青青與冥冥所保各不違獨愁一作獨怨前日逺別離昨日生白髮欲知萬里情曉卧半床月常恐百蠱鳴使我芳草歇春日有感雨滴草芽出一日長一日風吹柳線垂一枝連一枝獨有愁人顔經春如等間且持酒滿杯狂歌狂笑來將見故人佳人季夏中及此百餘日無日不相思明鏡改形質寧知仲冬時忽有相逢期振衣起躑躅頳鯉躍天池傷時常聞貧賤士之常草木冨者莫相笑男兒得路即榮名邂逅失途成不調古人結交而重義今人結交而重利勸人一種種桃李種亦直須遍天地一生不愛囑人事囑即直須為生死我亦不羡季倫冨我亦不笑原憲貧有財有勢即相識無財無勢同路人因知世事皆只一作如此却向東溪卧白雲寓言誰言碧山曲不廢青松直誰言濁水泥不汚明月色我有松月心俗騁風霜力貞明既如此摧折安可得偶作利劒不可近美人不可親利劒近傷手美人近傷身道險不在廣十步能摧輪情憂不在多一夕能傷神勸學擊石乃有火不擊元無煙人學始知道不學非自然萬事須已運他得非我賢青春須早為豈能長少年贈農人勸爾勤耕田盈爾倉中粟勸爾伐桑株減爾身上服清霜一委地萬草色不緑狂飈一入林萬葉不著木青春如不耕何以自結束長安早春旭日朱樓光東風不驚塵公子醉未起美人爭探春探春不為桑探春不為麥日日出西園秪望花柳色乃知田家春不入五侯宅罪松雖為青松姿霜風何所冝二月天下樹緑於青松枝勿謂賢者喻勿謂愚者規伊吕代封爵夷齊終身飢彼曲既在斯我正實在兹涇流合渭流清濁各自持天令設四時榮衰有常期榮合隨時榮衰合隨時衰天令既不從甚不敬天時松乃不臣木青青獨何為感興拔心草不死去根柳亦榮獨有失意人恍然無力行昔為連理枝今為斷絃聲連理時所重斷絃今所輕吾欲進孤舟三峽水不平吾欲載車馬太行路峥嶸萬物根一氣如何互相傾感懷八首秋氣悲萬物驚風振長道登髙有所思寒雨傷百草平生有親愛零落不相保五情今巳傷安得自能老晨登洛陽坂目極天茫茫羣物歸大化六龍頽西荒豺狼日已多草木日已霜飢年無遺粟衆鳥去空場路傍誰家子白首離故鄉含酸望松柏仰面訴穹蒼去去匆復道苦飢形貌傷徘徊不能寐耿耿含酸辛中夜登髙樓憶我舊星辰四時互遷移萬物何時春唯憶首陽路永謝當時人長安嘉麗地宫月生蛾眉隂氣凝萬里坐看芳草衰玉堂有玄鳥亦以從此辭傷哉志士嘆故國多遲遲深宫豈無樂擾擾復何為朝見名與利暮還生是非與非一作是薑牙佐周武世業永巍巍舉才天道親首陽誰採薇去去荒澤逺落日當西歸羲和駐其輪四海借餘暉極目何蕭索驚風正離披䲻梟鳴髙樹衆鳥相因依東方有一士歲暮常苦飢主人數相問脈脈今何為貧賤亦有樂且願掩守一作柴扉火雲流素月三五何明明光曜侵白日賢愚迷至精四時更變化天道有虧盈常恐今曰沒須臾還復生河梁暮相遇草草不復言漢家正離亂王粲别荆蠻野澤何蕭條悲風振空山舉頭是星辰念我何時還親愛久別散形神各離遷未為死生訣長在心目間有鳥東西來哀鳴過我前願飛浮雲外飲啄見青天逹士四時如逝水百川皆東波青春去不還回一作白髮鑷更多逹人識元氣化一作變愁為髙歌傾顔取一醉冨者奈貧何君看土中宅冨貴已矣一作無偏頗暮秋感思二首西風吹垂楊條條脆如藕上有噪日蟬催人成皓首亦恐旅步難何獨朱顔醜朽一作欲慰一時心莫如千日酒優哉遵渚鴻自得飬身旨不啄太倉粟不飲方塘水振羽浮雲罝羅任徒爾古興楚血未乾衣荆虹尚埋輝痛玉不痛身抱璞求所歸勸友至白涅不緇至交淡不疑人生靜躁殊莫猒相針規膠漆武可接金蘭文可思堪嗟無心人不如松柏枝松姿一作青夷門雪贈主人夷門貧士空吟雪夷門豪士皆飲酒酒聲歡間入雪銷雪聲激切悲枯朽悲歡不同歸去來萬里春風動江柳答陸長源好丹與素通不同失意得途事皆別東鄰少年樂未央南客思歸腸欲絶千里長河氷復氷雲鴻冥冥楚山雪堯哥氏莊客去婦後篇題二首一作舜歌前篇賞鄭爾室何不安爾孝無與齊一言應對姑一度為出妻往轍才晚鐘還轍及晨雞往還迹徒新很戾竟獨迷娥女無禮數汚家如糞泥父母吞聲瘦禽鳥亦為啼如何天與惡不得和鳴栖山色挽心肝將歸盡日看村肩藍􅓅子野坐白髮官冠一作鶯弄方短短花明碎攢攢琉璃堆可掬琴瑟饒多歡翠韻仙窈窕嵐漪出無端養館洞庭秋響答虛吹彈孟東野詩集卷第二
