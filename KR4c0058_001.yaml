front:
  text: 孟東野詩集卷第一
  hash: sha256:3893192dc0710f19f9fe0ed074d4df0e72e6c3a30e3bf430498aad16b59400e2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0058_SBCK_001-1a}
body:
  text: 山南西道節度絫謀試大理評事平昌孟郊樂府上列女操梧桐相待老鴛鴦會雙死貞婦貴徇夫捨生亦如此波瀾誓不起妾心井中水灞上輕薄行長安無緩步況值天景暮相逢灞滻間親戚不相顧自嘆方拙身忽隨輕薄倫常恐失所避化為車轍塵此中生白髮疾走亦未歇得歇一作不長安羇旅行十日一理髮每梳飛旅塵三旬九過飲每食唯舊貧萬物皆及時獨余不覺春失名誰肯訪得意爭相親直木有恬翼靜流無躁鱗始知喧競場莫處君子身野䇿藤竹輕山𬞞薇蕨新潛歌歸去來事外風景真長安道胡風激秦樹賤子風中泣家家朱門開得見不可入長安十二衢投樹鳥亦急髙閣何人家笙篁正喧吸送逺吟河水昏復晨河邊相送頻離杯有淚飲別栁無枝春一笑忽然斂萬愁俄巳新東波與西日不惜逺行人古薄命妾不惜十指絃為君千萬彈常恐新聲至坐使作一我使故聲曲一作殘棄置今日悲即是昨日歡將新變故易持故為新難青山有蘼蕪淚葉長不乾空令後代人採掇幽思櫕幽蘭一作思古離別松山雲繚繞萍路水分離雲去有歸日水分無合時春芳役雙眼春色柔四支楊栁織別愁千條萬條絲古樂府雜怨三首憶人莫至悲至悲空自衰寄人莫翦衣翦衣未必歸朝為雙蒂花暮為四散飛花落却繞樹遊子不顧期夭桃花清晨遊女紅粉新夭桃花薄暮遊女紅粉故樹有百年花人無一定顔花送人老盡人悲花自間貧女鏡不明寒花日少容暗蛩有虛織短線無長縫浪水不可照狂夫不可從浪水多散影狂夫多異蹤持此一生薄空成萬百一作恨濃靜女吟艷女皆妬色靜女獨檢蹤任禮恥任糚嫁德不嫁容君子易求聘小人難自從此志誰與諒琴絃幽韻重歸信吟淚墨灑為書將寄萬里親書去魂亦去兀然空一身子貪敗不貪全苦寒吟天色寒青蒼北風叫枯桑厚冰無裂文短日有冷光敲石不得火壯隂正奪陽調苦竟何言凍吟成此章猛將吟擬膾樓蘭肉五一作蓄怒時未揚秋鼙無退聲夜劒不隱光虎隊手驅出豹篇心卷藏古今皆有言猛將出北方傷哉行衆毒蔓貞松一枝難久榮豈知黃庭客仙骨生不成春色捨芳蕙秋風繞枯莖彈琴不成曲始覺知音傾館月改舊照吊賔寫餘情還舟空江上波浪送銘旌古怨試妾與君淚兩處滴池水看耴芙蓉花今年為誰死湘絃怨昧者理芳草蒿蘭同一鋤狂盲一作飈怒怨一作秋林曲直同一枯嘉木忌深蠧哲人悲巧誣靈均入回流靳尚為良謨我願分衆泉清濁各異渠我願分衆巢梟鸞相逺居此志諒難保此情竟何如湘絃少知音孤響空踟蹰楚竹吟酬盧虔端公見和湘絃怨握中有新聲楚竹人未聞識音者謂誰清靜一作夜吹贈君昔為瀟湘引曽動瀟湘雲一叫鳳改聽再驚鶴失出一作羣江花匪秋落山日當晝曛衆濁響雜沓孤清思氛氲欲知怨有者一作形願向明月分一掬靈均淚千年湘水文逺愁曲飄颻何所從遺塜行未逢東西不見人哭泣一作向青青松此地有時盡此哀無處容聲翻太白雲淚洗藍田峯水涉七八曲山石一作登千萬重願玄夜月靈一作出視白日蹤貧女詞寄從叔先輩簡蠶貧一作女非不勤今年獨無春二月氷雪深死盡萬木身時令自逆行造化豈不仁仰企碧雲仙髙控滄海雲永別勞苦場飄颻遊無垠邊城吟西城近日水一作天俗稟氣候偏行子獨自渴人仍賣泉燒烽碧雲外牧馬青坡巔何處鶻突夢歸思寄仰酒一作眠新平歌送許問邉柳三四尺暮春莫奏一作離別歌早回儒士駕暮飲土番河誰識匣篋一作中寶楚雲章句多殺氣不在邊殺氣不在邉凛然中國秋道險不在山平地有摧輈河南又起兵清濁俱鎖流豈唯私客艱擁滯官行舟況余隔晨昏去家成阻修忽然兩鬢雪固是一日愁獨寢夜難曉起視星漢浮涼風蕩天地日夕聲颼飀萬物無少色兆人皆老憂長䇿苟未立丈夫誠可羞靈響復何事劒鳴思戮讎結愛心心復心心結愛務在深一度欲離言一作別千回結衣襟結妾獨守志結君早歸意始知結衣裳不如結心腸坐結行亦結結盡百年月絃歌行驅儺擊鼓吹長笛瘦鬼染面惟齒白暗中崒崒拽茅鞭倮足朱褌行戚戚相顧聲衝庭燎桃弧射矢時獨叫覆巢行荒城古木枝多枯飛禽嗷嗷朝哺雛枝傾巢覆雛墜地烏鳶下啄更相呼陽和發生均孕育鳥獸有情知不足枝危巢小風雨多未容長成巳先覆靈枝珍木滿上林鳳巢阿閣重且深爾今所託非本地烏鳶何得同知一作爾心出門行二首長河悠悠去無極百齡同此可歎息秋風白露沾人衣壯心凋落奪顔色少年出門將訴誰川無梁兮路無歧一聞陌上苦寒奏使我佇立驚且悲君今得意厭梁肉豈復念我貧賤時海風蕭蕭天雨霜窮愁獨坐夜何長驅車舊憶太行險始知遊子悲故鄉美人相思隔天闕長望雲端不可越手持琅玕欲有贈愛而不見心斷絶南山峩峩白石爛碧海之波浩漫漫參辰出沒不相待我欲橫天無羽翰湘妃怨作湘靈祠南巡竟不返二妃怨悲一作逾積萬里喪蛾眉瀟湘水空碧冥冥荒山下古廟收貞魄喬木深青春清光滿肅一作瑶席搴芳徒有薦靈意殊脈脈玉珮不可親徘徊煙波夕巫山曲巴江上峽重復重陽臺碧峭十二峯荆王獵時逢暮雨夜卧髙丘夢神女輕紅流煙濕艷姿行雲飛去明星稀目極魂斷望不見猿啼三聲淚滴衣巫山髙見盡數萬里不聞三聲猿但飛蕭蕭雨中有亭亭魂千載楚襄恨遺文宋玉言至今晴明天作一車遙遙路喜到江盡江上又通舟舟車兩無阻何處不得遊丈夫四方志女子安下留郎自別日言無令生逺愁旅鴈忽叫月斷猿寒啼秋此夕夢君夢君在百城樓寄淚無因波寄恨無因輈願為馭者手與郎回馬頭征婦怨四首良人昨日去明月又不圓別時各有淚零落青樓前君淚濡羅巾妾淚滿路塵羅巾長在手今得隨妾身路塵如得風得上君車輪漁陽千里道近如中門限中門踰有時漁陽長在眼生在緑絲一作羅下不識漁陽道良人自戍來夜夜夢中到空城雀一雀入官倉所食寧損幾秪慮往覆頻官倉終害爾魚網不在天鳥羅不張水飲啄要自然可以空城裏間怨妾恨比斑竹下盤煩寃根有筍未出土中已含淚痕羽林行朔雪寒斷指朔風徑裂冰胡中射雕者此日猶不能翩翩羽林兒錦臂飛蒼鷹揮鞭快白馬走出黃河凌古意河邊織女星河畔牽牛郎未得渡清淺相對遙相望古別離欲別牽郎衣郎今到何處不恨歸來遲莫向臨卭去遊俠行壯士性剛決火中見石裂殺人不回頭輕生如暫別豈知眼有淚肯白頭上髮平生無恩酬劒間一百月黃雀吟黃雀舞承塵倚恃主人仁主人忽不仁買彈彈爾身何不逺飛去蓬蒿正繁新蒿粒無人爭食之足為珍莫覷翻車粟覷翻罪有因黃雀不知言贈之徒殷勤有所思桔橰烽火晝不滅客路迢迢信難越古鎮刀攢萬片霜寒江浪起千堆雪此時西去定如何空使南心逺凄切求仙曲仙教生為門仙宗靜為根持心若妄求服食安足論鏟惑有靈藥餌真成本源自當出塵網馭鳯登崑崙嬋娟篇花嬋娟泛春泉竹嬋娟籠曉煙妓嬋娟不長妍月嬋娟真可憐夜半姮娥朝太一人間本自無靈匹漢宫承寵不多時飛燕婕妤相妬嫉南浦篇南浦桃花亞水紅水邊栁絮由春風鳥鳴喈喈煙濛濛自從逺送對悲翁此翁已與少年別唯憶深山深谷中清東曲櫻桃花參差香雨紅霏霏笑競攀折美人濕羅衣采采清東曲明眸艷圭玉青巾艑上郎上下看不足南陽公首詞編入新樂録孟東野詩集卷第一
